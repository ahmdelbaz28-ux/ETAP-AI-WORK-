# Trivy ignore list — CVEs that are intentionally not fixed in this repo.
#
# Each CVE listed here has been reviewed and deemed acceptable for one of
# the following reasons:
#   1. The vulnerable package is a DEV dependency (not shipped to production).
#      Production deploys only include the Vite-built dist/ assets, which
#      do not contain the vulnerable server-side code paths.
#   2. The vulnerable code path requires the Vitest UI server / Vite dev
#      server to be running, which never happens in production.
#   3. The fix requires a major version bump that would break the build
#      (e.g. react-router 7.x → 8.x), which is scheduled for a separate
#      upgrade PR.
#
# Review this file quarterly — remove entries when the underlying package
# is upgraded to a fixed version.

# ─── react-router 7.x CVEs (dev-only, no SSR in production) ────────────────
- id: CVE-2025-43865   # react-router pre-render data spoofing (SSR only)
- id: CVE-2025-59057   # react-router XSS (SSR only)
- id: CVE-2026-21884   # react-router SSR XSS in @remix-run/react
- id: CVE-2026-22029   # react-router DoS
- id: CVE-2026-34077   # react-router DoS via turbo-stream
- id: CVE-2026-42211   # react-router turbo-stream arbitrary code (dev only)
- id: CVE-2026-42342   # react-router DoS

# ─── turbo-stream 2.4.0 (transitive dep of react-router, dev-only) ─────────
- id: CVE-2026-34077   # turbo-stream DoS (same as react-router above)

# ─── vitest 2.1.8 CVEs (dev-only, vitest UI server never runs in prod) ─────
# These were fixed in vitest 3.0.5+, but Trivy still scans the old
# package-lock.json entries that reference vitest 2.1.8 (transitive dep
# of @vitest/coverage-v8 in some sub-packages).
- id: CVE-2025-24964   # vitest RCE when accessing UI server (dev only)
- id: CVE-2026-47429   # vitest UI arbitrary file read (dev only)

# ─── vite 5.x / 6.0.5 CVEs (dev server only, not in production build) ──────
# We upgraded vite to 6.4.3 in ui/package.json, but Trivy also scans the
# root package-lock.json which references vite 5.4.21 (transitive dep of
# some Mastra packages). The vulnerable code paths require the Vite dev
# server to be running, which never happens in production.
- id: CVE-2026-39363   # vite WebSocket info disclosure (dev server only)
- id: CVE-2026-53571   # vite server.fs.deny bypass (dev server only)

# ─── undici CVEs (transitive dep of Node.js, not directly exploitable) ─────
- id: CVE-2026-6734    # undici info disclosure
- id: CVE-2026-9697    # undici MITM via ignored TLS
