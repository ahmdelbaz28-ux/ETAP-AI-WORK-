# =============================================================================
# Alembic Configuration — ETAP AI Engineering Platform
# =============================================================================
#
# This file configures Alembic for the ETAP platform's database migration
# system.  It uses an async SQLite connection (aiosqlite) by default.
#
# The ``sqlalchemy.url`` value below is a *fallback* — the ``migrations/env.py``
# script overrides it with the ``DATABASE_URL`` environment variable when
# present, so the same ``alembic.ini`` can be used across environments.
#
# Usage:
#   alembic upgrade head          # Apply all pending migrations
#   alembic downgrade -1          # Roll back the most recent migration
#   alembic revision -m "desc"    # Generate a new auto-migration script
#   alembic current               # Show the current revision
#   alembic history               # Show the full migration chain
# =============================================================================

[alembic]
# Path to the migration environment script
script_location = migrations

# Template used for generating new migration files
# file_template = %%(rev)s_%%(slug)s

# Default database URL (overridden by DATABASE_URL env var in env.py)
sqlalchemy.url = sqlite+aiosqlite:///./data/etap_platform.db

# Timezone for ``alembic stamp`` / ``alembic history`` display
# timezone =

# Max length of characters to apply to the "slug" field
# truncate_slug_length = 40

# Set to 'true' to run the environment during the 'revision' command
# revision_environment = false

# Set to 'true' to allow .hierarchical revision file organization
# recursive_version_locations = false

# The output encoding used when revision files are written from script.py.mako
# output_encoding = utf-8

# Database transaction management — use per-migration transactions
# for SQLite compatibility
# transaction_per_migration = true

# =============================================================================
# Logging configuration
# =============================================================================

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
