# Telegraf configuration — bridges SCADA measurements into InfluxDB.
#
# This config assumes AhmedETAP publishes measurements to an MQTT broker
# (e.g. Mosquitto running on the etap-net network) on topic
#   etap/scada/measurements
# Telegraf subscribes, parses the JSON, and writes to InfluxDB.

[agent]
  interval = "1s"
  round_interval = true
  metric_batch_size = 1000
  metric_buffer_limit = 10000
  collection_jitter = "0s"
  flush_interval = "1s"
  flush_jitter = "0s"
  precision = ""
  hostname = "etap-scada-telegraf"
  omit_hostname = false

# -----------------------------------------------------------------------------
# Input: MQTT subscriber
# -----------------------------------------------------------------------------
[[inputs.mqtt_consumer]]
  servers = ["tcp://etap-mqtt:1883"]
  topics = ["etap/scada/measurements"]
  topic_tag = "mqtt_topic"
  qos = 0
  connection_timeout = "30s"
  persistent_session = false
  client_id = "etap-telegraf"
  data_format = "json"
  json_name_key = "measurement_type"
  json_tag_keys = ["element_id", "source", "quality"]
  json_string_fields = ["unit"]
  json_time_key = "ts"
  json_time_format = "unix"

# -----------------------------------------------------------------------------
# Output: InfluxDB v2
# -----------------------------------------------------------------------------
[[outputs.influxdb_v2]]
  urls = ["http://scada-timeseries:8086"]
  token = "${INFLUXDB_TOKEN}"
  organization = "${INFLUXDB_ORG}"
  bucket = "${INFLUXDB_BUCKET}"
  timeout = "5s"

# -----------------------------------------------------------------------------
# Processor: convert element_id into a tag for efficient filtering.
# -----------------------------------------------------------------------------
[[processors.converter]]
  [processors.converter.fields]
    tag = ["unit"]
