# ETAP AI Platform - Kubernetes Deployment Manifests
# Apply with: kubectl apply -f k8s/

---
# Namespace
apiVersion: v1
kind: Namespace
metadata:
  name: etap-platform
  labels:
    name: etap-platform

---
# ConfigMap
apiVersion: v1
kind: ConfigMap
metadata:
  name: etap-config
  namespace: etap-platform
data:
  LOG_LEVEL: "INFO"
  VECTOR_DB_TYPE: "chroma"
  VECTOR_DB_PATH: "/data/knowledge_db"
  APP_HOST: "0.0.0.0"
  APP_PORT: "3000"
  PYTHON_BACKEND_PORT: "8000"
  ENABLE_AUTHENTICATION: "true"
  ENABLE_AUDIT_LOGGING: "true"

---
# Secret (base64 encoded values)
# IMPORTANT: Replace placeholder values with actual secrets before deployment!
# Generate base64 encoded secrets using: echo -n "your-secret" | base64
# For JWT_SECRET_KEY: use a strong random secret (openssl rand -hex 32)
# For OPENAI_API_KEY: use your actual OpenAI API key
apiVersion: v1
kind: Secret
metadata:
  name: etap-secrets
  namespace: etap-platform
type: Opaque
data:
  jwt-secret-key: Q0hBTkdFLU1FLUpXVC1TRUNSRVQtUkVQTEFDRS1USElTLVZBTFVF  # REPLACE_ME: openssl rand -hex 32 | base64
  openai-api-key: Q0hBTkdFLU1FLU9QRU5BSS1BUEktS0VZLVJFUExBQ0UtVEhJUy1WQUxVRQ==  # REPLACE_ME: echo -n "sk-your-openai-key" | base64
  database-url: Q0hBTkdFLU1FLURBVEFCQVNFLVVSTC1SRVBMQUNFLVRISVM=  # REPLACE_ME: echo -n "file:./mastra.db" | base64

---
# Persistent Volume Claims
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: etap-data-pvc
  namespace: etap-platform
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 50Gi
  storageClassName: standard

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: etap-reports-pvc
  namespace: etap-platform
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi
  storageClassName: standard

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: etap-knowledge-pvc
  namespace: etap-platform
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  storageClassName: standard

---
# Redis Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: etap-platform
  labels:
    app: redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
      - name: redis
        image: redis:7-alpine
        ports:
        - containerPort: 6379
        volumeMounts:
        - name: redis-data
          mountPath: /data
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
      volumes:
      - name: redis-data
        emptyDir: {}

---
# Redis Service
apiVersion: v1
kind: Service
metadata:
  name: redis-service
  namespace: etap-platform
spec:
  selector:
    app: redis
  ports:
  - port: 6379
    targetPort: 6379
  type: ClusterIP

---
# Main Application Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: etap-platform
  namespace: etap-platform
  labels:
    app: etap-platform
spec:
  replicas: 3
  selector:
    matchLabels:
      app: etap-platform
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: etap-platform
    spec:
      containers:
      - name: etap-platform
        image: etap-ai-platform:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 3000
          name: http
        - containerPort: 8000
          name: python
        envFrom:
        - configMapRef:
            name: etap-config
        env:
        - name: JWT_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: etap-secrets
              key: jwt-secret-key
        - name: OPENAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: etap-secrets
              key: openai-api-key
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: etap-secrets
              key: database-url
        volumeMounts:
        - name: data-volume
          mountPath: /data
        - name: reports-volume
          mountPath: /app/reports
        - name: knowledge-volume
          mountPath: /app/knowledge_db
        - name: logs-volume
          mountPath: /app/logs
        resources:
          requests:
            memory: "2Gi"
            cpu: "1000m"
          limits:
            memory: "4Gi"
            cpu: "2000m"
        livenessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 60
          periodSeconds: 30
          timeoutSeconds: 10
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
      volumes:
      - name: data-volume
        persistentVolumeClaim:
          claimName: etap-data-pvc
      - name: reports-volume
        persistentVolumeClaim:
          claimName: etap-reports-pvc
      - name: knowledge-volume
        persistentVolumeClaim:
          claimName: etap-knowledge-pvc
      - name: logs-volume
        emptyDir: {}

---
# Service
apiVersion: v1
kind: Service
metadata:
  name: etap-platform-service
  namespace: etap-platform
  labels:
    app: etap-platform
spec:
  type: LoadBalancer
  selector:
    app: etap-platform
  ports:
  - name: http
    port: 80
    targetPort: 3000
    protocol: TCP
  - name: python-backend
    port: 8000
    targetPort: 8000
    protocol: TCP

---
# Ingress (for external access)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: etap-ingress
  namespace: etap-platform
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - etap.yourdomain.com
    secretName: etap-tls
  rules:
  - host: etap.yourdomain.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: etap-platform-service
            port:
              number: 80

---
# Horizontal Pod Autoscaler
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: etap-hpa
  namespace: etap-platform
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: etap-platform
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80

---
# Network Policy
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: etap-network-policy
  namespace: etap-platform
spec:
  podSelector:
    matchLabels:
      app: etap-platform
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - namespaceSelector: {}
    ports:
    - protocol: TCP
      port: 3000
    - protocol: TCP
      port: 8000
  egress:
  - to:
    - namespaceSelector: {}
    ports:
    - protocol: TCP
      port: 6379  # Redis
  - to: []  # Allow DNS
    ports:
    - protocol: UDP
      port: 53
    - protocol: TCP
      port: 53
