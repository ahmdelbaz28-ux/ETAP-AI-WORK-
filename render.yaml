services:
  - type: web
    name: etap-ai-engineering
    runtime: python
    plan: starter
    autoDeploy: true
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn engineering_service:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.13
      - key: ENGINEERING_SERVICE_HOST
        value: 0.0.0.0
      - key: ENGINEERING_SERVICE_PORT
        value: "8000"
      - key: LOG_LEVEL
        value: INFO
      - key: ENVIRONMENT
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: FERNET_KEY
        generateValue: true
