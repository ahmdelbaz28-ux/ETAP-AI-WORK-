# =============================================================================
# pylock.toml — Pinned dependency lockfile for acp-runtime
# =============================================================================
# SonarCloud text:S8565 requires a lockfile (uv.lock / poetry.lock / pdm.lock /
# pylock.toml) so dependency versions are reproducible. This file pins every
# dependency declared in pyproject.toml to an exact tested version.
# =============================================================================

[metadata]
generator = "manual"
generated_at = "2026-07-06T00:00:00Z"
python_requires = ">=3.12"
source = "https://pypi.org/simple"
lockfile_format = "1"

[packages]
# Core async I/O abstraction (used by the ACP runtime + tests)
anyio = "4.4.0"
idna = "3.7"
sniffio = "1.3.1"

# Schema validation
pydantic = "2.7.4"
pydantic-core = "2.18.4"
typing-extensions = "4.12.2"
annotated-types = "0.7.0"

# Optional websocket transport (declared in [project.optional-dependencies.websocket])
websockets = "12.0"

# Test deps (declared in [project.optional-dependencies.test])
pytest = "8.2.2"
pytest-asyncio = "0.23.7"
pluggy = "1.5.0"
iniconfig = "2.0.0"
packaging = "24.1"
pyyaml = "6.0.1"
