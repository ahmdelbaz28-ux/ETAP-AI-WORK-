<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Primary gradient: deep brand blue → electric cyan -->
    <linearGradient id="primaryGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="55%" stop-color="#1d4ed8"/>
      <stop offset="100%" stop-color="#0a0e1a"/>
    </linearGradient>
    <!-- Energy gradient: cyan pulse -->
    <linearGradient id="energyGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="50%" stop-color="#00d4ff"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <!-- Amber accent -->
    <linearGradient id="amberGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <!-- Glow filter -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- ============ BACKGROUND TILE (for app icon use) ============ -->
  <rect width="512" height="512" rx="112" fill="url(#primaryGrad)"/>

  <!-- Subtle grid pattern overlay -->
  <g opacity="0.06" stroke="#ffffff" stroke-width="1" fill="none">
    <line x1="0" y1="128" x2="512" y2="128"/>
    <line x1="0" y1="256" x2="512" y2="256"/>
    <line x1="0" y1="384" x2="512" y2="384"/>
    <line x1="128" y1="0" x2="128" y2="512"/>
    <line x1="256" y1="0" x2="256" y2="512"/>
    <line x1="384" y1="0" x2="384" y2="512"/>
  </g>

  <!-- ============ HEXAGONAL FRAME (engineering precision) ============ -->
  <g opacity="0.18" stroke="#00d4ff" stroke-width="2" fill="none" filter="url(#softGlow)">
    <polygon points="256,72 416,164 416,348 256,440 96,348 96,164"/>
  </g>
  <g opacity="0.10" stroke="#60a5fa" stroke-width="1" fill="none">
    <polygon points="256,96 392,176 392,336 256,416 120,336 120,176"/>
  </g>

  <!-- ============ THE "A" MONOGRAM ============ -->
  <!-- The A is formed by two converging transmission lines meeting at the apex -->
  <!-- Left line (transmission tower style) -->
  <line x1="160" y1="380" x2="256" y2="140"
        stroke="url(#energyGrad)" stroke-width="14" stroke-linecap="round" filter="url(#glow)"/>
  <!-- Right line -->
  <line x1="352" y1="380" x2="256" y2="140"
        stroke="url(#energyGrad)" stroke-width="14" stroke-linecap="round" filter="url(#glow)"/>

  <!-- ============ POWER BUS (the A's crossbar) ============ -->
  <!-- Horizontal bus with nodes — single-line-diagram style -->
  <line x1="195" y1="290" x2="317" y2="290"
        stroke="#fbbf24" stroke-width="6" stroke-linecap="round" filter="url(#softGlow)"/>
  <!-- Bus nodes (electrical junctions) -->
  <circle cx="195" cy="290" r="7" fill="#fbbf24" filter="url(#softGlow)"/>
  <circle cx="256" cy="290" r="9" fill="#f59e0b" filter="url(#softGlow)"/>
  <circle cx="317" cy="290" r="7" fill="#fbbf24" filter="url(#softGlow)"/>

  <!-- ============ APEX SPARK (where the lines converge) ============ -->
  <!-- Bright convergence node -->
  <circle cx="256" cy="140" r="14" fill="#00d4ff" filter="url(#glow)"/>
  <circle cx="256" cy="140" r="7" fill="#ffffff" opacity="0.95"/>

  <!-- Energy spark radiating from apex (small lightning) -->
  <path d="M 256 140 L 250 110 L 256 116 L 252 90 L 262 120 L 256 116 L 264 100 Z"
        fill="#ffffff" opacity="0.85" filter="url(#softGlow)"/>

  <!-- ============ BASE NODES (transmission tower feet) ============ -->
  <circle cx="160" cy="380" r="10" fill="#60a5fa" filter="url(#softGlow)"/>
  <circle cx="352" cy="380" r="10" fill="#60a5fa" filter="url(#softGlow)"/>
  <circle cx="160" cy="380" r="4" fill="#ffffff" opacity="0.9"/>
  <circle cx="352" cy="380" r="4" fill="#ffffff" opacity="0.9"/>

  <!-- ============ GROUND LINE (horizon) ============ -->
  <line x1="120" y1="410" x2="392" y2="410"
        stroke="#00d4ff" stroke-width="1.5" opacity="0.35" stroke-dasharray="4 6"/>

  <!-- ============ SMALL "ET" INDICATOR (bottom right) ============ -->
  <g opacity="0.6">
    <rect x="380" y="380" width="44" height="18" rx="3" fill="none" stroke="#00d4ff" stroke-width="1"/>
    <text x="402" y="393" font-family="'JetBrains Mono', monospace" font-size="11"
          font-weight="700" fill="#00d4ff" text-anchor="middle" letter-spacing="1">ET</text>
  </g>
</svg>
