<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="AhmedETAP Favicon">
  <defs>
    <!-- Premium Gradients -->
    <linearGradient id="favLeftGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e3a8a" />
      <stop offset="100%" stop-color="#3b82f6" />
    </linearGradient>
    <linearGradient id="favRightGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f766e" />
      <stop offset="100%" stop-color="#0d9488" />
    </linearGradient>
    <linearGradient id="favTopGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1d4ed8" />
      <stop offset="100%" stop-color="#00d4ff" />
    </linearGradient>
  </defs>

  <!-- Isometric 3D Hexagonal Node Base -->
  <!-- Left Side: Indigo to Blue (representing generation / inputs) -->
  <path
    d="M256,70 L256,256 L90,352 L90,166 Z"
    fill="url(#favLeftGrad)"
    stroke="#070b14"
    stroke-width="6"
    stroke-linejoin="round"
  />

  <!-- Right Side: Dark Teal to Emerald (representing output / distribution) -->
  <path
    d="M256,256 L422,352 L422,166 L256,70 Z"
    fill="url(#favRightGrad)"
    stroke="#070b14"
    stroke-width="6"
    stroke-linejoin="round"
  />

  <!-- Top/Base Plane: Blue to Cyan (representing system matrix & grounding) -->
  <path
    d="M90,352 L256,256 L422,352 L256,448 Z"
    fill="url(#favTopGrad)"
    stroke="#070b14"
    stroke-width="6"
    stroke-linejoin="round"
  />

  {/* High-Precision Schematic Overlay (futuristic HUD wireframe) */}
  <line x1="90" y1="352" x2="256" y2="256" stroke="#ffffff" stroke-width="3" opacity="0.35" />
  <line x1="422" y1="352" x2="256" y2="256" stroke="#ffffff" stroke-width="3" opacity="0.35" />
  <line x1="256" y1="70" x2="256" y2="256" stroke="#ffffff" stroke-width="3" opacity="0.35" />

  {/* Left plane node track */}
  <path d="M150,210 L256,256" stroke="#ffffff" stroke-width="4" stroke-linecap="round" opacity="0.9" />
  <circle cx="150" cy="210" r="12" fill="#00d4ff" stroke="#ffffff" stroke-width="3" />

  {/* Right plane node track */}
  <path d="M362,210 L256,256" stroke="#ffffff" stroke-width="4" stroke-linecap="round" opacity="0.9" />
  <circle cx="362" cy="210" r="12" fill="#0d9488" stroke="#ffffff" stroke-width="3" />

  {/* Ground node track */}
  <path d="M256,370 L256,256" stroke="#ffffff" stroke-width="4" stroke-linecap="round" opacity="0.9" />
  <circle cx="256" cy="370" r="12" fill="#00d4ff" stroke="#ffffff" stroke-width="3" />

  {/* Central hub connection */}
  <circle cx="256" cy="256" r="16" fill="#ffffff" stroke="#00d4ff" stroke-width="6" />
  <circle cx="256" cy="256" r="6" fill="#070b14" />
</svg>
