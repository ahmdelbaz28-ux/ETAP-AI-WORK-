---
# Chaos Mesh experiments + weekly schedule
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: etap-chaos-mesh
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: etap-ai-platform
    app.kubernetes.io/component: chaos-engineering
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/ahmdelbaz28-ux/ETAP-AI-WORK-
    targetRevision: main
    path: 06-chaos-mesh
    directory:
      recurse: true
      exclude: 'values.yaml'
  destination:
    server: https://kubernetes.default.svc
    namespace: etap
  syncPolicy:
    # NOTE: NOT automated — chaos experiments should be applied manually
    # after validation. Set automated.prune=false to avoid ArgoCD deleting
    # experiments that are mid-flight.
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
    # Manual sync only. Use `argocd app sync etap-chaos-mesh` to apply.
