---
# Postgres HA (CloudNativePG) — raw manifests, no Helm
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: etap-postgres
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: etap-ai-platform
    app.kubernetes.io/component: database
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/ahmdelbaz28-ux/ETAP-AI-WORK-
    targetRevision: main
    path: 03-postgres-ha
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: etap
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true   # CNPG operator modifies resources on apply
  ignoreDifferences:
    - group: postgresql.cnpg.io
      kind: Cluster
      name: etap-postgres
      jsonPointers:
        - /status
