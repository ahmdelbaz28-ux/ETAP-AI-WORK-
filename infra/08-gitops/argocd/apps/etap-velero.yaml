---
# Velero backup schedules
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: etap-velero
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: etap-ai-platform
    app.kubernetes.io/component: backup
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/ahmdelbaz28-ux/ETAP-AI-WORK-
    targetRevision: main
    path: 04-velero-backups
    directory:
      recurse: true
      exclude: 'values.yaml'
  destination:
    server: https://kubernetes.default.svc
    namespace: velero
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
