---
# Redis Cluster — deployed via Bitnami Helm chart, values from this repo
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: etap-redis-cluster
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: etap-ai-platform
    app.kubernetes.io/component: redis
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/ahmdelbaz28-ux/ETAP-AI-WORK-
    targetRevision: main
    path: 02-redis-cluster
    helm:
      releaseName: etap-redis-cluster
      valueFiles:
        - values.yaml
    chart: redis-cluster
    # Bitnami chart repo — ArgoCD will use this to fetch the chart
    # Alternative: use a Helm repo configured in ArgoCD settings
  destination:
    server: https://kubernetes.default.svc
    namespace: etap
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
  ignoreDifferences:
    - group: ""
      kind: Secret
      name: etap-redis-cluster
      jsonPointers:
        - /data
