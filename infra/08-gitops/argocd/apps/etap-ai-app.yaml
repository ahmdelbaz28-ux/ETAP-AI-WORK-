---
# ETAP AI Helm chart — main application
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: etap-ai-app
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: etap-ai-platform
    app.kubernetes.io/component: application
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/ahmdelbaz28-ux/ETAP-AI-WORK-
    targetRevision: main
    path: 01-helm-chart/etap-ai
    helm:
      valueFiles:
        - values.yaml
        - values-production.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: etap
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
  ignoreDifferences:
    - group: ""
      kind: Secret
      name: etap-ai-secrets
      jsonPointers:
        - /data
    - group: ""
      kind: Secret
      name: etap-redis-cluster
      jsonPointers:
        - /data
    - group: ""
      kind: Secret
      name: etap-postgres-app
      jsonPointers:
        - /data
