---
# IMPORTANT: CloudNativePG auto-creates the `etap-postgres-app` secret during
# cluster bootstrap (see cnpg-cluster.yaml → bootstrap.initdb.secret.name).
# Do NOT create it here — that would cause a conflict and the operator would
# fail to start.
#
# To get the auto-generated password after the cluster is up:
#   kubectl -n etap get secret etap-postgres-app -o jsonpath='{.data.password}' | base64 -d
#
# This file only contains the S3 backup credentials secret.
---
# Secret holding the S3 credentials for barman-cloud WAL archive + backups.
# REPLACE the placeholders with real AWS (or MinIO / R2 / GCS-S3-interop) creds.
apiVersion: v1
kind: Secret
metadata:
  name: etap-postgres-backup
  namespace: etap
  labels:
    app.kubernetes.io/part-of: etap-ai-platform
    app.kubernetes.io/component: database-backup
type: Opaque
stringData:
  AWS_ACCESS_KEY_ID: "REPLACE_ME"
  AWS_SECRET_ACCESS_KEY: "REPLACE_ME"
  AWS_REGION: "us-east-1"
  AWS_ENDPOINT: "https://s3.amazonaws.com"
