# Tests for secret handling — verify the lookup() guard prevents Helm from
# overwriting user-created secrets with placeholder values.
suite: "secret handling"
tests:
  - it: "should create placeholder secrets when none exist (default values)"
    template: api-secret.yaml
    asserts:
      - isKind:
          of: Secret
      - equal:
          path: metadata.name
          value: etap-ai-secrets
      - equal:
          path: stringData.api-key
          value: "REPLACE_ME_WITH_ENGINEERING_SERVICE_API_KEY"
      - hasDocuments:
          count: 1
  - it: "should create Redis secret placeholder when redis.existingSecret is set"
    template: redis-secret.yaml
    asserts:
      - isKind:
          of: Secret
      - equal:
          path: metadata.name
          value: etap-redis-cluster
      - equal:
          path: stringData.redis-password
          value: "REPLACE_ME_WITH_REDIS_CLUSTER_PASSWORD"
      - hasDocuments:
          count: 1
  - it: "should NOT create Redis secret when redis.existingSecret is empty"
    set:
      redis.existingSecret: ""
    template: redis-secret.yaml
    asserts:
      - hasDocuments:
          count: 0
  - it: "should NOT create Redis secret when redis.existingSecret is null"
    set:
      redis.existingSecret: null
    template: redis-secret.yaml
    asserts:
      - hasDocuments:
          count: 0
