{{/*
Redis password secret — only create if it does NOT already exist.
*/}}
{{- if .Values.redis.existingSecret -}}
{{- $redisExisting := lookup "v1" "Secret" .Release.Namespace .Values.redis.existingSecret -}}
{{- if not $redisExisting -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.redis.existingSecret }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "etap-ai.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": "pre-install"
    "helm.sh/hook-delete-policy": "before-hook-creation"
    "helm.sh/resource-policy": "keep"
    "etap-ai.io/placeholder": "true"
type: Opaque
stringData:
  redis-password: "REPLACE_ME_WITH_REDIS_CLUSTER_PASSWORD"
{{- end -}}
{{- end -}}
