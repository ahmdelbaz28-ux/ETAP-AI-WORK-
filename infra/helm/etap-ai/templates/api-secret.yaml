{{/*
Secret for ETAP API key — only create if it does NOT already exist.
Uses Helm's `lookup` to detect pre-existing secrets created via
`make secrets` or `kubectl create secret`. Without this guard, Helm's
pre-install hook would DELETE the user-provided secret and replace it
with placeholder values.
*/}}
{{- $secretName := .Values.secrets.engineeringServiceApiKey.name -}}
{{- $existingSecret := lookup "v1" "Secret" .Release.Namespace $secretName -}}
{{- if not $existingSecret -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "etap-ai.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": "pre-install"
    "helm.sh/hook-delete-policy": "before-hook-creation"
    "helm.sh/resource-policy": "keep"
    "etap-ai.io/placeholder": "true"
type: Opaque
stringData:
  api-key: "REPLACE_ME_WITH_ENGINEERING_SERVICE_API_KEY"
  langwatch-api-key: "REPLACE_ME_OR_DELETE_IF_UNUSED"
  smithery-api-key: "REPLACE_ME_OR_DELETE_IF_UNUSED"
{{- end }}
