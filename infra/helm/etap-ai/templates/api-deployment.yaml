apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "etap-ai.fullname" . }}-api
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "etap-ai.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  {{- if not .Values.api.autoscaling.enabled }}
  replicas: {{ .Values.api.replicaCount }}
  {{- end }}
  revisionHistoryLimit: {{ .Values.api.revisionHistoryLimit }}
  selector:
    matchLabels:
      {{- include "etap-ai.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- with .Values.api.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "etap-ai.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: api
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "etap-ai.serviceAccountName" . }}
      automountServiceAccountToken: false
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      {{- with .Values.api.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.api.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.api.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.api.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      terminationGracePeriodSeconds: 60
      containers:
        - name: api
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: {{ include "etap-ai.image" (list . .Values.api.image) }}
          imagePullPolicy: {{ .Values.api.image.pullPolicy | default .Values.image.pullPolicy }}
          {{- with .Values.api.command }}
          command:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.api.args }}
          args:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.api.service.targetPort }}
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "etap-ai.fullname" . }}-config
          env:
            - name: ENGINEERING_SERVICE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.engineeringServiceApiKey.name }}
                  key: {{ .Values.secrets.engineeringServiceApiKey.key }}
                  optional: false
            {{- if .Values.redis.existingSecret }}
            # MUST come before REDIS_URL — $(REDIS_PASSWORD) is expanded at pod startup.
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.redis.existingSecret }}
                  key: {{ .Values.redis.existingSecretPasswordKey }}
            - name: REDIS_URL
              value: {{ include "etap-ai.redisUrl" . | quote }}
            - name: CELERY_BROKER_URL
              value: {{ include "etap-ai.celeryBrokerUrl" . | quote }}
            - name: CELERY_RESULT_BACKEND
              value: {{ include "etap-ai.celeryResultBackend" . | quote }}
            {{- end }}
            {{- if .Values.database.existingSecret }}
            # MUST come before DATABASE_URL.
            - name: DATABASE_USER
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.database.existingSecret }}
                  key: {{ .Values.database.existingSecretUserKey }}
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.database.existingSecret }}
                  key: {{ .Values.database.existingSecretPasswordKey }}
            - name: DATABASE_URL
              value: {{ include "etap-ai.databaseUrl" . | quote }}
            {{- end }}
            {{- with .Values.api.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- with .Values.api.probes.startup }}
          startupProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.api.probes.liveness }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.api.probes.readiness }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: app-logs
              mountPath: /app/logs
            - name: app-reports
              mountPath: /app/reports
            {{- with .Values.api.extraVolumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
      volumes:
        {{- if .Values.api.tmpDir.enabled }}
        - name: tmp
          emptyDir:
            sizeLimit: {{ .Values.api.tmpDir.sizeLimit }}
        {{- end }}
        - name: app-logs
          emptyDir: {}
        - name: app-reports
          emptyDir: {}
        {{- with .Values.api.extraVolumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
