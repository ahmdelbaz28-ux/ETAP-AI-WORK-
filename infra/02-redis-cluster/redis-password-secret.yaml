---
# Pre-create the Redis password secret BEFORE installing the Helm chart.
# Helm's `helm.sh/hook: pre-install` will only run when used by Helm directly;
# for plain `kubectl apply` of this manifest we don't need hooks.
#
# REPLACE the placeholder with: openssl rand -base64 32 | tr -d '/+=' | head -c 32
apiVersion: v1
kind: Secret
metadata:
  name: etap-redis-cluster
  namespace: etap
  labels:
    app.kubernetes.io/name: redis-cluster
    app.kubernetes.io/part-of: etap-ai-platform
type: Opaque
stringData:
  redis-password: "REPLACE_ME_WITH_32_CHAR_RANDOM_STRING"
---
# PodDisruptionBudget — keep quorum through node drains.
# A 6-node cluster tolerates losing 1 replica per shard (3 of 6 pods).
# Setting minAvailable=4 means: at most 2 pods down at any time.
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: etap-redis-cluster
  namespace: etap
  labels:
    app.kubernetes.io/name: redis-cluster
    app.kubernetes.io/part-of: etap-ai-platform
spec:
  minAvailable: 4
  selector:
    matchLabels:
      app.kubernetes.io/name: redis-cluster
