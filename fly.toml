app = "etap-ai-engineering"
primary_region = "iad"

[build]
  builder = "dockerfile"
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

[[services]]
  protocol = "tcp"
  internal_port = 8000
  [[services.ports]]
    port = 80
    handlers = ["http"]
    force_https = true
  [[services.ports]]
    port = 443
    handlers = ["tls"]

[env]
  PYTHON_VERSION = "3.13"
  ENGINEERING_SERVICE_HOST = "0.0.0.0"
  ENGINEERING_SERVICE_PORT = "8000"
  LOG_LEVEL = "INFO"
  ENVIRONMENT = "production"
