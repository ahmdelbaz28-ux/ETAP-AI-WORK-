### RULE #3: HOW TO ACCESS THE ETAP GUIDE

The ETAP User Guide is available through:

**Python API:**
```python
from etap_user_guide.etap_guide_rag import ETAPGuideRAG

# Initialize RAG engine
rag = ETAPGuideRAG()

# Get procedure for an operation
procedure = rag.get_etap_procedure("load flow analysis")

# Validate proposed steps
validation = rag.validate_etap_operation(
    "load flow analysis",
    ["Open ETAP", "Create project", "Add buses", "Run study"]
)

# Query specific question
answer = rag.query("How to add a transformer?")
```

**Direct File Access:**
- Extracted text: `etap_user_guide/extracted/*.txt`
- Text chunks: `etap_user_guide/chunks/*.json`
- Master index: `etap_user_guide/index/master_index.json`
- Original PDFs: `etap_user_guide/pdfs/*.pdf`

