# Alertmanager configuration for ETAP-AI-WORK
# SECURITY (P0-4): Alertmanager does NOT support ${ENV_VAR} substitution.
# The previous version used ${SMTP_HOST:localhost} syntax which would
# cause Alertmanager to fail parsing the config file.
#
# This config uses placeholder values that must be replaced before
# production deployment. Either:
# 1. Edit this file directly with real SMTP/Slack values, OR
# 2. Use a config management tool (Helm, envsubst, sed) to inject values, OR
# 3. Set up alertmanager with --config.file pointing to a generated config

global:
  # Replace 'localhost:25' with your SMTP server before production deploy
  smtp_smarthost: 'localhost:25'
  smtp_from: 'alertmanager@etap.local'
  # Remove auth if your SMTP doesn't require it
  smtp_auth_username: ''
  smtp_auth_password: ''
  smtp_require_tls: false

route:
  group_by: ['alertname', 'cluster', 'service']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 3h
  receiver: default

  routes:
    - matchers:
        - severity = "slack"
      receiver: slack_general

    - matchers:
        - service = "engineering"
      receiver: engineering_alerts

    - matchers:
        - service = "etap"
      receiver: etap_notifications

receivers:
  - name: 'default'
    email_configs:
    - to: 'admin@etap.local'
      send_resolved: true

  - name: 'slack_general'
    slack_configs:
    - channel: '#alerts'
      text: '{{ .CommonAnnotations.summary }}'
      # Replace with real webhook URL before production deploy
      api_url: 'http://localhost/disabled'
      send_resolved: true

  - name: 'engineering_alerts'
    slack_configs:
    - channel: '#engineering-alerts'
      text: '{{ .CommonAnnotations.summary }}'
      api_url: 'http://localhost/disabled'
      send_resolved: true

  - name: 'etap_notifications'
    slack_configs:
    - channel: '#etap-notifications'
      text: '{{ .CommonAnnotations.summary }}'
      api_url: 'http://localhost/disabled'
      send_resolved: true

inhibit_rules:
  - source_matchers:
      - severity = "critical"
    target_matchers:
      - severity = "warning"
    equal: ['alertname', 'cluster', 'service']
