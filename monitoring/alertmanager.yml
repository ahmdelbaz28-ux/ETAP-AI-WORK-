# Alertmanager configuration for ETAP-AI-WORK
# Defines notification routing, inhibition rules, and receiver configurations

global:
  # The smarthost and SMTP sender used for notifications.
  smtp_smarthost: 'localhost:25'
  smtp_from: 'alertmanager@example.org'
  smtp_auth_username: 'alertmanager'
  smtp_auth_password: 'password'

# The root route on which each incoming alert enters.
route:
  # The labels by which incoming alerts are grouped together. For example,
  # multiple alerts coming in for cluster=A and alertname=LatencyHigh would
  # be batched into a single group.
  group_by: ['alertname', 'cluster', 'service']

  # When a new group of alerts is created by an incoming alert, wait at
  # least 'group_wait' to send the initial notification.
  # This way ensures a single alert that frequently changes won't cause a lot of
  # notification spam.
  group_wait: 30s

  # When the first notification was sent, wait 'group_interval' to send a batch
  # of new alerts that started firing for that group.
  group_interval: 5m

  # If an alert has successfully been sent, wait 'repeat_interval' to
  # resend them.
  repeat_interval: 3h

  # A default receiver
  receiver: default

  # All the above attributes are inherited by all child routes and can
  # overwritten on each.

  # The child route trees.
  routes:
    # Send severity=slack alerts to slack.
    - match:
        severity: slack
      receiver: slack_general

    # Send alerts with service=engineering to dedicated receiver
    - match:
        service: engineering
      receiver: engineering_alerts

    # Send alerts with service=etap to dedicated receiver
    - match:
        service: etap
      receiver: etap_notifications

receivers:
  - name: 'default'
    email_configs:
    - to: 'admin@example.org'
      from: 'alertmanager@example.org'
      smarthost: 'localhost:25'
      auth_username: 'alertmanager'
      auth_identity: 'alertmanager'
      auth_password: 'password'

  - name: 'slack_general'
    slack_configs:
    - channel: '#alerts'
      text: '{{ template "slack.default.text" . }}'
      api_url: 'https://hooks.slack.com/services/YOUR/SLACK/WEBHOOK'

  - name: 'engineering_alerts'
    slack_configs:
    - channel: '#engineering-alerts'
      text: '{{ template "slack.default.text" . }}'
      api_url: 'https://hooks.slack.com/services/YOUR/ENGINEERING/WEBHOOK'

  - name: 'etap_notifications'
    slack_configs:
    - channel: '#etap-notifications'
      text: '{{ template "slack.default.text" . }}'
      api_url: 'https://hooks.slack.com/services/YOUR/ETAP/WEBHOOK'

# Inhibition rules allow to mute a set of alerts given that another alert is
# firing.
# We use this to mute any warning-level notifications if the same alert is
# already critical.
inhibit_rules:
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    # Apply inhibition if the alertname is the same.
    equal: ['alertname', 'cluster', 'service']