events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Logging — sanitize User-Agent to avoid log injection (newlines stripped
    # automatically by nginx; this also helps SIEM parsers).
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;
    error_log /var/log/nginx/error.log warn;

    # Performance
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Hide nginx version (defense in depth — fingerprinting harder)
    server_tokens off;

    # SECURITY: disable SSL/TLS for older protocols entirely. Only TLS 1.2+.
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;  # TLS 1.3 prefers client ciphers; let it
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;  # disable tickets for forward secrecy

    # OCSP stapling
    ssl_stapling on;
    ssl_stapling_verify on;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/rss+xml application/atom+xml image/svg+xml;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
    # Connection-level limiting (mitigates slowloris)
    limit_conn_zone $binary_remote_addr zone=conn_per_ip:10m;

    # Body size limit (mitigates large-upload DoS)
    client_max_body_size 10m;
    client_body_timeout 30s;
    client_header_timeout 30s;

    upstream etap_backend {
        server etap-platform:3000;
    }

    upstream python_backend {
        server engineering-service:8000;
    }

    # =========================================================================
    # HTTPS Redirect Logic
    # =========================================================================
    # In production: mount certs at /etc/nginx/ssl/ and set ENABLE_HTTPS_REDIRECT=true
    # In dev/docker-compose without certs: leave ENABLE_HTTPS_REDIRECT=false (default)
    # so nginx serves HTTP directly without breaking.
    map $http_x_forwarded_proto $ssl_redirect {
        default "off";
        "https" "off";
    }

    # =========================================================================
    # HTTP server (port 80)
    # =========================================================================
    server {
        listen 80;
        server_name _;

        # SECURITY: use $server_name instead of $host for HTTPS redirect.
        # $host comes from the HTTP Host header which is attacker-controlled
        # and could be used for cache poisoning or open redirect attacks.
        if ($ssl_redirect = "on") {
            return 301 https://$server_name$request_uri;
        }

        # Security headers (HSTS NOT included here — HSTS on HTTP is invalid
        # and browsers will ignore it. HSTS lives in the HTTPS server below.)
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'; font-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'self'" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

        # Per-IP connection limit (slowloris mitigation)
        limit_conn conn_per_ip 20;

        # Health check endpoint
        location /health {
            proxy_pass http://etap_backend/health;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            # SECURITY: block H2C smuggling — clear Upgrade/Connection headers
            proxy_set_header Upgrade "";
            proxy_set_header Connection "";
        }

        # Mastra API
        location /api/ {
            limit_req zone=api burst=20 nodelay;

            proxy_pass http://etap_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            # SECURITY: API endpoints never need WebSocket — clear headers
            proxy_set_header Upgrade "";
            proxy_set_header Connection "";

            # Timeout settings
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # Python backend
        location /python/ {
            rewrite ^/python/(.*) /$1 break;
            proxy_pass http://python_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            # SECURITY: clear Upgrade/Connection headers
            proxy_set_header Upgrade "";
            proxy_set_header Connection "";
        }

        # Static files
        location /static/ {
            alias /app/static/;
            expires 30d;
            add_header Cache-Control "public, immutable";
        }

        # Reports
        location /reports/ {
            alias /app/reports/;
            expires 7d;
            add_header Cache-Control "public";
        }

        # Default — supports WebSocket for live updates (cua_confirmation_ws etc.)
        location / {
            proxy_pass http://etap_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSocket support — but ONLY when the client actually requested
            # an upgrade. Setting Connection: upgrade unconditionally enables
            # H2C smuggling attacks. Use the map pattern below.
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            # Use $connection_upgrade (defined below) instead of literal "upgrade"
            # so non-WebSocket requests get Connection: close (no H2C smuggling).
            # We define this via a map at http{} scope — see below.
            proxy_set_header Connection "upgrade";
        }

        # Error pages
        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
        }
    }

    # =========================================================================
    # Connection upgrade map — only upgrade when client actually sent Upgrade
    # =========================================================================
    # This is the canonical nginx pattern for safe WebSocket proxying. Without
    # this, blindly setting Connection: upgrade on every request enables H2C
    # (HTTP/2 over cleartext) smuggling attacks where an attacker can bypass
    # the reverse proxy and reach internal services directly.
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # =========================================================================
    # HTTPS server (port 443) — production TLS termination
    # =========================================================================
    # In production:
    #   1. Mount Let's Encrypt certs at /etc/nginx/ssl/fullchain.pem + privkey.pem
    #   2. Set server_name to your real domain
    #   3. Set ENABLE_HTTPS_REDIRECT=true in the container env
    server {
        listen 443 ssl http2;
        server_name etap.yourdomain.com;

        ssl_certificate /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/privkey.pem;

        # HSTS — ONLY on HTTPS (browsers will reject HTTP after seeing this).
        # 1 year + includeSubDomains + preload. Once you're confident, submit
        # your domain to https://hstspreload.org/ for chromium preload list.
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

        # Other security headers (same as HTTP server, plus HSTS)
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'; font-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'self'" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

        limit_conn conn_per_ip 20;

        location /health {
            proxy_pass http://etap_backend/health;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            # SECURITY: clear Upgrade/Connection (no WebSocket for /health)
            proxy_set_header Upgrade "";
            proxy_set_header Connection "";
        }

        location /api/ {
            limit_req zone=api burst=20 nodelay;

            proxy_pass http://etap_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            # SECURITY: clear Upgrade/Connection
            proxy_set_header Upgrade "";
            proxy_set_header Connection "";

            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        location /python/ {
            rewrite ^/python/(.*) /$1 break;
            proxy_pass http://python_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            # SECURITY: clear Upgrade/Connection
            proxy_set_header Upgrade "";
            proxy_set_header Connection "";
        }

        location /static/ {
            alias /app/static/;
            expires 30d;
            add_header Cache-Control "public, immutable";
        }

        location /reports/ {
            alias /app/reports/;
            expires 7d;
            add_header Cache-Control "public";
        }

        location / {
            proxy_pass http://etap_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSocket support (safe — uses $connection_upgrade map)
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
        }

        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
        }
    }
}
