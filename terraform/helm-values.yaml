# =============================================================================
# AhmedETAP — Helm Values Template
# =============================================================================
# This template is rendered by Terraform with actual infrastructure outputs
# (AKS, database, Redis, etc.) before being passed to helm_release.
# =============================================================================

# Docker image settings
image:
  repository: "${image_registry}/etap-engineering-service"
  tag: "${image_tag}"
  pullPolicy: Always

# Environment
environment: "${environment}"

# PostgreSQL configuration
postgresql:
  host: "${postgresql_host}"
  port: ${postgresql_port}
  database: "${postgresql_database}"
  username: "${postgresql_user}"
  password: "${postgresql_password}"
  ssl: required

# Redis configuration
redis:
  host: "${redis_host}"
  port: ${redis_port}
  password: "${redis_password}"
  ssl: true

# Ingress configuration
ingress:
  enabled: true
  domain: "${ingress_domain}"
  tls:
    enabled: ${ingress_tls}
    letsEncrypt: true
  annotations:
    kubernetes.io/ingress.class: azure/application-gateway
    appgw.ingress.kubernetes.io/use-private-ip: "false"

# Resource limits
resources:
  api:
    requests:
      memory: "512Mi"
      cpu: "250m"
    limits:
      memory: "2Gi"
      cpu: "1000m"
  worker:
    requests:
      memory: "512Mi"
      cpu: "250m"
    limits:
      memory: "4Gi"
      cpu: "2000m"

# Scaling
autoscaling:
  api:
    enabled: true
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 75
  worker:
    enabled: true
    minReplicas: 1
    maxReplicas: 5
    targetCPUUtilizationPercentage: 75

# Monitoring
monitoring:
  enabled: true
  podAnnotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "8000"
    prometheus.io/path: "/metrics"

# Security
security:
  networkPolicy:
    enabled: true
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 1000
    fsGroup: 1000
