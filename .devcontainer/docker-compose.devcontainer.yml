# =============================================================================
# AhmedETAP AI Engineering Platform — Devcontainer Docker Compose
# =============================================================================
# This is a self-contained compose file for VS Code "Dev Containers".
# The devenv-builder service is the devcontainer; the remaining services
# are the application infrastructure needed during local development.
#
# Services:
#   devenv-builder   — VS Code devcontainer (editor terminal, extensions)
#   redis            — In-memory queue / cache (optional: ENGINEERING_SERVICE
#                       falls back to in-memory when REDIS_URL is absent)
#   postgres         — Persistence (optional: sqlite fallback used development)
#   grafana          — Metrics dashboard (optional, for monitoring profiles)
# =============================================================================

services:

  devenv-builder:
    build:
      context: .
      dockerfile: .devcontainer/Dockerfile
    image: etap-ai-devcontainer:latest
    container_name: etap-devenv
    volumes:
      - ..:/workspace:cached
      - pip-cache:/root/.cache/pip
    working_dir: /workspace
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=sqlite+aiosqlite:////workspace/.venv312/data/dev.db
      - ENVIRONMENT=development
      - NODE_ENV=development
      - SKIP_LIVE_SCENARIO_TESTS=true
    command: sleep infinity
    networks:
      - etap_network
    depends_on:
      redis:
        condition: service_healthy
    user: devenv

  redis:
    image: redis:7-alpine
    container_name: etap-redis-dev
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --loglevel warning --save "" --appendonly no
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - etap_network

  postgres:
    image: postgres:15-alpine
    container_name: etap-postgres-dev
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-etap_dev}
      POSTGRES_USER: ${POSTGRES_USER:-etap}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dev_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-etap}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - etap_network

  grafana:
    image: grafana/grafana-oss:11.0.0
    container_name: etap-grafana-dev
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_storage:/var/lib/grafana
    networks:
      - etap_network
    profiles:
      - monitoring

  qdrant:
    image: qdrant/qdrant:1.12.4
    container_name: etap-qdrant-dev
    ports:
      - "6333:6333"
    volumes:
      - qdrant_storage:/qdrant/storage
    networks:
      - etap_network
    profiles:
      - monitoring

  neo4j:
    image: neo4j:5-community
    container_name: etap-neo4j-dev
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=neo4j/${NEO4J_PASSWORD:-dev_password}
    volumes:
      - neo4j_data:/data
    networks:
      - etap_network
    profiles:
      - monitoring

networks:
  etap_network:
    driver: bridge

volumes:
  redis_data:
  postgres_data:
  grafana_storage:
  qdrant_storage:
  neo4j_data:
