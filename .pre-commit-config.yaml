repos:
  # ── Stage 1: Code Quality ──────────────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        # Validate ALL yaml files (workflows + prompts + config)
        files: \.(yaml|yml)$
        # Allow files with multi-doc YAML (like CI configs sometimes use)
        args: [--allow-multiple-documents]
      - id: check-added-large-files
        args: [--maxkb=1024]  # Block files >1MB
      - id: check-merge-conflict
      - id: detect-private-key
      - id: check-toml
      - id: check-json
        # Skip known-broken JSON files (e.g., search indexes)
        exclude: |
          (?x)^(
            ui/src/components/command/search-index-data.json|
            ui/src/help/search-index.json|
            qgis_complete_documentation_index.json|
            qgis_scada_layer.py|
            arcgis_pro_sdk_repositories_analysis.json|
            etap_user_guide/extraction_summary.json|
            zenon_user_guide/extraction_summary.json|
            benchmarks/benchmark-report.json|
            benchmarks/zbus_lu_comparison.json
          )$
      - id: check-case-conflict
      - id: check-shebang-scripts-are-executable

  # ── Stage 2: Secret Detection (CRITICAL — must run before push) ───
  - repo: https://github.com/trufflesecurity/trufflehog
    rev: v3.83.6
    hooks:
      - id: trufflehog
        name: 🔍 TruffleHog secret scan (verified)
        # Only fail on VERIFIED secrets (real, reachable credentials)
        # Unverified secrets produce warnings, not failures
        args: ['--no-update', '--only-verified', '--results=verified,unknown,verified_api']
        # Scan only the diff (the changed lines), not the entire repo
        pass_filenames: false
        always_run: true

  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        name: 🔍 detect-secrets (baseline + new)
        args: ['--baseline', '.secrets.baseline']
        # Generate baseline: detect-secrets scan > .secrets.baseline
        # (run once to establish known-safe state)
        exclude: |
          (?x)^(
            \.git/.*|
            package-lock\.json|
            pnpm-lock\.yaml|
            ui/package-lock\.json|
            \.secrets\.baseline
          )$

  # ── Stage 3: Python Linting ────────────────────────────────────────
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.0
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  # ── Stage 4: Python Security (Bandit) ─────────────────────────────
  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.10
    hooks:
      - id: bandit
        name: 🛡️ Bandit SAST scan
        args:
          - --ini
          - .bandit
          - -ll  # Medium+High severity only
          - -ii  # Medium+High confidence only
        # Skip tests + benchmarks + virtualenvs
        exclude: |
          (?x)^(
            tests/.*|
            benchmarks/.*|
            acp_runtime/acp_tests/.*|
            testsprite_tests/.*|
            \.venv/.*|
            venv/.*
          )$

  # ── Stage 5: Type Checking (manual only — requires pyright installed) ──
  - repo: local
    hooks:
      - id: type-check
        name: type check
        entry: pyright
        language: system
        types: [python]
        pass_filenames: false
        stages: [manual]

  # ── Stage 6: Fast Tests ────────────────────────────────────────────
  - repo: local
    hooks:
      - id: fast-tests
        name: fast tests
        entry: pytest -x -q --timeout=60 -m "not slow"
        language: system
        types: [python]
        pass_filenames: false
        stages: [push]

  # ── Stage 7: Skill Schema Validation ────────────────────────────────
  - repo: local
    hooks:
      - id: validate-skill-schema
        name: validate skill schemas
        entry: python -m pytest tests/property_based/ -x -q --timeout=30
        language: system
        pass_filenames: false
        files: ^skills/.*\.py$

  # ── Stage 8: Prompt Validation ─────────────────────────────────────
  - repo: local
    hooks:
      - id: validate-prompts
        name: Validate YAML Prompt Files
        entry: python3 scripts/validate_prompts.py --strict
        language: system
        files: ^prompts/.*\.yaml$
        pass_filenames: false

  # ── Stage 9: Custom Security Scan ──────────────────────────────────
  - repo: local
    hooks:
      - id: security-scan
        name: Security Scan
        entry: python scripts/security_scan.py
        language: system
        pass_filenames: false
        always_run: true
