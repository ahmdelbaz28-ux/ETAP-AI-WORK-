---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "etap-ai.fullname" . }}-api
  labels:
    {{- include "etap-ai.labels" . | nindent 4 }}
    component: api
spec:
  type: {{ .Values.api.service.type }}
  ports:
    - port: {{ .Values.api.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "etap-ai.selectorLabels" . | nindent 4 }}
    component: api

---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "etap-ai.fullname" . }}-worker
  labels:
    {{- include "etap-ai.labels" . | nindent 4 }}
    component: worker
spec:
  clusterIP: None  # Headless service for stateful sets if needed
  ports:
    - port: 5678
      targetPort: 5678
      protocol: TCP
      name: celery
  selector:
    {{- include "etap-ai.selectorLabels" . | nindent 4 }}
    component: worker