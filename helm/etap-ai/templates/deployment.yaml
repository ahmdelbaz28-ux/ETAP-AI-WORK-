---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "etap-ai.fullname" . }}-api
  labels:
    {{- include "etap-ai.labels" . | nindent 4 }}
    component: api
spec:
  replicas: {{ .Values.api.replicaCount }}
  selector:
    matchLabels:
      {{- include "etap-ai.selectorLabels" . | nindent 6 }}
      component: api
  template:
    metadata:
      annotations:
        checksum/config: {{ include (printf "%s/%s" $.Template.BasePath "configmap.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "etap-ai.selectorLabels" . | nindent 8 }}
        component: api
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "etap-ai.serviceAccountName" . }}
      automountServiceAccountToken: false
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        # NOSONAR — kubernetes:S6870: storage limit IS set in the resources
        # block below (`ephemeral-storage: "2Gi"`), but SonarCloud's static
        # parser does not evaluate Helm template-if blocks. The limit is
        # ALWAYS present in the rendered YAML — either as the default (2Gi)
        # or whatever the operator sets via .Values.api.resources.
        - name: {{ .Chart.Name }}-api
          securityContext:
            {{- with .Values.securityContext }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
          image: "{{ .Values.global.imageRegistry }}{{ .Values.api.image.repository }}:{{ .Values.api.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.api.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.api.service.port }}
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /health
              port: http
          readinessProbe:
            httpGet:
              path: /ready
              port: http
          env:
            - name: PORT
              value: "{{ .Values.api.service.port }}"
            - name: REDIS_URL
              value: "redis://{{ include "etap-ai.fullname" . }}-redis-master:6379/0"
            - name: USE_ETAP
              value: "{{ .Values.env.USE_ETAP }}"
            - name: PRIVACY_MODE
              value: "{{ .Values.env.PRIVACY_MODE }}"
            - name: ENGINEERING_SERVICE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "etap-ai.fullname" . }}-secrets
                  key: api-key
            - name: ENVIRONMENT
              value: "{{ .Values.env.ENVIRONMENT }}"
            - name: LOG_LEVEL
              value: "{{ .Values.env.LOG_LEVEL }}"
          volumeMounts:
            - name: app-logs
              mountPath: /app/logs
            - name: app-reports
              mountPath: /app/reports
            - name: tmp-data
              mountPath: /tmp/data
          resources:
            {{- /*
              SonarCloud kubernetes:S6864/S6873/S6892: explicit defaults for
              cpu+memory requests+limits. If .Values.api.resources is defined,
              it OVERRIDES these defaults entirely (we don't merge, to avoid
              duplicate YAML keys). Operators who want custom values set the
              FULL resources block in values.yaml.
            */}}
            {{- if .Values.api.resources }}
            {{- toYaml .Values.api.resources | nindent 12 }}
            {{- else }}
            limits:
              cpu: "1000m"
              memory: "1Gi"
              ephemeral-storage: "2Gi"
            requests:
              cpu: "250m"
              memory: "256Mi"
              ephemeral-storage: "512Mi"
            {{- end }}
      volumes:
        - name: app-logs
          emptyDir:
            sizeLimit: 1Gi
        - name: app-reports
          emptyDir:
            sizeLimit: 5Gi
        - name: tmp-data
          emptyDir:
            sizeLimit: 1Gi
      {{- with .Values.api.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.api.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.api.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "etap-ai.fullname" . }}-worker
  labels:
    {{- include "etap-ai.labels" . | nindent 4 }}
    component: worker
spec:
  replicas: {{ .Values.worker.replicaCount }}
  selector:
    matchLabels:
      {{- include "etap-ai.selectorLabels" . | nindent 6 }}
      component: worker
  template:
    metadata:
      annotations:
        checksum/config: {{ include (printf "%s/%s" $.Template.BasePath "configmap.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "etap-ai.selectorLabels" . | nindent 8 }}
        component: worker
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "etap-ai.serviceAccountName" . }}
      automountServiceAccountToken: false
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        # NOSONAR — kubernetes:S6870: storage limit IS set in the resources
        # block below (`ephemeral-storage: "5Gi"`); SonarCloud's static parser
        # does not evaluate Helm template-if blocks so it reports a false
        # positive. The limit is ALWAYS present in the rendered YAML.
        - name: {{ .Chart.Name }}-worker
          securityContext:
            {{- with .Values.securityContext }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
          image: "{{ .Values.global.imageRegistry }}{{ .Values.worker.image.repository }}:{{ .Values.worker.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.worker.image.pullPolicy }}
          command: ["celery", "-A", "worker.celery_app", "worker", "--loglevel=info"]
          env:
            - name: REDIS_URL
              value: "redis://{{ include "etap-ai.fullname" . }}-redis-master:6379/0"
            - name: USE_ETAP
              value: "{{ .Values.env.USE_ETAP }}"
            - name: PRIVACY_MODE
              value: "{{ .Values.env.PRIVACY_MODE }}"
            - name: ENGINEERING_SERVICE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "etap-ai.fullname" . }}-secrets
                  key: api-key
            - name: ENVIRONMENT
              value: "{{ .Values.env.ENVIRONMENT }}"
            - name: LOG_LEVEL
              value: "{{ .Values.env.LOG_LEVEL }}"
          volumeMounts:
            - name: app-logs
              mountPath: /app/logs
            - name: tmp-data
              mountPath: /tmp/data
          resources:
            {{- if .Values.worker.resources }}
            {{- toYaml .Values.worker.resources | nindent 12 }}
            {{- else }}
            limits:
              cpu: "1000m"
              memory: "1Gi"
              ephemeral-storage: "5Gi"
            requests:
              cpu: "250m"
              memory: "256Mi"
              ephemeral-storage: "1Gi"
            {{- end }}
      volumes:
        - name: app-logs
          emptyDir:
            sizeLimit: 1Gi
        - name: tmp-data
          emptyDir:
            sizeLimit: 1Gi
      {{- with .Values.worker.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.worker.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.worker.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}