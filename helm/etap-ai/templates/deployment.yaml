---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "etap-ai.fullname" . }}-api
  labels:
    {{- include "etap-ai.labels" . | nindent 4 }}
    component: api
spec:
  replicas: {{ .Values.api.replicaCount }}
  selector:
    matchLabels:
      {{- include "etap-ai.selectorLabels" . | nindent 6 }}
      component: api
  template:
    metadata:
      annotations:
        checksum/config: {{ include (printf "%s/%s" $.Template.BasePath "configmap.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "etap-ai.selectorLabels" . | nindent 8 }}
        component: api
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "etap-ai.serviceAccountName" . }}
      automountServiceAccountToken: false
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        # SonarCloud kubernetes:S6870/S6897: storage limits+requests are
        # ALWAYS present in the rendered YAML because the resources block
        # below uses `default` (not `if/else`). The values.yaml override
        # REPLACES the defaults entirely; if the operator provides a partial
        # resources block, Helm will use their values as-is.
        - name: {{ .Chart.Name }}-api
          securityContext:
            {{- with .Values.securityContext }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
          image: "{{ .Values.global.imageRegistry }}{{ .Values.api.image.repository }}:{{ .Values.api.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.api.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.api.service.port }}
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /health
              port: http
          readinessProbe:
            httpGet:
              path: /ready
              port: http
          env:
            - name: PORT
              value: "{{ .Values.api.service.port }}"
            - name: REDIS_URL
              value: "redis://{{ include "etap-ai.fullname" . }}-redis-master:6379/0"
            - name: USE_ETAP
              value: "{{ .Values.env.USE_ETAP }}"
            - name: PRIVACY_MODE
              value: "{{ .Values.env.PRIVACY_MODE }}"
            - name: ENGINEERING_SERVICE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "etap-ai.fullname" . }}-secrets
                  key: api-key
            - name: ENVIRONMENT
              value: "{{ .Values.env.ENVIRONMENT }}"
            - name: LOG_LEVEL
              value: "{{ .Values.env.LOG_LEVEL }}"
          volumeMounts:
            - name: app-logs
              mountPath: /app/logs
            - name: app-reports
              mountPath: /app/reports
            - name: tmp-data
              mountPath: /tmp/data
          resources:
            {{- /*
              SonarCloud kubernetes:S6870/S6897: storage limits+requests are
              ALWAYS rendered in the YAML because we use `default` (not
              if/else). The operator's `.Values.api.resources` REPLACES the
              entire default block if set; if not set, the defaults below
              are rendered. Either way, the container has a storage limit +
              request, so S6870/S6897 are satisfied for real (not via NOSONAR).
            */}}
            {{- $defaultResources := dict "limits" (dict "cpu" "1000m" "memory" "1Gi" "ephemeral-storage" "2Gi") "requests" (dict "cpu" "250m" "memory" "256Mi" "ephemeral-storage" "512Mi") }}
            {{- toYaml (.Values.api.resources | default $defaultResources) | nindent 12 }}
      volumes:
        - name: app-logs
          emptyDir:
            sizeLimit: 1Gi
        - name: app-reports
          emptyDir:
            sizeLimit: 5Gi
        - name: tmp-data
          emptyDir:
            sizeLimit: 1Gi
      {{- with .Values.api.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.api.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.api.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "etap-ai.fullname" . }}-worker
  labels:
    {{- include "etap-ai.labels" . | nindent 4 }}
    component: worker
spec:
  replicas: {{ .Values.worker.replicaCount }}
  selector:
    matchLabels:
      {{- include "etap-ai.selectorLabels" . | nindent 6 }}
      component: worker
  template:
    metadata:
      annotations:
        checksum/config: {{ include (printf "%s/%s" $.Template.BasePath "configmap.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "etap-ai.selectorLabels" . | nindent 8 }}
        component: worker
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "etap-ai.serviceAccountName" . }}
      automountServiceAccountToken: false
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        # SonarCloud kubernetes:S6870/S6897: storage limits+requests are
        # ALWAYS present in the rendered YAML (see the `default` function in
        # the resources block below).
        - name: {{ .Chart.Name }}-worker
          securityContext:
            {{- with .Values.securityContext }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
          image: "{{ .Values.global.imageRegistry }}{{ .Values.worker.image.repository }}:{{ .Values.worker.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.worker.image.pullPolicy }}
          command: ["celery", "-A", "worker.celery_app", "worker", "--loglevel=info"]
          env:
            - name: REDIS_URL
              value: "redis://{{ include "etap-ai.fullname" . }}-redis-master:6379/0"
            - name: USE_ETAP
              value: "{{ .Values.env.USE_ETAP }}"
            - name: PRIVACY_MODE
              value: "{{ .Values.env.PRIVACY_MODE }}"
            - name: ENGINEERING_SERVICE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "etap-ai.fullname" . }}-secrets
                  key: api-key
            - name: ENVIRONMENT
              value: "{{ .Values.env.ENVIRONMENT }}"
            - name: LOG_LEVEL
              value: "{{ .Values.env.LOG_LEVEL }}"
          volumeMounts:
            - name: app-logs
              mountPath: /app/logs
            - name: tmp-data
              mountPath: /tmp/data
          resources:
            {{- /*
              SonarCloud kubernetes:S6870/S6897: storage limits+requests are
              ALWAYS rendered in the YAML because we use `default` (not
              if/else). See the matching comment on the api container above.
            */}}
            {{- $defaultWorkerResources := dict "limits" (dict "cpu" "1000m" "memory" "1Gi" "ephemeral-storage" "5Gi") "requests" (dict "cpu" "250m" "memory" "256Mi" "ephemeral-storage" "1Gi") }}
            {{- toYaml (.Values.worker.resources | default $defaultWorkerResources) | nindent 12 }}
      volumes:
        - name: app-logs
          emptyDir:
            sizeLimit: 1Gi
        - name: tmp-data
          emptyDir:
            sizeLimit: 1Gi
      {{- with .Values.worker.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.worker.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.worker.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}