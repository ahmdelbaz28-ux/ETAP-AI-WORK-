{{- if .Values.serviceAccount.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "etap-ai.serviceAccountName" . }}
  labels:
    {{- include "etap-ai.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
# SECURITY (LB-6): automountServiceAccountToken: false prevents pods from
# automatically mounting the SA token — reduces blast radius if a pod is
# compromised. Pods that need API access must explicitly request it.
automountServiceAccountToken: {{ .Values.serviceAccount.automountServiceAccountToken | default false }}
{{- end }}
