# Default values for etap-ai.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

global:
  imageRegistry: ""
  imagePullSecrets: []
  storageClass: ""

image:
  repository: etap-ai-platform/engineering-service
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: "etap-ai"

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

podAnnotations: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 1000

# API Service Configuration
api:
  replicaCount: 2
  image:
    repository: etap-ai-platform/engineering-service
    pullPolicy: IfNotPresent
    tag: ""
  service:
    type: ClusterIP
    port: 8000
  ingress:
    enabled: false
    className: ""
    annotations: {}
      # kubernetes.io/ingress.class: nginx
      # kubernetes.io/tls-acme: "true"
    hosts:
      - host: chart-example.local
        paths:
          - path: /
            pathType: ImplementationSpecific
    tls: []
    #  - secretName: chart-example-tls
    #    hosts:
    #      - chart-example.local
  resources:
    limits:
      cpu: 500m
      memory: 1Gi
    requests:
      cpu: 250m
      memory: 512Mi
  nodeSelector: {}
  tolerations: []
  affinity: {}

# Celery Worker Configuration
worker:
  replicaCount: 2
  image:
    repository: etap-ai-platform/engineering-service
    pullPolicy: IfNotPresent
    tag: ""
  resources:
    limits:
      cpu: 500m
      memory: 1Gi
    requests:
      cpu: 250m
      memory: 512Mi
  nodeSelector: {}
  tolerations: []
  affinity: {}

# Redis Configuration
redis:
  enabled: true
  architecture: standalone
  auth:
    # SECURITY: must be true in production. Set redis.auth.password via
    # `--set redis.auth.password=<strong-password>` or via a sealed Secret.
    enabled: true
    password: ""
  master:
    persistence:
      enabled: true
      size: 8Gi
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 250m
      memory: 256Mi

# Environment Variables
env:
  ENVIRONMENT: production
  PORT: 8000
  REDIS_URL: redis://etap-ai-redis-master:6379/0
  USE_ETAP: "false"
  PRIVACY_MODE: "true"
  # SECURITY: empty by default — operator MUST override with
  # `--set env.ENGINEERING_SERVICE_API_KEY=<real-key>` (or via a custom values file).
  # The deployment will fail-fast at startup if this is empty.
  ENGINEERING_SERVICE_API_KEY: ""
  LOG_LEVEL: "INFO"

# Database Configuration
database:
  persistence:
    enabled: true
    size: 10Gi
    storageClass: ""

# Resource limits and requests
resources:
  limits:
    cpu: 1000m
    memory: 2Gi
  requests:
    cpu: 500m
    memory: 1Gi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

nodeSelector: {}

tolerations: []

affinity: {}

# Network Policy Configuration (Zero-Trust)
networkPolicy:
  # Set to true to enforce zero-trust network policies
  enabled: true
  # Labels used to identify the Ingress controller pods and namespace
  # Adjust these to match your cluster's Ingress controller deployment
  ingressController:
    namespaceLabels:
      kubernetes.io/metadata.name: ingress-nginx
    podLabels:
      app.kubernetes.io/name: ingress-nginx