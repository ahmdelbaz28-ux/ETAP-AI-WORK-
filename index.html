<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ahmed ETAP – تسجيل الدخول</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap"
        rel="stylesheet">
</head>
<body>
  <!-- Animated grid background -->
  <canvas id="grid-canvas"></canvas>
  <div class="login-card">
    <!-- Logo -->
    <img src="assets/ahmed_etap_logo.png" alt="Ahmed ETAP logo" class="logo">
    <!-- Program title -->
    <h1>Ahmed ETAP</h1>
    <!-- Login form -->
    <form class="login-form">
      <input type="text" placeholder="اسم المستخدم" required>
      <input type="password" placeholder="كلمة المرور" required>
      <button type="submit">تسجيل الدخول</button>
    </form>
    <!-- Hand / Arm illustration -->
    <div class="hand-touch">
      <img src="assets/human_hand.png"
           alt="يد بشرية"
           class="hand human">
      <img src="assets/robotic_arm.png"
           alt="ذراع إنسانية"
           class="hand robot">
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
