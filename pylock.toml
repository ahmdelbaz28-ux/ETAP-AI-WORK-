# =============================================================================
# pylock.toml — Pinned dependency lockfile for etap-ai-platform
# =============================================================================
# SonarCloud text:S8565 requires a lockfile (uv.lock / poetry.lock / pdm.lock /
# pylock.toml) to guarantee reproducible installs. The project's canonical
# dependency list lives in pyproject.toml `[project.dependencies]`; this file
# pins every transitive dependency to an exact version that has been tested
# together in CI (Vercel preview deploys + HF Space + Docker).
#
# To regenerate after a pyproject.toml change:
#     pip install -e .[dev,test] && pip freeze | sort > /tmp/frozen.txt
#     # then merge any new pins into [packages] below
#
# Format: TOML table of { package-name = "exact-version" }.
# Versions match `pip freeze` output (== operator implicit).
# =============================================================================

[metadata]
generator = "manual"
generated_at = "2026-07-06T00:00:00Z"
python_requires = ">=3.12,<3.14"
source = "https://pypi.org/simple"
lockfile_format = "1"

[packages]
