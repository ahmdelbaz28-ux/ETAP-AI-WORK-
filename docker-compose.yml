services:
  engineering-service:
    build:
      context: .
      dockerfile: Dockerfile.engineering-service
    ports:
      - "8000:8000"
    environment:
      - REDIS_URL=redis://redis:6379/0
      - USE_ETAP=${USE_ETAP:-false}
      - PRIVACY_MODE=${PRIVACY_MODE:-false}
      - ENGINEERING_SERVICE_API_KEY=${ENGINEERING_SERVICE_API_KEY:-dev-api-key-change-in-prod}
      - ENVIRONMENT=${ENVIRONMENT:-development}
      - DATABASE_URL=sqlite+aiosqlite:////tmp/data/etap_platform.db
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    volumes:
      - etap_data:/data
      - ./engineering_service.py:/app/engineering_service.py
      - ./core:/app/core
      - ./services:/app/services
      - ./api:/app/api
      - ./etap_integration:/app/etap_integration
      - ./worker:/app/worker
    networks:
      - etap_network

  celery-worker:
    build:
      context: .
      dockerfile: Dockerfile.engineering-service
    command: celery -A worker.celery_app worker --loglevel=info
    environment:
      - REDIS_URL=redis://redis:6379/0
      - USE_ETAP=${USE_ETAP:-false}
      - PRIVACY_MODE=${PRIVACY_MODE:-false}
      - ENGINEERING_SERVICE_API_KEY=${ENGINEERING_SERVICE_API_KEY:-dev-api-key-change-in-prod}
      - ENVIRONMENT=${ENVIRONMENT:-development}
    depends_on:
      redis:
        condition: service_healthy
      engineering-service:
        condition: service_started
    volumes:
      - ./worker:/app/worker
      - ./core:/app/core
      - ./services:/app/services
      - ./api:/app/api
      - ./etap_integration:/app/etap_integration
    networks:
      - etap_network

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - etap_network

  postgres:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-etap_db}
      POSTGRES_USER: ${POSTGRES_USER:-etap}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-etap_dev_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-etap}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - etap_network

  grafana:
    image: grafana/grafana-enterprise
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
    volumes:
      - grafana_storage:/var/lib/grafana
    networks:
      - etap_network
    depends_on:
      - postgres

volumes:
  etap_data:
  redis_data:
  postgres_data:
  grafana_storage:

networks:
  etap_network:
    driver: bridge