services:
  # ===========================================================================
  # Main ETAP AI Platform (Linux)
  # ===========================================================================
  etap-platform:
    build:
      context: .
      dockerfile: Dockerfile
      cache_from:
        - etap-ai-platform:latest
    image: etap-ai-platform:latest
    container_name: etap-ai-platform
    ports:
      - "${APP_PORT:-3000}:3000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-changeme}
      - DATABASE_URL=${DATABASE_URL:-file:/data/mastra.db}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - NODE_ENV=${NODE_ENV:-production}
      - VECTOR_DB_TYPE=${VECTOR_DB_TYPE:-chroma}
      - VECTOR_DB_PATH=/app/knowledge_db
      - REDIS_URL=redis://:${REDIS_PASSWORD:-changeme}@redis:6379/0
      - ETAP_WORKER_URL=http://etap-worker:8081
      - ETAP_ENABLED=${ETAP_ENABLED:-false}
      - ENABLE_AUTHENTICATION=${ENABLE_AUTHENTICATION:-true}
      - ENABLE_AUDIT_LOGGING=${ENABLE_AUDIT_LOGGING:-true}
      - ENABLE_METRICS=${ENABLE_METRICS:-true}
    env_file:
      - .env
    volumes:
      - etap_data:/data
      - etap_reports:/app/reports
      - etap_knowledge:/app/knowledge_db
      - etap_logs:/app/logs
    restart: unless-stopped
    stop_grace_period: 30s
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: '${CPU_LIMIT:-2.0}'
          memory: ${MEMORY_LIMIT:-4G}
        reservations:
          cpus: '${CPU_RESERVATION:-1.0}'
          memory: ${MEMORY_RESERVATION:-2G}
    networks:
      - etap-network
    depends_on:
      redis:
        condition: service_healthy

  # ===========================================================================
  # ETAP AI Engineering Service (Python FastAPI - real computation)
  # ===========================================================================
  # Standalone Linux container that the Cloudflare Worker (or any HTTP client)
  # calls to run real engineering studies (load flow, short circuit, arc flash,
  # harmonic analysis, OPF, protection coordination, motor starting).
  #
  # Off by default (engineering profile) — opt in with:
  #   docker compose --profile engineering up -d
  # ===========================================================================
  engineering-service:
    build:
      context: .
      dockerfile: Dockerfile.engineering-service
    image: etap-engineering-service:latest
    container_name: etap-engineering-service
    ports:
      - "${ENGINEERING_SERVICE_PORT:-8000}:8000"
    environment:
      - ENGINEERING_SERVICE_HOST=0.0.0.0
      - ENGINEERING_SERVICE_PORT=8000
      - ENGINEERING_SERVICE_CORS_ORIGINS=${ENGINEERING_SERVICE_CORS_ORIGINS:-*}
      - ENGINEERING_SERVICE_MAX_BODY_SIZE=${ENGINEERING_SERVICE_MAX_BODY_SIZE:-1048576}
      - ENGINEERING_SERVICE_API_KEY=${ENGINEERING_SERVICE_API_KEY:-}
    # .env.engineering-service is optional; if present it's loaded as KEY=VALUE.
    # Long-form array syntax for Compose v2.0+ portability (not v2.24+ only).
    env_file:
      - .env.engineering-service
    volumes:
      - etap_engineering_logs:/app/logs
      - etap_engineering_reports:/app/reports
    restart: unless-stopped
    stop_grace_period: 30s
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: '${ENGINEERING_CPU_LIMIT:-2.0}'
          memory: ${ENGINEERING_MEMORY_LIMIT:-4G}
        reservations:
          cpus: '${ENGINEERING_CPU_RESERVATION:-1.0}'
          memory: ${ENGINEERING_MEMORY_RESERVATION:-2G}
    networks:
      - etap-network
    profiles:
      - engineering
      - full

  # ===========================================================================
  # Redis (Caching and Session Management)
  # ===========================================================================
  redis:
    image: redis:7-alpine
    container_name: etap-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD:-changeme}
    volumes:
      - redis_data:/data
    restart: unless-stopped
    command: >
      sh -c 'exec redis-server --appendonly yes --requirepass "$${REDIS_PASSWORD}"'
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "$$REDIS_PASSWORD", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
    networks:
      - etap-network

  # ===========================================================================
  # Prometheus (Monitoring and Metrics)
  # ===========================================================================
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: etap-prometheus
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    restart: unless-stopped
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--web.enable-lifecycle'
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
    networks:
      - etap-network
    profiles:
      - full
      - monitoring

  # ===========================================================================
  # RabbitMQ (Optional - Async Task Queue)
  # ===========================================================================
  rabbitmq:
    image: rabbitmq:3-management
    container_name: etap-rabbitmq
    ports:
      - "${RABBITMQ_AMQP_PORT:-5672}:5672"
      - "${RABBITMQ_MGMT_PORT:-15672}:15672"
    environment:
      - RABBITMQ_DEFAULT_USER=${RABBITMQ_USER:-admin}
      - RABBITMQ_DEFAULT_PASS=${RABBITMQ_PASS:-changeme}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    networks:
      - etap-network
    profiles:
      - full

  # ===========================================================================
  # PostgreSQL (Optional - Persistent Storage)
  # ===========================================================================
  postgres:
    image: postgres:15-alpine
    container_name: etap-postgres
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      - POSTGRES_USER=${DB_USER:-etap}
      - POSTGRES_PASSWORD=${DB_PASS:-changeme}
      - POSTGRES_DB=${DB_NAME:-etap_platform}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 512M
    networks:
      - etap-network
    profiles:
      - full

  # ===========================================================================
  # Nginx Reverse Proxy
  # ===========================================================================
  nginx:
    image: nginx:alpine
    container_name: etap-nginx
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      # SSL is optional. Uncomment the line below after generating certificates.
      # - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      etap-platform:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M
    networks:
      - etap-network
    profiles:
      - production

  # ===========================================================================
  # Grafana (Optional - Metrics Dashboard)
  # ===========================================================================
  grafana:
    image: grafana/grafana:latest
    container_name: etap-grafana
    ports:
      - "${GRAFANA_PORT:-3001}:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASS:-changeme}
      - GF_INSTALL_PLUGINS=grafana-piechart-panel
    volumes:
      - grafana_data:/var/lib/grafana
    restart: unless-stopped
    depends_on:
      prometheus:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256M
    networks:
      - etap-network
    profiles:
      - monitoring

# =============================================================================
# Named Volumes
# =============================================================================
volumes:
  etap_data:
    driver: local
  etap_reports:
    driver: local
  etap_knowledge:
    driver: local
  etap_logs:
    driver: local
  etap_worker_data:
    driver: local
  etap_worker_reports:
    driver: local
  etap_worker_logs:
    driver: local
  etap_engineering_logs:
    driver: local
  etap_engineering_reports:
    driver: local
  redis_data:
    driver: local
  rabbitmq_data:
    driver: local
  postgres_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local

# =============================================================================
# Networks
# =============================================================================
networks:
  etap-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
