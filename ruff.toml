# Ruff configuration for AhmedETAP
# https://docs.astral.sh/ruff/configuration/

line-length = 120
target-version = "py312"

# Exclude benchmark scripts (intentional closures over loop variables),
# virtual envs, build artifacts, and frontend code from linting.
extend-exclude = [
    "benchmarks",
    "ui",
    ".venv",
    "venv",
    "__pycache__",
    "*.egg-info",
    "build",
    "dist",
]

[lint]
# Enable comprehensive rule set
select = ["E", "F", "I", "B", "W"]

# Only ignore rules that are genuinely acceptable for this codebase
ignore = [
    "E741",   # Ambiguous variable name (I, l, O are standard in electrical engineering — per-unit, current, etc.)
    "E501",   # Line too long (handled by formatter, not linter)
    "E402",   # Module level import not at top (some modules need env setup before imports)
    "E701",   # Multiple statements on one line (def) — legacy patterns
    "E702",   # Multiple statements on one line (;) — legacy patterns
    "B905",   # zip() without strict= (Python 3.10+ feature, not always appropriate)
]

# Allow autofix for all enabled rules
fixable = ["ALL"]
unfixable = []

[lint.per-file-ignores]
"__init__.py" = ["F401", "E402"]
"tests/**" = ["F401", "F841", "E741", "S101"]
"validation_*.py" = ["F401", "F841"]
"docs/demos/**" = ["E501", "F821"]
# FastAPI uses Body(...), Depends(...), Query(...) etc. as default argument
# values — this is the idiomatic dependency-injection pattern, not a bug.
"api/**/*.py" = ["B008"]
"engineering_service.py" = ["B008"]

[format]
quote-style = "double"
indent-style = "space"
