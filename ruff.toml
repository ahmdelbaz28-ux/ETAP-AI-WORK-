# Ruff configuration for AhmedETAP
# https://docs.astral.sh/ruff/configuration/

line-length = 100
target-version = "py312"

# Exclude benchmark scripts (intentional closures over loop variables),
# virtual envs, build artifacts, and frontend code from linting.
extend-exclude = [
    "benchmarks",
    "ui",
    ".venv",
    "venv",
    "__pycache__",
    "*.egg-info",
    "build",
    "dist",
    # skills/ contains auto-generated scripts from the skill-creator toolchain.
    # These scripts use print() for CLI output (T201) and have their own
    # conventions that don't match the library code style. Excluding them
    # from ruff avoids 1100+ false-positive errors that would block CI.
    "skills",
]

[lint]
# Enable comprehensive rule set
select = [
    "E",     # pycodestyle errors
    "W",     # pycodestyle warnings
    "F",     # pyflakes
    "I",     # isort
    "N",     # pep8-naming
    "UP",    # pyupgrade
    "B",     # flake8-bugbear
    "C4",    # flake8-comprehensions
    "G",     # flake8-logging-format (v2.1.1: enforce %-style logging)
    "T20",   # flake8-print (v2.1.1: forbid print() in production code, allow in CLI scripts via per-file-ignores)
    "SIM",   # flake8-simplify (v2.1.1: code simplification patterns)
]

# Only ignore rules that are genuinely acceptable for this codebase
ignore = [
    "E741",   # Ambiguous variable name (I, l, O are standard in electrical engineering)
    "E501",   # Line too long (handled by formatter, not linter)
    "E402",   # Module level import not at top (some modules need env setup before imports)
    "E701",   # Multiple statements on one line (def) — legacy patterns
    "E702",   # Multiple statements on one line (;) — legacy patterns
    "B905",   # zip() without strict= (Python 3.10+ feature, not always appropriate)
    "UP007",  # Use X | Y for unions (requires Python 3.10+; we sometimes prefer Optional[] for clarity)
    "UP006",  # Use list[str] instead of List[str] (gradual migration)
    "UP035",  # Deprecated import (typing.Dict, typing.List — gradual migration)
    "UP045",  # Non-PEP604 annotation Optional (gradual migration)
    "N806",   # Non-lowercase variable in function (electrical engineering: Vbus, Isc, Pload, etc.)
    "N803",   # Invalid argument name (electrical engineering: V, I, R, X, etc.)
    "N815",   # Mixed-case variable in class scope (electrical engineering convention)
    "N818",   # Error suffix on exception name (domain-specific naming)
    "N811",   # Constant imported as non-constant (standard patterns in imports)
    "N801",   # Invalid class name (some legacy patterns)
    "UP047",  # Use type parameters (Python 3.12+ generic syntax; not yet adopted repo-wide)
    "B007",   # Loop control variable not used (acceptable when iterating for side-effects)
    # QUALITY v2.1.1: BLE001 (blind except Exception) is intentionally allowed
    # for service-layer error containment. The codebase has 455 occurrences, most
    # of which are deliberate "catch-all → log → continue" patterns that prevent
    # one failing request from crashing the whole service. The recommended fix
    # is to catch specific exceptions, but doing so blindly across 455 sites
    # would risk swallowing real bugs. Manual review per-call is needed.
    "BLE001",
    # QUALITY v2.1.1: SIM rules (102, 105, 108, 113, 114, 115, 117, 118, 300)
    # are stylistic simplifications. Many SIM117 (nested with statements) and
    # SIM102 (nested if) cases are intentional for readability. We enable SIM
    # to surface candidates but accept that not all are worth changing.
    "SIM102",  # nested if — often clearer than collapsed form
    "SIM117",  # nested with — explicitly separate resource lifetimes
    "SIM105",  # contextlib.suppress — sometimes less clear than try/except/pass
    # QUALITY v2.1.3: TRY003, EM101, EM102 — these rules require extracting
    # exception messages into custom exception classes. For a domain-heavy
    # codebase like ETAP-AI-WORK, the cost (300+ custom exception classes)
    # outweighs the benefit (slightly cleaner raise statements). We accept
    # inline exception messages as a deliberate trade-off.
    "TRY003",  # long messages outside exception class
    "EM101",   # string literal in exception
    "EM102",   # f-string in exception
    # QUALITY v2.1.3: ANN401 (typing.Any disallowed) — many functions in this
    # codebase accept arbitrary JSON/dict payloads (LLM responses, plugin
    # configs, external API data). `Any` is the correct type for these cases;
    # forcing `object` or a TypedDict would require 200+ type definitions for
    # external schemas we don't control.
    "ANN401",
    # QUALITY v2.1.1: PLC0415 (import not at top of file) is intentionally
    # allowed for two patterns common in this codebase:
    #   1. Optional dependencies — modules like `jwt`, `hvac`, `redis` are
    #      imported inside try/except at module level OR inside functions to
    #      support deployments that don't have them installed (HF Space
    #      minimal requirements, dev sandboxes, etc.).
    #   2. Heavy imports — modules like `chromadb`, `sentence_transformers`,
    #      `pytorch` are imported inside functions so the application starts
    #      fast and only pays the import cost when the feature is actually used.
    # Moving these to module-top would break optional-dependency support and
    # slow startup. Manual review per-import is needed.
    "PLC0415",
]

# Allow autofix for all enabled rules
fixable = ["ALL"]
unfixable = []

[lint.per-file-ignores]
"__init__.py" = ["F401", "E402"]
"tests/**" = ["F401", "F841", "E741", "S101", "B017", "T201"]  # T201: tests use print() for debug output
"tests/property_based/**" = ["S101", "N802", "N803"]
"validation_*.py" = ["F401", "F841"]
"docs/demos/**" = ["E501", "F821", "T201"]  # T201: notebook demos use print() for output display
"testsprite_tests/**" = ["T201", "S101"]
"acp_runtime/acp_tests/**" = ["T201", "S101"]
# FastAPI uses Body(...), Depends(...), Query(...) etc. as default argument
# values — this is the idiomatic dependency-injection pattern, not a bug.
"api/**/*.py" = ["B008"]
"engineering_service.py" = ["B008"]

# QUALITY v2.1.1: allow `print()` in CLI entry points and standalone scripts
# where stdout IS the user interface. The T201 rule (print found) is meant for
# library/production code that should use structured logging — not for scripts
# whose entire purpose is to print JSON/progress to stdout.
#
# Files exempted here are CLI tools invoked from shell (e.g. `python indexer.py`,
# `python -m security.secure_executor < input.json`). They use `print()` as
# their primary output channel — replacing with logger would break the CLI
# contract (e.g. piping JSON to jq, capturing in CI scripts).
"indexer.py" = ["T201"]
"scada_etap_consumer.py" = ["T201"]
"qgis_scada_layer.py" = ["T201"]
"etap_scada_bridge.py" = ["T201"]
"run_complete_setup.py" = ["T201"]
"fix_eol_strings.py" = ["T201"]
"arcgis_pro_indexing_workflow.py" = ["T201"]
"security/secure_executor.py" = ["T201"]          # CLI: reads stdin, prints JSON to stdout
"security/secure_powershell_executor.py" = ["T201"]  # CLI: same pattern
"fault_analysis/arc_flash_calc.py" = ["T201"]     # CLI entry point for arc-flash calculations
"agents/etap_expert_agent.py" = ["T201"]          # CLI entry point for agent Q&A
"agents/etap_gui_agent.py" = ["T201"]
"etap_integration/etap_worker_service.py" = ["T201"]
"zenon_user_guide/zenon_guide_rag.py" = ["T201"]
"utils/language_detection.py" = ["T201"]
"scripts/**" = ["T201"]                            # all scripts are CLI tools
"etap_user_guide/**" = ["T201"]                    # standalone CLI tools

[lint.isort]
known-first-party = ["skills", "core", "scripts", "agents"]

[format]
quote-style = "double"
indent-style = "space"
