<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 400" font-family="'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <linearGradient id="bgMain" x1="0" y1="0" x2="1400" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0a0e1a"/>
      <stop offset="30%" stop-color="#0f1729"/>
      <stop offset="60%" stop-color="#1a0f2e"/>
      <stop offset="100" stop-color="#0a0e1a"/>
    </linearGradient>
    <linearGradient id="fireGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ff4500"/>
      <stop offset="30%" stop-color="#ff6b35"/>
      <stop offset="60%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#fbbf24"/>
    </linearGradient>
    <linearGradient id="sparkGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#f59e0b"/>
      <stop offset="50%" stop-color="#ff4500"/>
      <stop offset="100%" stop-color="#dc2626"/>
    </linearGradient>
    <linearGradient id="topLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ff4500" stop-opacity="0"/>
      <stop offset="15%" stop-color="#ff4500" stop-opacity=".8"/>
      <stop offset="50%" stop-color="#f59e0b" stop-opacity="1"/>
      <stop offset="85%" stop-color="#3b82f6" stop-opacity=".8"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="bottomLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#f59e0b" stop-opacity="0"/>
      <stop offset="20%" stop-color="#f59e0b" stop-opacity=".5"/>
      <stop offset="50%" stop-color="#ff4500" stop-opacity=".7"/>
      <stop offset="80%" stop-color="#dc2626" stop-opacity=".5"/>
      <stop offset="100%" stop-color="#dc2626" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="shieldGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ff4500"/>
      <stop offset="100%" stop-color="#dc2626"/>
    </linearGradient>
    <linearGradient id="glowGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ff4500" stop-opacity=".3"/>
      <stop offset="100%" stop-color="#ff4500" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="sparkLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#ff4500"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="textGlow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1400" height="400" fill="url(#bgMain)" rx="16"/>

  <!-- Top accent line -->
  <rect x="0" y="0" width="1400" height="4" fill="url(#topLine)" rx="2"/>
  <!-- Bottom accent line -->
  <rect x="0" y="396" width="1400" height="4" fill="url(#bottomLine)" rx="2"/>

  <!-- Subtle grid pattern -->
  <g opacity=".025">
    <line x1="0" y1="0" x2="0" y2="400" stroke="#ffffff" stroke-width="1"/>
    <line x1="100" y1="0" x2="100" y2="400" stroke="#ffffff" stroke-width="1"/>
    <line x1="200" y1="0" x2="200" y2="400" stroke="#ffffff" stroke-width="1"/>
    <line x1="300" y1="0" x2="300" y2="400" stroke="#ffffff" stroke-width="1"/>
    <line x1="400" y1="0" x2="400" y2="400" stroke="#ffffff" stroke-width="1"/>
    <line x1="500" y1="0" x2="500" y2="400" stroke="#ffffff" stroke-width="1"/>
    <line x1="600" y1="0" x2="600" y2="400" stroke="#ffffff" stroke-width="1"/>
    <line x1="700" y1="0" x2="700" y2="400" stroke="#ffffff" stroke-width="1"/>
    <line x1="800" y1="0" x2="800" y2="400" stroke="#ffffff" stroke-width="1"/>
    <line x1="900" y1="0" x2="900" y2="400" stroke="#ffffff" stroke-width="1"/>
    <line x1="0" y1="50" x2="1400" y2="50" stroke="#ffffff" stroke-width="1"/>
    <line x1="0" y1="100" x2="1400" y2="100" stroke="#ffffff" stroke-width="1"/>
    <line x1="0" y1="150" x2="1400" y2="150" stroke="#ffffff" stroke-width="1"/>
    <line x1="0" y1="200" x2="1400" y2="200" stroke="#ffffff" stroke-width="1"/>
    <line x1="0" y1="250" x2="1400" y2="250" stroke="#ffffff" stroke-width="1"/>
    <line x1="0" y1="300" x2="1400" y2="300" stroke="#ffffff" stroke-width="1"/>
    <line x1="0" y1="350" x2="1400" y2="350" stroke="#ffffff" stroke-width="1"/>
  </g>

  <!-- Glow behind logo -->
  <ellipse cx="120" cy="160" rx="90" ry="90" fill="url(#glowGrad)" opacity=".5"/>

  <!-- Shield/Logo -->
  <g transform="translate(120, 160)" filter="url(#softGlow)">
    <!-- Outer ring -->
    <circle cx="0" cy="0" r="68" fill="none" stroke="url(#fireGrad)" stroke-width="3" opacity=".6"/>
    <!-- Inner ring animated dashes -->
    <circle cx="0" cy="0" r="58" fill="none" stroke="url(#fireGrad)" stroke-width="1.5" stroke-dasharray="12 6" opacity=".4">
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="30s" repeatCount="indefinite"/>
    </circle>
    <!-- Shield shape -->
    <path d="M0,-48 L36,-28 L36,12 L0,42 L-36,12 L-36,-28 Z" fill="url(#shieldGrad)" opacity=".9" stroke="#ff6b35" stroke-width="2"/>
    <!-- Fire icon inside shield -->
    <text x="0" y="6" fill="#fbbf24" font-size="36" font-weight="900" text-anchor="middle" dominant-baseline="middle">🔥</text>
  </g>

  <!-- Product Name - BAZSpark -->
  <text x="230" y="100" fill="url(#fireGrad)" font-size="62" font-weight="900" letter-spacing="-2" filter="url(#textGlow)">Baz</text>
  <text x="410" y="100" fill="url(#sparkGrad)" font-size="62" font-weight="900" letter-spacing="-2" filter="url(#textGlow)">Spark</text>

  <!-- Sparkle accent after name -->
  <g transform="translate(600, 75)" filter="url(#glow)">
    <text fill="#fbbf24" font-size="20" font-weight="900" opacity=".8">✦</text>
  </g>

  <!-- Subtitle -->
  <text x="232" y="142" fill="#e2e8f0" font-size="24" font-weight="600" letter-spacing="2">Safety-Critical Fire Alarm Engineering Platform</text>

  <!-- Version badge -->
  <rect x="232" y="158" width="75" height="24" rx="12" fill="#064e3b" stroke="#34d399" stroke-width="1"/>
  <text x="270" y="174" fill="#6ee7b7" font-size="11" text-anchor="middle" font-weight="600">v1.55.0</text>

  <!-- Description -->
  <text x="232" y="208" fill="#94a3b8" font-size="15" font-weight="400">
    Engineering Intelligence Platform for NFPA 72, CAD, BIM,
  </text>
  <text x="232" y="230" fill="#94a3b8" font-size="15" font-weight="400">
    Fire Protection, Digital Twin & Compliance Workflows
  </text>

  <!-- Feature badges row 1 -->
  <rect x="232" y="250" width="115" height="28" rx="14" fill="#0c4a6e" stroke="#38bdf8" stroke-width="1"/>
  <text x="290" y="269" fill="#7dd3fc" font-size="11" text-anchor="middle" font-weight="600">188 Endpoints</text>

  <rect x="357" y="250" width="115" height="28" rx="14" fill="#1e3a5f" stroke="#60a5fa" stroke-width="1"/>
  <text x="415" y="269" fill="#93c5fd" font-size="11" text-anchor="middle" font-weight="600">8,557+ Tests</text>

  <rect x="482" y="250" width="105" height="28" rx="14" fill="#4c1d95" stroke="#a78bfa" stroke-width="1"/>
  <text x="535" y="269" fill="#c4b5fd" font-size="11" text-anchor="middle" font-weight="600">AI-Powered</text>

  <rect x="597" y="250" width="110" height="28" rx="14" fill="#78350f" stroke="#fbbf24" stroke-width="1"/>
  <text x="652" y="269" fill="#fde68a" font-size="11" text-anchor="middle" font-weight="600">Open Source</text>

  <!-- Feature badges row 2 -->
  <rect x="232" y="287" width="100" height="28" rx="14" fill="#450a0a" stroke="#f87171" stroke-width="1"/>
  <text x="282" y="306" fill="#fca5a5" font-size="11" text-anchor="middle" font-weight="600">NFPA 72</text>

  <rect x="342" y="287" width="100" height="28" rx="14" fill="#172554" stroke="#818cf8" stroke-width="1"/>
  <text x="392" y="306" fill="#a5b4fc" font-size="11" text-anchor="middle" font-weight="600">NEC 2023</text>

  <rect x="452" y="287" width="90" height="28" rx="14" fill="#052e16" stroke="#4ade80" stroke-width="1"/>
  <text x="497" y="306" fill="#86efac" font-size="11" text-anchor="middle" font-weight="600">UL 864</text>

  <rect x="552" y="287" width="100" height="28" rx="14" fill="#3b0764" stroke="#c084fc" stroke-width="1"/>
  <text x="602" y="306" fill="#d8b4fe" font-size="11" text-anchor="middle" font-weight="600">ATEX/IEC</text>

  <rect x="662" y="287" width="80" height="28" rx="14" fill="#0f172a" stroke="#94a3b8" stroke-width="1"/>
  <text x="702" y="306" fill="#cbd5e1" font-size="11" text-anchor="middle" font-weight="600">IBC</text>

  <!-- Right side: Stats panel -->
  <g transform="translate(860, 30)">
    <rect x="0" y="0" width="510" height="340" rx="12" fill="#0f172a" stroke="#1e293b" stroke-width="1" opacity=".85"/>

    <!-- Stats header -->
    <text x="255" y="38" fill="#ff6b35" font-size="15" font-weight="700" text-anchor="middle" letter-spacing="3">⚡ PLATFORM STATS ⚡</text>
    <line x1="30" y1="52" x2="480" y2="52" stroke="#1e293b" stroke-width="1"/>

    <!-- Stats grid -->
    <text x="40" y="86" fill="#3fb950" font-size="32" font-weight="800">8,557+</text>
    <text x="40" y="106" fill="#8b949e" font-size="12">Tests Collected</text>

    <text x="200" y="86" fill="#58a6ff" font-size="32" font-weight="800">188</text>
    <text x="200" y="106" fill="#8b949e" font-size="12">API Endpoints</text>

    <text x="350" y="86" fill="#d2a8ff" font-size="32" font-weight="800">22</text>
    <text x="350" y="106" fill="#8b949e" font-size="12">UI Pages</text>

    <line x1="30" y1="120" x2="480" y2="120" stroke="#1e293b" stroke-width="1"/>

    <!-- Architecture layers -->
    <text x="40" y="146" fill="#f0883e" font-size="12" font-weight="700">▸ FRONTEND</text>
    <text x="200" y="146" fill="#8b949e" font-size="11">React 18 + TypeScript + Vite + Electron</text>

    <text x="40" y="170" fill="#58a6ff" font-size="12" font-weight="700">▸ BACKEND</text>
    <text x="200" y="170" fill="#8b949e" font-size="11">FastAPI 0.138 + Python 3.12 + SQLAlchemy</text>

    <text x="40" y="194" fill="#d2a8ff" font-size="12" font-weight="700">▸ ENGINEERING</text>
    <text x="200" y="194" fill="#8b949e" font-size="11">NFPA 72 + Voltage Drop + Battery + Acoustics</text>

    <text x="40" y="218" fill="#3fb950" font-size="12" font-weight="700">▸ DIGITAL TWIN</text>
    <text x="200" y="218" fill="#8b949e" font-size="11">AutoCAD ←→ Revit Bidirectional Conversion</text>

    <text x="40" y="242" fill="#79c0ff" font-size="12" font-weight="700">▸ SECURITY</text>
    <text x="200" y="242" fill="#8b949e" font-size="11">HMAC + RBAC + Rate Limiting + CSP/HSTS</text>

    <text x="40" y="266" fill="#f87171" font-size="12" font-weight="700">▸ INTEGRATION</text>
    <text x="200" y="266" fill="#8b949e" font-size="11">Revit + AutoCAD + IFC + BIM + DXF/DWG</text>

    <text x="40" y="290" fill="#fbbf24" font-size="12" font-weight="700">▸ CI/CD</text>
    <text x="200" y="290" fill="#8b949e" font-size="11">6-Gate Pipeline + Docker + GitHub Actions</text>

    <line x1="30" y1="306" x2="480" y2="306" stroke="#1e293b" stroke-width="1"/>

    <!-- Safety badge -->
    <rect x="130" y="314" width="250" height="20" rx="10" fill="#450a0a" stroke="#f87171" stroke-width="1"/>
    <text x="255" y="328" fill="#fca5a5" font-size="10" text-anchor="middle" font-weight="600">🛡 SAFETY-CRITICAL SYSTEM — NFPA 72 COMPLIANT</text>
  </g>
</svg>