# NOTE: This file lives at docs/mkdocs.yml (NOT at repo root) so that Vercel
# does NOT auto-detect MkDocs as the deployment framework. The Vercel project
# is configured (via /vercel.json) to build the Vite/React UI in ui/ instead.
# To serve docs locally, run:  mkdocs serve -f docs/mkdocs.yml
# To build docs locally,  run:  mkdocs build -f docs/mkdocs.yml
site_name: AhmedETAP Documentation
site_description: Enterprise AI-Powered Power Systems Engineering Platform
site_author: AhmedETAP Team
repo_url: https://github.com/ahmdelbaz28-ux/ETAP-AI-WORK-
docs_dir: .
# site_dir MUST be outside docs_dir (otherwise MkDocs refuses to build).
# Since docs_dir is '.' (relative to this config file at docs/mkdocs.yml),
# the default 'site/' would land inside docs/. Use ../site to put it at
# repo-root/site/ instead.
site_dir: ../site

# Exclude files / subdirectories that:
#   - reference paths outside docs/ (e.g. ../PROJECT_INDEX.md, ../../SECURITY.md)
#   - are internal scratch files (internal/, AR/)
#   - or conflict with index.md (the legacy static index.html)
# Without these excludes, `mkdocs build --strict` fails on broken-link warnings.
exclude_docs: |
  internal/
  AR/
  README_AR.md
  FINAL_COMPLETION_REPORT.md
  ETAP_GUIDE_COMPLETION.md
  DEVELOPER_GUIDE.md
  index.html

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
  palette:
    primary: indigo
    accent: deep purple

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences

nav:
  - الصفحة الرئيسية: index.md
  - الهيكلية: ARCHITECTURE.md
  - واجهة برمجة التطبيقات: API_REFERENCE.md
  - دليل التشغيل: OPERATIONS_RUNBOOK.md
  - دليل الأعطال: TROUBLESHOOTING_GUIDE.md
  - البنية التحتية للأمان: SECURITY_OPERATIONS_MANUAL.md
  - التقييم المؤسسي: ENTERPRISE_CERTIFICATION_REPORT.md

# Tune validation: keep warnings for genuinely broken links, but don't
# error out on omitted files (some .md files in docs/ aren't in the nav).
validation:
  nav:
    omitted_files: info
  links:
    not_found: warn
    unrecognized_links: info
    anchors: info
    absolute_links: info
