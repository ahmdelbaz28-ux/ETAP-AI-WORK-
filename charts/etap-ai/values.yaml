replicaCount: 3

image:
  repository: ghcr.io/ahmdelbaz28-ux/etap-engineering-service
  pullPolicy: IfNotPresent
  tag: "latest"

service:
  type: ClusterIP
  port: 8000
  targetPort: 8000

ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
  hosts:
    - host: etap-ai.example.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: etap-ai-tls
      hosts:
        - etap-ai.example.com

resources:
  requests:
    cpu: 500m
    memory: 512Mi
  limits:
    cpu: 2000m
    memory: 2Gi

autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

env:
  ENGINEERING_SERVICE_API_KEY: ""
  LANGWATCH_API_KEY: ""
  SMITHERY_API_KEY: ""
  REDIS_URL: "redis://redis:6379"

redis:
  enabled: true
  auth:
    enabled: false
  master:
    persistence:
      enabled: true
      size: 1Gi

affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchExpressions:
              - key: app.kubernetes.io/name
                operator: In
                values:
                  - etap-ai
          topologyKey: kubernetes.io/hostname
