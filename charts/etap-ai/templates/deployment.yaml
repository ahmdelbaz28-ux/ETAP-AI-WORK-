apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "etap-ai.fullname" . }}
  labels:
    {{- include "etap-ai.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "etap-ai.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "etap-ai.selectorLabels" . | nindent 8 }}
      annotations:
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
    spec:
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.targetPort }}
              protocol: TCP
          env:
            - name: ENGINEERING_SERVICE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "etap-ai.fullname" . }}-secret
                  key: engineering-service-api-key
                  optional: true
            - name: LANGWATCH_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "etap-ai.fullname" . }}-secret
                  key: langwatch-api-key
                  optional: true
            - name: SMITHERY_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "etap-ai.fullname" . }}-secret
                  key: smithery-api-key
                  optional: true
            - name: REDIS_URL
              value: {{ .Values.env.REDIS_URL | quote }}
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      affinity:
        {{- toYaml .Values.affinity | nindent 8 }}
