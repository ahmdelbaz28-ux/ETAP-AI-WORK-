version: '3.8'

services:
  fireai-backend:
    build:
      context: ../
      dockerfile: deployment/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - NODE_ENV=production
      - PORT=8000
      - ALLOWED_ORIGINS=http://localhost:3000,http://localhost:8001
      - JWT_SECRET=fireai_jwt_secret_key
      - REDIS_URL=redis://fireai-redis:6379
      - MONGODB_URI=mongodb://fireai-mongo:27017/fireai
    depends_on:
      - redis
      - mongo
    restart: unless-stopped
    networks:
      - fireai-network

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped
    command: redis-server --appendonly yes
    networks:
      - fireai-network

  mongo:
    image: mongo:6-jammy
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    environment:
      - MONGO_INITDB_ROOT_USERNAME=admin
      - MONGO_INITDB_ROOT_PASSWORD=password
    restart: unless-stopped
    networks:
      - fireai-network

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./configs/nginx.conf:/etc/nginx/nginx.conf
      - ./configs/ssl:/etc/nginx/ssl
    depends_on:
      - fireai-backend
    restart: unless-stopped
    networks:
      - fireai-network

networks:
  fireai-network:
    driver: bridge

volumes:
  redis-data:
  mongo-data: