# Prometheus configuration for AhmedETAP Platform
# OPS (E-14): Previously this file was referenced by docker-compose.copilot.yml:174
# and docker-compose.monitoring.yml:37 but did NOT exist in the repo — causing
# Prometheus container to fail on startup. This file provides a working baseline
# that only references services DEFINED in the compose files (no phantom exporters).

global:
  scrape_interval: 15s          # Default scrape interval for all jobs
  evaluation_interval: 15s      # Default rule evaluation interval
  external_labels:
    cluster: 'ahmedetap'
    environment: 'ahmedetap-dev'

# Alerting — alertmanager is defined in monitoring/alertmanager.yml
# Only enable if alertmanager service is running (compose monitoring profile)
alerting:
  alertmanagers:
    - static_configs:
        - targets: []  # Empty by default — populate when alertmanager is deployed

# Rule files (optional — create if alerting rules are needed)
# rule_files:
#   - 'alerts/*.yml'

scrape_configs:
  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # AhmedETAP FastAPI engineering service
  # This is the main app — exposes /metrics via prometheus_client (core/metrics.py)
  - job_name: 'etap-engineering-service'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['engineering-service:8000']
        labels:
          service: 'engineering-service'

  # HF Space (external — scrape via public URL when running in HF)
  # Only enabled when monitoring external HF Space deployment
  - job_name: 'hf-space'
    metrics_path: '/metrics'
    scheme: https
    scrape_interval: 30s  # less frequent for external target
    static_configs:
      - targets: ['ahmdelbaz28-ahmedetap-platform.hf.space:443']
        labels:
          service: 'hf-space'
          deployment: 'huggingface'

  # NOTE: The following exporters are NOT included by default because they
  # require additional services that are not defined in docker-compose.yml.
  # To enable them, add the corresponding service to docker-compose.monitoring.yml:
  #
  # - job_name: 'postgres'        # requires postgres-exporter service
  #   static_configs:
  #     - targets: ['postgres-exporter:9187']
  #
  # - job_name: 'redis'           # requires redis-exporter service
  #   static_configs:
  #     - targets: ['redis-exporter:9121']
  #
  # - job_name: 'node'            # requires node-exporter service
  #   static_configs:
  #     - targets: ['node-exporter:9100']
  #
  # - job_name: 'celery-worker'   # requires Flower or celery-exporter
  #   static_configs:
  #     - targets: ['celery-worker:9555']
