# =============================================================================
# AhmedETAP — AI Code Review via Daytona SDK
# Runs on every PR. Spins up an isolated Daytona sandbox, installs deps,
# runs ruff + mypy + tests, and posts a structured review comment.
# Falls back to GitHub-native checks if DAYTONA_API_KEY is not set.
# =============================================================================
name: AI Code Review (Daytona)

on:
  pull_request:
    branches: [main, develop]
    types: [opened, synchronize, reopened]

concurrency:
  group: ai-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  checks: write

jobs:
  ai-review:
    name: AI Review (Daytona sandbox)
    runs-on: ubuntu-latest
    # Skip entirely if no Daytona key configured — fall back to ci-cd.yml
    if: ${{ vars.ENABLE_DAYTONA_REVIEW == 'true' }}
    timeout-minutes: 15

    steps:
      - name: Checkout PR code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Daytona SDK + review script deps
        run: |
          pip install --quiet \
            "daytona-sdk>=0.10.0" \
            "pyyaml>=6.0" \
            "requests>=2.31"

      - name: Run AI review in Daytona sandbox
        env:
          DAYTONA_API_KEY: ${{ secrets.DAYTONA_API_KEY }}
          DAYTONA_API_URL: ${{ secrets.DAYTONA_API_URL || 'https://app.daytona.io' }}
          DAYTONA_TARGET: ${{ secrets.DAYTONA_TARGET || 'local' }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_REPO: ${{ github.event.pull_request.head.repo.full_name }}
          PR_HEAD_REF: ${{ github.event.pull_request.head.ref }}
        run: python scripts/daytona_ai_review.py

      - name: Post fallback comment on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: [
                '⚠️ **AI Code Review (Daytona) failed to run.**',
                '',
                'The Daytona-based AI review encountered an error. The standard CI/CD pipeline',
                '(`ci-cd.yml`) still ran and provides the authoritative pass/fail signal.',
                '',
                'Check the [workflow run](' + context.serverUrl + '/' + context.repo.owner + '/' + context.repo.repo + '/actions/runs/' + context.runId + ') for details.'
              ].join('\n')
            });
