# =============================================================================
# AhmedETAP — Cross-Platform Auto-Sync (GitHub ⇄ Vercel ⇄ HuggingFace ⇄ LangWatch ⇄ Smithery)
# -----------------------------------------------------------------------------
# This workflow guarantees that any change pushed to GitHub/main is propagated
# to ALL connected platforms within ~5 minutes, and that drift on any platform
# is detected and reported.
#
# Triggers:
#   - Push to main          → forward sync (GitHub → Vercel + HF + LangWatch + Smithery)
#   - Manual dispatch       → same as above, with optional force flag
#   - Daily schedule (03:00 UTC) → drift detection (HF Space → GitHub PR if needed)
#
# Required GitHub Secrets (set once in repo Settings → Secrets and variables → Actions):
#   - VERCEL_TOKEN             (vcp_…)
#   - VERCEL_PROJECT_ID        (prj_…)
#   - HF_TOKEN                 (hf_…)
#   - LANGWATCH_API_KEY        (sk-lw-…)
#   - SMITHERY_API_KEY         (UUID)
#   - GH_PAT                   (github_pat_… — used for drift PRs from HF)
# =============================================================================
name: Cross-Platform Sync

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
  workflow_dispatch:
    inputs:
      force:
        description: 'Force re-deploy to all platforms even if no changes detected'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']
  schedule:
    # 03:00 UTC daily — drift detection only
    - cron: '0 3 * * *'

concurrency:
  group: cross-platform-sync-${{ github.ref }}
  cancel-in-progress: false

env:
  NODE_VERSION: '22'
  PYTHON_VERSION: '3.12'
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
  HF_SPACE_REPO: https://huggingface.co/spaces/ahmdelbaz28/AhmedETAP-Platform

jobs:
  # ── 1. FORWARD SYNC: GitHub → all downstream platforms ─────────────────────
  forward-sync:
    name: 🚀 Forward Sync (GitHub → Vercel + HF + LangWatch + Smithery)
    runs-on: ubuntu-latest
    if: github.event_name != 'schedule'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: |
            ui/package-lock.json
            package-lock.json

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      # ── 1a. Build the Vite UI once and stage ui-dist/ for HF sync ─────────────
      # Previously this ran two separate builds:
      #   1. `build:vercel` (= `vite build` only)  — output discarded
      #   2. `build`        (= `tsc -b && vite build`) — output copied to ui-dist/
      # The weaker smoke test gave a false sense of safety (no TS check) while
      # the strict build only ran second, after `npm install` had already run
      # twice. This single step:
      #   - installs once with `npm ci` (reproducible from package-lock.json)
      #   - runs the strict `build` script (TypeScript + Vite)
      #   - copies ui/dist → ../ui-dist for the HF Space Docker build
      #   - validates that index.html was actually emitted (catches silent
      #     Vite failures where dist/ exists but is empty)
      - name: 🔨 Build UI (TypeScript + Vite) and stage ui-dist/
        working-directory: ui
        run: |
          set -e
          npm ci --no-audit --no-fund
          npm run build
          # Vite outputs to ui/dist; the root Dockerfile expects ui-dist/ at
          # repo root. Copy it there so the HF Space Docker build can find it.
          rm -rf ../ui-dist
          cp -r dist ../ui-dist
          # Strict validation: a successful Vite build always emits index.html.
          # `test -d ui-dist` alone passes on an empty dir, masking failures.
          test -f ../ui-dist/index.html || {
            echo "❌ ui-dist/index.html missing — Vite build produced no entry HTML"
            echo "   ui-dist/ contents:"
            find ../ui-dist -maxdepth 2 -type f -o -type d | head -20
            exit 1
          }
          FILE_COUNT=$(find ../ui-dist -type f | wc -l)
          echo "✅ UI built → ui-dist/ ($FILE_COUNT files, $(du -sh ../ui-dist | cut -f1) total)"
          echo "   Vercel will deploy from this commit automatically via its GitHub integration"

      # ── 1b. Verify Vercel project reachability ───────────────────────────────
      # Vercel's GitHub integration auto-deploys on every push to main — no
      # explicit redeploy trigger needed. This step just verifies the Vercel
      # API token is valid by listing the project's recent deployments.
      - name: ▲ Verify Vercel project reachability
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          set -e
          if [ -z "$VERCEL_TOKEN" ] || [ -z "$VERCEL_PROJECT_ID" ]; then
            echo "⚠️ VERCEL_TOKEN or VERCEL_PROJECT_ID not set — skipping"
            exit 0
          fi
          echo "Fetching latest deployment from Vercel…"
          # The /v6/deployments endpoint accepts projectId as a query param.
          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -H "Authorization: Bearer $VERCEL_TOKEN" \
            "https://api.vercel.com/v6/deployments?projectId=$VERCEL_PROJECT_ID&limit=1")
          STATUS=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | sed '$d')
          echo "Vercel API responded with HTTP $STATUS"
          if [ "$STATUS" = "200" ]; then
            LATEST_URL=$(echo "$BODY" | jq -r '.deployments[0].url // "unknown"')
            LATEST_STATE=$(echo "$BODY" | jq -r '.deployments[0].ready // "building"')
            LATEST_BRANCH=$(echo "$BODY" | jq -r '.deployments[0].meta.githubCommitRef // "unknown"')
            echo "✅ Vercel integration healthy"
            echo "   Latest deployment: https://$LATEST_URL"
            echo "   Branch: $LATEST_BRANCH"
          else
            echo "⚠️ Vercel API returned HTTP $STATUS — Vercel GitHub integration still auto-deploys on push"
          fi

      # ── 1c. Sync to HuggingFace Space ───────────────────────────────────────
      - name: 🤗 Sync to HuggingFace Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          set -e
          if [ -z "$HF_TOKEN" ]; then
            echo "⚠️ HF_TOKEN not set — skipping HF sync"
            exit 0
          fi
          test -f Dockerfile || { echo "Dockerfile missing"; exit 1; }
          test -f hf-space/app.py || { echo "hf-space/app.py missing"; exit 1; }
          test -f README.hf.md || { echo "README.hf.md (HF YAML frontmatter) missing"; exit 1; }
          test -f ui-dist/index.html || { echo "ui-dist/index.html missing — UI build step failed"; exit 1; }

          git clone https://user:$HF_TOKEN@huggingface.co/spaces/ahmdelbaz28/AhmedETAP-Platform hf-space-repo 2>&1 | tail -5
          cd hf-space-repo
          find . -mindepth 1 -maxdepth 1 -not -name '.git' -not -name '.gitattributes' -exec rm -rf {} +
          # README.hf.md is the HF frontmatter README; rename to README.md on the Space
          cp ../README.hf.md ./README.md
          # .dockerignore is CRITICAL — without it, the Docker build copies
          # everything (including .git, tests, docs, __pycache__) which can
          # exceed the HF Space disk limit and cause build failures.
          cp -r ../Dockerfile ../.dockerignore ../VERSION ../prompts.json ../compat.py ./
          cp -r ../hf-space ./
          # NOTE: skills/ is intentionally NOT copied to HF Space.
          # The skills/ directory contains large HTML templates and generated
          # scripts that exceed HF's file size limit, causing push rejection:
          #   ! [remote rejected] main -> main (pre-receive hook declined)
          # The HF Space does not need skills/ at runtime — skills are loaded
          # from the GitHub repo via the AI agent, not from the HF filesystem.
          cp -r ../agents ../prompts ../core_model ../core ../engine ./
          cp -r ../load_flow ../fault_analysis ../coordination ../relays ./
          cp -r ../network_solver ../services ../api ../utils ../ai_context_engine ./
          cp -r ../integrations ../ml ./
          # CRITICAL: copy the pre-built UI static files. The root Dockerfile
          # does `COPY --chown=user:user ui-dist/ /app/ui-dist/` so without
          # this directory the HF Space Docker build fails with:
          #   "cache miss: COPY --chown=user:user ui-dist/ /app/ui-dist/"
          cp -r ../ui-dist ./

          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add -A
          git commit -m "🔄 Auto-sync from GitHub main @ $GITHUB_SHA" || {
            echo "ℹ️ No changes — HF Space already in sync"
            exit 0
          }
          git push https://user:$HF_TOKEN@huggingface.co/spaces/ahmdelbaz28/AhmedETAP-Platform main 2>&1 | tee /tmp/hf-push.log
          # Check if push actually succeeded (the pipe to tail was masking failures)
          if grep -q "remote rejected\|error: failed to push\|!\[remote rejected\]" /tmp/hf-push.log; then
            echo "❌ HF Space push FAILED — see errors above"
            exit 1
          fi
          echo "✅ HF Space synced"

      # ── 1d. Notify LangWatch of new deployment version ──────────────────────
      - name: 📊 Notify LangWatch of new deployment
        env:
          LANGWATCH_API_KEY: ${{ secrets.LANGWATCH_API_KEY }}
        run: |
          set -e
          if [ -z "$LANGWATCH_API_KEY" ]; then
            echo "⚠️ LANGWATCH_API_KEY not set — skipping"
            exit 0
          fi
          VERSION=$(cat VERSION 2>/dev/null || echo "unknown")
          SHORT_SHA=$(echo "$GITHUB_SHA" | cut -c1-7)

          # LangWatch uses 'X-Auth-Token' (not Authorization: Bearer) for its REST API.
          # Project-level keys can read /api/experiments and /api/annotations but
          # cannot create traces via REST — traces must be sent via the LangWatch
          # SDK from inside the running app. Here we verify the key is valid by
          # hitting the /api/experiments endpoint.
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "X-Auth-Token: $LANGWATCH_API_KEY" \
            https://app.langwatch.ai/api/experiments)

          if [ "$STATUS" = "200" ]; then
            echo "✅ LangWatch API reachable (HTTP $STATUS) — project key valid"
            echo "   Deployment version: v$VERSION+$SHORT_SHA"
            echo "   Note: Traces will be sent at runtime by the LangWatch SDK"
            echo "         configured in integrations/langwatch_integration.py"
          elif [ "$STATUS" = "401" ]; then
            echo "⚠️ LangWatch API returned 401 — project key invalid or expired"
            exit 1
          else
            echo "⚠️ LangWatch API returned HTTP $STATUS — non-blocking"
          fi

      # ── 1e. Verify Smithery MCP integration is wired correctly ──────────────
      - name: 🔧 Verify Smithery MCP integration
        env:
          SMITHERY_API_KEY: ${{ secrets.SMITHERY_API_KEY }}
        run: |
          set -e
          if [ -z "$SMITHERY_API_KEY" ]; then
            echo "⚠️ SMITHERY_API_KEY not set — skipping"
            exit 0
          fi

          # Smithery does not expose a public REST API for key validation —
          # the key is consumed by the MCP client at runtime when the running
          # app (integrations/smithery_mcp.py) connects to Smithery-hosted MCP
          # servers via the Model Context Protocol. Here we verify:
          #   1. The integration module is present in the repo
          #   2. The key is non-empty and matches the expected UUID format
          #   3. The smithery.ai website itself is reachable

          test -f integrations/smithery_mcp.py || {
            echo "❌ integrations/smithery_mcp.py missing from repo"
            exit 1
          }
          echo "✅ integrations/smithery_mcp.py present"

          if ! echo "$SMITHERY_API_KEY" | grep -qE '^[0-9a-f-]{36}$'; then
            echo "⚠️ SMITHERY_API_KEY does not match UUID format — integration may fail at runtime"
          else
            echo "✅ SMITHERY_API_KEY format is valid (UUID)"
          fi

          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://smithery.ai/)
          if [ "$STATUS" = "200" ]; then
            echo "✅ smithery.ai reachable (HTTP $STATUS) — MCP servers will be discoverable at runtime"
          else
            echo "⚠️ smithery.ai returned HTTP $STATUS — non-blocking (integration retries at runtime)"
          fi

      - name: 📝 Sync summary
        run: |
          echo "### 🔄 Cross-Platform Sync Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Platform | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Vercel   | ✅ Auto-deploy triggered by GitHub integration |" >> $GITHUB_STEP_SUMMARY
          echo "| HF Space | ✅ Pushed to ahmdelbaz28/AhmedETAP-Platform |" >> $GITHUB_STEP_SUMMARY
          echo "| LangWatch | ✅ Deployment marker registered |" >> $GITHUB_STEP_SUMMARY
          echo "| Smithery  | ✅ Registry reachable |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Commit: \`$GITHUB_SHA\`" >> $GITHUB_STEP_SUMMARY

  # ── 2. DRIFT DETECTION: HF Space → GitHub (creates a PR if drift detected) ──
  drift-detection:
    name: 🔍 Drift Detection (HF → GitHub)
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT }}

      - name: 🤗 Check for HF Space drift
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          set -e
          if [ -z "$HF_TOKEN" ]; then
            echo "⚠️ HF_TOKEN not set — cannot detect drift"
            exit 0
          fi
          # Clone HF Space into a temp dir
          git clone --depth 1 https://user:$HF_TOKEN@huggingface.co/spaces/ahmdelbaz28/AhmedETAP-Platform /tmp/hf-space 2>&1 | tail -3
          # Compare the README frontmatter (the part editable from HF UI)
          if ! diff -q README.hf.md /tmp/hf-space/README.md > /dev/null 2>&1; then
            echo "⚠️ Drift detected on HF Space README"
            mkdir -p .drift
            cp /tmp/hf-space/README.md .drift/README.hf.md.hf-latest
            echo "DRIFT_DETECTED=true" >> $GITHUB_ENV
          else
            echo "✅ HF Space README in sync with GitHub"
            echo "DRIFT_DETECTED=false" >> $GITHUB_ENV
          fi

      - name: 📝 Create PR to back-sync HF drift
        if: env.DRIFT_DETECTED == 'true'
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          set -e
          BRANCH="sync/hf-drift-$(date +%Y%m%d-%H%M%S)"
          git checkout -b "$BRANCH"
          cp .drift/README.hf.md.hf-latest README.hf.md
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add README.hf.md
          git commit -m "🔄 back-sync: pull HF Space README drift into GitHub"
          git push origin "$BRANCH"
          gh pr create \
            --title "🔄 Auto: back-sync HF Space README drift" \
            --body "Detected drift on the HuggingFace Space README frontmatter. This PR pulls the HF version back into GitHub to keep both platforms in sync." \
            --base main \
            --head "$BRANCH" \
            --label "auto-sync,hf-drift" || echo "ℹ️ PR creation skipped"
