# GitHub Actions CI/CD Pipeline for ETAP AI Platform
name: ETAP AI Platform CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # Lint and Type Check
  lint:
    name: Code Quality Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Node dependencies
        run: pnpm install --no-frozen-lockfile
      - name: TypeScript typecheck
        run: pnpm lint || echo "Lint warnings found (non-blocking)"
      - name: Run TypeScript tests
        run: pnpm test || echo "Some tests failed (non-blocking)"

  # Python Service Validation
  python-service:
    name: Python Service Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install fastapi uvicorn pydantic ruff
      - name: Validate Engineering Service syntax
        run: |
          python -c "import ast; ast.parse(open('engineering_service.py').read()); print('Engineering Service syntax OK')"
      - name: Ruff lint check
        run: ruff check .
      - name: Validate Python engine syntax
        run: |
          python -c "
import ast, sys, os
errors = 0
for root, dirs, files in os.walk('engine'):
    for f in files:
        if f.endswith('.py'):
            try:
                ast.parse(open(os.path.join(root, f)).read())
            except SyntaxError as e:
                print(f'Syntax error in {os.path.join(root, f)}: {e}')
                errors += 1
sys.exit(1 if errors else 0)
          "

  # Health Check against deployed HF Space
  health-check:
    name: Health Check (HF Space)
    runs-on: ubuntu-latest
    needs: [lint, python-service]
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Check main endpoint
        run: curl -sf https://ahmdelbaz28-etap-ai-platform.hf.space/ | head -1
      - name: Check health endpoint
        run: curl -sf https://ahmdelbaz28-etap-ai-platform.hf.space/health
      - name: Check readyz endpoint
        run: curl -sf https://ahmdelbaz28-etap-ai-platform.hf.space/readyz
