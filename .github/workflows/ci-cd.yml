# GitHub Actions CI/CD Pipeline for ETAP AI Platform
name: ETAP AI Platform CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # Lint and Type Check
  lint:
    name: Code Quality Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - name: Install Node dependencies
        run: pnpm install
      - name: TypeScript typecheck
        run: pnpm lint
      - name: Run TypeScript tests
        run: pnpm test

  # Python Service Validation
  python-service:
    name: Python Service Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install fastapi uvicorn pydantic
      - name: Validate Engineering Service syntax
        run: |
          python -c "import ast; ast.parse(open('engineering_service.py').read()); print('Engineering Service syntax OK')"
      - name: Validate Python engine syntax
        run: |
          python -c "
import ast, sys, os
errors = 0
for root, dirs, files in os.walk('engine'):
    for f in files:
        if f.endswith('.py'):
            try:
                ast.parse(open(os.path.join(root, f)).read())
            except SyntaxError as e:
                print(f'Syntax error in {os.path.join(root, f)}: {e}')
                errors += 1
for root, dirs, files in os.walk('etap_integration'):
    for f in files:
        if f.endswith('.py'):
            try:
                ast.parse(open(os.path.join(root, f)).read())
            except SyntaxError as e:
                print(f'Syntax error in {os.path.join(root, f)}: {e}')
                errors += 1
sys.exit(1 if errors else 0)
          "
      - name: Run Python engine import test
        run: |
          python -c "
import sys
sys.path.insert(0, '.')
from engine.engine import PowerSystemEngine
print('PowerSystemEngine import OK')
          "

  # Deploy to Staging
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: lint
    if: github.ref == 'refs/heads/develop'
    environment: staging
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install
      - name: Deploy to Cloudflare Staging
        run: npx wrangler deploy --env staging
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      - name: Run smoke tests
        run: |
          sleep 10
          curl -f https://ahmed-etap-staging.ahmdelbaz28.workers.dev/health || exit 1

  # Deploy to Production
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [lint, python-service]
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install
      - name: Deploy to Cloudflare Production
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      - name: Run health checks
        run: |
          sleep 15
          curl -f https://ahmed-etap.ahmdelbaz28.workers.dev/health || exit 1
          curl -f https://ahmed-etap.ahmdelbaz28.workers.dev/metrics || exit 1
      - name: Notify deployment success
        if: success()
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "✅ ETAP AI Platform deployed to production successfully!\nVersion: ${{ github.sha }}\nDeployed by: ${{ github.actor }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
      - name: Notify deployment failure
        if: failure()
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "❌ ETAP AI Platform production deployment FAILED!\nVersion: ${{ github.sha }}\nDeployed by: ${{ github.actor }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
