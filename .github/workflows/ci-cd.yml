# =============================================================================
# AhmedETAP — Complete CI/CD Pipeline (OPTIMIZED)
# GitHub → Tests → Build → Deploy (HF + Vercel) → Health Check → Index Update
# Auto-deploy triggers on EVERY push to main/develop
# =============================================================================
name: AhmedETAP CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# ─── Global environment variables (non-secret) ───────────────────────────────
env:
  PYTHON_VERSION: '3.12'
  NODE_VERSION: '20'
  HF_SPACE_URL: https://ahmdelbaz28-ahmedetap.hf.space
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

# =============================================================================
jobs:

  # ── 1. CODE QUALITY ─────────────────────────────────────────────────────────
  lint:
    name: 🔍 Code Quality Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install linting tools
        run: pip install ruff mypy

      - name: Ruff lint
        run: ruff check . --config ruff.toml

      - name: Ruff format check
        run: ruff format . --check

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: ui/package-lock.json

      - name: Install UI dependencies
        working-directory: ui
        run: |
          npm install --ignore-scripts 2>&1 || {
            echo "::warning::npm install failed (likely Electron binary). Retrying with --no-optional..."
            npm install --ignore-scripts --no-optional 2>&1 || echo "::warning::UI dependencies partially installed — skipping UI checks"
          }

      - name: TypeScript type-check
        if: success()
        working-directory: ui
        run: npx tsc --noEmit 2>&1 || echo "::warning::TypeScript check failed but continuing"

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 8

      - name: Install root dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Run scenario tests
        env:
          SKIP_LIVE_SCENARIO_TESTS: 'true'
        run: pnpm test:scenarios

  # ── 2. PYTHON TESTS ─────────────────────────────────────────────────────────
  python-tests:
    name: 🧪 Python Test Suite
    runs-on: ubuntu-latest
    needs: lint
    env:
      ENVIRONMENT: testing
      JWT_SECRET_KEY: ci-test-secret-key-for-github-actions
      DATABASE_URL: sqlite+aiosqlite:///./test.db
      REDIS_URL: redis://localhost:6379/0
      LANGWATCH_API_KEY: ${{ secrets.LANGWATCH_API_KEY }}
      SMITHERY_API_KEY: ${{ secrets.SMITHERY_API_KEY }}
      SKIP_LIVE_SCENARIO_TESTS: 'true'

    services:
      redis:
        image: redis:7-alpine
        ports: [6379:6379]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov

      - name: Validate Python syntax
        run: python -c "import ast; ast.parse(open('engineering_service.py').read()); print('✅ Syntax OK')"

      - name: Run test suite with coverage gate
        run: |
          pytest tests/ -v \
            --cov=. \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-fail-under=80 \
            -x \
            --tb=short \
            2>&1 | tail -80

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        if: always()
        with:
          file: coverage.xml
          flags: python
          fail_ci_if_error: false


  # ── 3. SECURITY SCAN ────────────────────────────────────────────────────────
  security-scan:
    name: 🔒 Security Scan
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install security tools
        run: pip install bandit safety

      - name: Bandit SAST scan
        # Uses .bandit ini file (skips B104/B108/B608/B102/B310/etc.)
        # -ll = Medium+High severity only; -ii = Medium+High confidence only.
        # Tests, build artifacts, and the UI frontend are excluded.
        run: bandit --ini .bandit -r . -ll -ii --format txt

      - name: Safety dependency check
        run: safety check -r requirements.txt --full-report

      - name: Custom security scan
        run: python scripts/security_scan.py

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'

  # ── 4. HELM CHART VALIDATION ─────────────────────────────────────────────────
  helm-chart:
    name: ⎈ Helm Chart Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: 'v3.15.0'

      - name: Helm dependency update
        working-directory: ./helm/etap-ai
        run: helm dependency update

      - name: Helm lint
        run: helm lint ./helm/etap-ai/

      - name: Helm template render
        run: helm template etap-ai ./helm/etap-ai/ > /tmp/rendered-manifests.yaml

  # ── 5. BUILD UI (VITE) ──────────────────────────────────────────────────────
  build-ui:
    name: 🏗️ Build UI (Vite)
    runs-on: ubuntu-latest
    needs: [python-tests, security-scan]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: ui/package-lock.json

      - name: Install UI dependencies
        working-directory: ui
        run: npm install --ignore-scripts --no-optional

      - name: Build UI
        working-directory: ui
        run: npm run build

      - name: Upload UI build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ui-dist-${{ github.sha }}
          path: ui/dist/
          retention-days: 1

  # ── 6. BUILD DOCKER IMAGE ────────────────────────────────────────────────────
  docker-build:
    name: 🐳 Build Docker Image
    runs-on: ubuntu-latest
    needs: [python-tests, security-scan]
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha
            type=ref,event=branch
            type=semver,pattern={{version}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── 6b. CONTAINER SCAN + SBOM ────────────────────────────────────────────────
  container-scan:
    name: 🔬 Container Scan + SBOM
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: write
      security-events: write

    steps:
      - uses: actions/checkout@v4

      - name: Trivy container vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'

      - name: Upload Trivy scan results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Generate SBOM (CycloneDX)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          format: 'cyclonedx'
          output: 'sbom.json'

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ github.sha }}
          path: sbom.json
          retention-days: 90

  # ── 7. DEPLOY TO VERCEL (Auto on push to main) ─────────────────────────────
  deploy-vercel:
    name: ▲ Deploy to Vercel (Auto)
    runs-on: ubuntu-latest
    needs: [python-tests, security-scan, build-ui]
    if: github.ref == 'refs/heads/main'
    environment:
      name: production-vercel
      url: https://vercel.com/ahmdelbaz28-uxs-projects/etap-ai-work

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Deploy to Vercel Production
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: team_eeEYqzXI8zkrTo62cUOTMVmS
          VERCEL_PROJECT_ID: prj_WucHqc3lQDwYe0i3ykgWz7UR5E3I
        run: |
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "⚠️ VERCEL_TOKEN secret not set — skipping Vercel deployment"
            exit 0
          fi
          echo "🚀 Deploying to Vercel Production..."
          vercel --prod --token "$VERCEL_TOKEN" --yes
          echo "✅ Vercel deployment complete"

  # ── 8. DEPLOY TO HUGGING FACE (Auto on push to main) ────────────────────────
  deploy-hf:
    name: 🤗 Deploy to HuggingFace Space (Auto)
    runs-on: ubuntu-latest
    needs: [python-tests, security-scan]
    if: github.ref == 'refs/heads/main'
    environment:
      name: production-hf
      url: https://huggingface.co/spaces/ahmdelbaz28/AHMEDETAP

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install huggingface_hub
        run: pip install huggingface_hub

      - name: Sync to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          if [ -z "$HF_TOKEN" ]; then
            echo "⚠️  HF_TOKEN secret not set — skipping HF sync"
            exit 0
          fi

          git config user.email "ci@github.com"
          git config user.name  "GitHub Actions"

          echo "🚀 Syncing to HF Space: ahmdelbaz28/AHMEDETAP"
          git push https://user:${HF_TOKEN}@huggingface.co/spaces/ahmdelbaz28/AHMEDETAP main --force
          echo "✅ HF Sync complete"

      - name: Update HF Space Secrets
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          LANGWATCH_API_KEY: ${{ secrets.LANGWATCH_API_KEY }}
          SMITHERY_API_KEY: ${{ secrets.SMITHERY_API_KEY }}
          JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }}
        run: |
          python - <<'EOF'
          import os
          from huggingface_hub import HfApi

          hf_token = os.environ.get("HF_TOKEN", "")
          if not hf_token:
              print("⚠️  HF_TOKEN not set — skipping secret update")
              exit(0)

          api  = HfApi(token=hf_token)
          repo = "ahmdelbaz28/AHMEDETAP"

          secrets_to_set = {
              "LANGWATCH_API_KEY": os.environ.get("LANGWATCH_API_KEY", ""),
              "SMITHERY_API_KEY":  os.environ.get("SMITHERY_API_KEY",  ""),
              "JWT_SECRET_KEY":    os.environ.get("JWT_SECRET_KEY",    ""),
              "ENVIRONMENT":       "production",
          }

          for key, value in secrets_to_set.items():
              if value:
                  api.add_space_secret(repo_id=repo, key=key, value=value)
                  print(f"  ✅ Secret set: {key}")
              else:
                  print(f"  ⚠️  Skipped (empty): {key}")
          EOF

  # ── 9. HEALTH CHECK ──────────────────────────────────────────────────────────
  health-check:
    name: 🩺 Production Health Check
    runs-on: ubuntu-latest
    needs: [deploy-hf, deploy-vercel]
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Wait for HF Space to restart
        run: sleep 60

      - name: Health endpoint
        run: |
          HTTP=$(curl -sf -o /dev/null -w "%{http_code}" ${{ env.HF_SPACE_URL }}/health || echo "000")
          echo "Health: $HTTP"
          [ "$HTTP" != "000" ] && [ "$HTTP" -lt 500 ] || exit 1

      - name: Readiness endpoint
        run: |
          HTTP=$(curl -sf -o /dev/null -w "%{http_code}" ${{ env.HF_SPACE_URL }}/ready || echo "000")
          echo "Ready: $HTTP"
          [ "$HTTP" != "000" ] && [ "$HTTP" -lt 500 ] || exit 1

      - name: Notify deployment success
        run: |
          echo "🎉 AhmedETAP deployed successfully!"
          echo "   HF Space:  ${{ env.HF_SPACE_URL }}"
          echo "   Vercel:    https://vercel.com/ahmdelbaz28-uxs-projects/etap-ai-work"
          echo "   Commit:    ${{ github.sha }}"
          echo "   Branch:    ${{ github.ref_name }}"

  # ── 10. AUTO-UPDATE PROJECT INDEX ─────────────────────────────────────────────
  update-index:
    name: 📋 Update Project Index
    runs-on: ubuntu-latest
    needs: health-check
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Regenerate project index
        run: python indexer.py

      - name: Commit updated index
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -f PROJECT_INDEX.json ] || [ -f PROJECT_INDEX.md ]; then
            git add PROJECT_INDEX.json PROJECT_INDEX.md 2>/dev/null || true
            if ! git diff --cached --quiet; then
              git commit -m "chore(index): auto-update @ ${{ github.sha }} [skip ci]"
              git push 2>&1 || echo "::warning::Index push failed (may be race condition)"
              echo "Index updated and pushed."
            else
              echo "No index changes detected — skipping commit."
            fi
          else
            echo "::warning::Index files not found — skipping commit."
          fi
