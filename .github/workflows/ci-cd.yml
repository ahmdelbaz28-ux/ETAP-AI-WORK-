# GitHub Actions CI/CD Pipeline for AhmedETAP
name: AhmedETAP CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Lint and Type Check
  lint:
    name: Code Quality Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Node dependencies
        run: pnpm install --no-frozen-lockfile
      - name: TypeScript typecheck
        run: pnpm lint
      - name: Run TypeScript tests
        run: pnpm test

  # Python Service Validation
  python-service:
    name: Python Service Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install fastapi uvicorn pydantic ruff
      - name: Validate Engineering Service syntax
        run: python -c "import ast; ast.parse(open('engineering_service.py').read()); print('Engineering Service syntax OK')"
      - name: Ruff lint check
        run: ruff check . --config ruff.toml
      - name: Validate Python engine syntax
        run: python3 validate_syntax.py

  # Security Scan
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Run security scan
        run: python scripts/security_scan.py

  # Health Check against deployed HF Space
  health-check:
    name: Health Check (HF Space)
    runs-on: ubuntu-latest
    needs: [lint, python-service, security-scan]
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Check root endpoint
        run: |
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" https://ahmdelbaz28-etap-ai-platform.hf.space/)
          if [ "$HTTP_CODE" -ge 500 ]; then echo "Root endpoint returned $HTTP_CODE"; exit 1; fi
          echo "Root endpoint OK ($HTTP_CODE)"
      - name: Check health endpoint
        run: |
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" https://ahmdelbaz28-etap-ai-platform.hf.space/health)
          if [ "$HTTP_CODE" -ge 500 ]; then echo "Health endpoint returned $HTTP_CODE"; exit 1; fi
          echo "Health endpoint OK ($HTTP_CODE)"
      - name: Check readyz endpoint
        run: |
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" https://ahmdelbaz28-etap-ai-platform.hf.space/readyz)
          if [ "$HTTP_CODE" -ge 500 ]; then echo "Readyz endpoint returned $HTTP_CODE"; exit 1; fi
          echo "Readyz endpoint OK ($HTTP_CODE)"
