name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2
      
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build twine
          
      - name: Build package
        run: python -m build
          
      - name: Create Release
        uses: softprops/action-gh-release@v1  # NOSONAR — S7637: GitHub Action pinning; SHA pinning in CI sprint
        with:
          files: dist/**
          generate_release_notes: true
