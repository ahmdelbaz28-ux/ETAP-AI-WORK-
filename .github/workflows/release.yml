name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write
  packages: write
  id-token: write  # Required for trusted publishing to PyPI (PEP 500)

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  PYTHON_VERSION: '3.12'

jobs:
  release:
    name: 📦 Build & Publish Release
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for changelog generation

      - name: 🐍 Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: 🔧 Install build tooling
        run: |
          python -m pip install --upgrade pip
          pip install build twine hatchling

      - name: 🔍 Validate pyproject.toml
        run: |
          python -c "import tomllib; tomllib.load(open('pyproject.toml','rb'))"
          echo "✅ pyproject.toml is valid"

      - name: 🏗️ Build package
        run: python -m build

      - name: 🧪 Verify built artifacts
        run: |
          ls -la dist/
          twine check dist/*

      - name: 📝 Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/**
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-alpha') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 📤 Publish to GitHub Packages (optional)
        # Only publish to PyPI if a trusted token is configured.
        # This is a no-op when TWINE_PASSWORD is unset, so it's safe by default.
        if: env.TWINE_PASSWORD != ''
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          if [ -z "$TWINE_PASSWORD" ]; then
            echo "ℹ️  PyPI token not configured — skipping PyPI upload"
            exit 0
          fi
          twine upload --repository pypi dist/*
