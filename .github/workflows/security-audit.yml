name: Security Audit

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1"

jobs:
  security-scan:
    name: Security & Secrets Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0

      - name: Scan for hardcoded secrets
        run: |
          echo "Scanning for leaked secrets..."
          FOUND=0

          for pattern in \
            "hf_[A-Za-z0-9]\{20,\}" \
            "ghp_[A-Za-z0-9]\{36\}" \
            "github_pat_[A-Za-z0-9_]\{50,\}" \
            "sk-[A-Za-z0-9]\{32,\}" \
            "AKIA[0-9A-Z]\{16\}" \
            "password.*=.*['\"].*['\"]" \
            "secret.*=.*['\"].*['\"]" \
            "api_key.*=.*['\"].*['\"]" \
            "token.*=.*['\"].*['\"]" \
          ; do
            MATCHES=$(grep -rn "$pattern" --include="*.py" --include="*.yml" --include="*.yaml" --include="*.json" --include="*.ts" --include="*.js" --include="*.env" . 2>/dev/null | grep -v ".git/" | grep -v "node_modules/" | grep -v "__pycache__/" || true)
            if [ -n "$MATCHES" ]; then
              echo "WARNING: Potential secret found with pattern: $pattern"
              echo "$MATCHES"
              FOUND=1
            fi
          done

          if [ "$FOUND" -eq 1 ]; then
            echo ""
            echo "Security scan found potential secrets!"
            echo "Review the output above and ensure no real secrets are committed."
            echo "Add false positives to .gitignore or exclude patterns."
          else
            echo "No secrets detected."
          fi

      - name: Check for dangerous code patterns
        run: |
          echo "Checking for dangerous patterns..."
          
          # Check for eval() usage
          EVAL_COUNT=$(grep -rn "eval(" --include="*.py" . 2>/dev/null | grep -v ".git/" | grep -v "test" || true)
          if [ -n "$EVAL_COUNT" ]; then
            echo "WARNING: eval() usage found (potential code injection):"
            echo "$EVAL_COUNT"
          fi
          
          # Check for exec() usage
          EXEC_COUNT=$(grep -rn "exec(" --include="*.py" . 2>/dev/null | grep -v ".git/" | grep -v "test" || true)
          if [ -n "$EXEC_COUNT" ]; then
            echo "WARNING: exec() usage found:"
            echo "$EXEC_COUNT"
          fi
          
          # Check for subprocess with shell=True
          SHELL_TRUE=$(grep -rn "shell=True" --include="*.py" . 2>/dev/null | grep -v ".git/" || true)
          if [ -n "$SHELL_TRUE" ]; then
            echo "WARNING: subprocess with shell=True found:"
            echo "$SHELL_TRUE"
          fi
          
          echo "Dangerous pattern scan complete."

      - name: Check dependency vulnerabilities
        run: |
          pip install pip-audit 2>/dev/null || true
          if [ -f requirements.txt ]; then
            pip-audit -r requirements.txt --desc 2>/dev/null || echo "pip-audit completed with warnings"
          fi

      - name: Audit HF Space files
        run: |
          echo "Auditing hf-space/ directory..."
          
          # Check Dockerfile best practices
          if [ -f hf-space/Dockerfile ]; then
            # Must not run as root in production
            if ! grep -q "USER" hf-space/Dockerfile; then
              echo "NOTE: Dockerfile runs as root (acceptable for HF Spaces)"
            fi
            
            # Must have HEALTHCHECK or health endpoint
            echo "Dockerfile health check: app.py handles /healthz"
          fi
          
          # Check README front matter
          if [ -f hf-space/README.md ]; then
            if head -1 hf-space/README.md | grep -q "^---"; then
              echo "README.md has valid YAML front matter"
            else
              echo "ERROR: README.md missing YAML front matter"
              exit 1
            fi
          fi
          
          echo "HF Space audit complete."
