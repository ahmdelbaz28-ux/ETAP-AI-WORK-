name: Code Quality

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python-lint:
    name: Python Lint & Format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install linters
        run: pip install ruff
      - name: Ruff lint
        run: ruff check . --output-format=github
      - name: Python syntax validation
        run: python3 validate_syntax.py

  typescript-lint:
    name: TypeScript Lint & Format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile
      - name: TypeScript type check
        run: pnpm lint
        continue-on-error: true
      - name: TypeScript tests
        run: pnpm test
        continue-on-error: true

  yaml-validate:
    name: YAML & Config Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Validate YAML files
        run: |
          python3 -c "
          import yaml, sys, glob
          errors = []
          for f in glob.glob('**/*.yml', recursive=True):
              if '.git/' in f or 'node_modules/' in f:
                  continue
              try:
                  yaml.safe_load(open(f))
              except Exception as e:
                  errors.append(f'{f}: {e}')
          if errors:
              for e in errors:
                  print(f'ERROR: {e}')
              sys.exit(1)
          print(f'All YAML files validated successfully')
          "
