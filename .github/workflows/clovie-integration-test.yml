name: Clovie Router Integration Test

on:
  workflow_dispatch:
    inputs:
      model:
        description: 'MiMo model to test'
        required: false
        default: 'mimo-v2-flash'

jobs:
  clovie-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install httpx
        run: pip install --quiet httpx

      - name: Verify Clovie secrets are present
        env:
          CLOVIE_API_KEY: ${{ secrets.CLOVIE_API_KEY }}
          CLOVIE_BASE_URL: ${{ secrets.CLOVIE_BASE_URL }}
          CLOVIE_MODEL: ${{ secrets.CLOVIE_MODEL }}
        run: |
          echo "=========================================="
          echo "  Clovie Router Integration Test"
          echo "=========================================="
          echo ""
          PASS=0
          FAIL=0
          for s in CLOVIE_API_KEY CLOVIE_BASE_URL CLOVIE_MODEL; do
            val=$(eval echo \$$s)
            if [ -z "$val" ]; then
              echo "  ❌ FAIL  $s (empty)"
              FAIL=$((FAIL+1))
            else
              len=${#val}
              masked="${val:0:8}...${val: -4}"
              echo "  ✅ PASS  $s (length=$len, value=$masked)"
              PASS=$((PASS+1))
            fi
          done
          echo ""
          echo "Secrets check: PASS=$PASS FAIL=$FAIL"
          if [ "$FAIL" -gt 0 ]; then
            echo "::error::$FAIL Clovie secrets are missing"
            exit 1
          fi

      - name: Test connectivity + credits
        env:
          CLOVIE_API_KEY: ${{ secrets.CLOVIE_API_KEY }}
          CLOVIE_BASE_URL: ${{ secrets.CLOVIE_BASE_URL }}
          CLOVIE_MODEL: ${{ secrets.CLOVIE_MODEL }}
          TEST_MODEL: ${{ github.event.inputs.model }}
        run: |
          echo ""
          echo "── Test: Clovie /chat/completions ──"
          MODEL="${TEST_MODEL:-$CLOVIE_MODEL}"
          echo "Using model: $MODEL"
          echo ""
          echo "Request body:"
          cat <<EOF | python3
          import json
          print(json.dumps({
              "model": "$MODEL",
              "messages": [{"role": "user", "content": "Reply with the single word: hello"}],
              "max_tokens": 10,
              "temperature": 0.0
          }, indent=2))
          EOF
          echo ""
          STATUS=$(curl -s -o /tmp/clovie.json -w "%{http_code}" \
            -H "Authorization: Bearer $CLOVIE_API_KEY" \
            -H "Content-Type: application/json" \
            -X POST "$CLOVIE_BASE_URL/chat/completions" \
            -d "{\"model\":\"$MODEL\",\"messages\":[{\"role\":\"user\",\"content\":\"Reply with the single word: hello\"}],\"max_tokens\":10,\"temperature\":0.0}")
          echo "HTTP Status: $STATUS"
          echo ""
          echo "Response body:"
          cat /tmp/clovie.json | python3 -m json.tool 2>/dev/null || cat /tmp/clovie.json
          echo ""
          if [ "$STATUS" = "200" ]; then
            echo "✅ Clovie API is working — credits available"
            TEXT=$(cat /tmp/clovie.json | python3 -c "import json,sys; d=json.load(sys.stdin); print(d['choices'][0]['message']['content'])" 2>/dev/null || echo "?")
            echo "Model reply: $TEXT"
          elif [ "$STATUS" = "402" ]; then
            echo "⚠️  Clovie account is OUT OF CREDITS"
            echo "   Top up at: https://gitlawb.com/opengateway/credits"
            echo "   The integration code is correct — once credits are topped up, it will work."
            exit 0  # Don't fail the workflow — this is informational
          elif [ "$STATUS" = "401" ] || [ "$STATUS" = "403" ]; then
            echo "❌ Clovie auth failed — API key is invalid or expired"
            exit 1
          else
            echo "❌ Clovie returned HTTP $STATUS"
            exit 1
          fi

      - name: Test all 5 MiMo models
        env:
          CLOVIE_API_KEY: ${{ secrets.CLOVIE_API_KEY }}
          CLOVIE_BASE_URL: ${{ secrets.CLOVIE_BASE_URL }}
        run: |
          echo ""
          echo "── Test all 5 MiMo models (1 token each) ──"
          for model in mimo-v2.5-pro mimo-v2.5 mimo-v2-omni mimo-v2-pro mimo-v2-flash; do
            STATUS=$(curl -s -o /tmp/m.json -w "%{http_code}" \
              -H "Authorization: Bearer $CLOVIE_API_KEY" \
              -H "Content-Type: application/json" \
              -X POST "$CLOVIE_BASE_URL/chat/completions" \
              -d "{\"model\":\"$model\",\"messages\":[{\"role\":\"user\",\"content\":\"hi\"}],\"max_tokens\":1}")
            if [ "$STATUS" = "200" ]; then
              echo "  ✅ $model — works"
            elif [ "$STATUS" = "402" ]; then
              echo "  ⚠️  $model — out of credits (top up at https://gitlawb.com/opengateway/credits)"
            else
              echo "  ❌ $model — HTTP $STATUS"
            fi
          done

      - name: Final summary
        run: |
          echo ""
          echo "=========================================="
          echo "  Clovie integration test complete ✅"
          echo "=========================================="
          echo ""
          echo "Available MiMo models:"
          echo "  - mimo-v2.5-pro    (Latest flagship)"
          echo "  - mimo-v2.5        (Latest balanced)"
          echo "  - mimo-v2-omni     (Multimodal)"
          echo "  - mimo-v2-pro      (Previous-gen pro)"
          echo "  - mimo-v2-flash    (Fastest/cheapest — default)"
          echo ""
          echo "Compatible with: Hermes, OpenClaw, Cline, Claude Code"
          echo "Top up credits: https://gitlawb.com/opengateway/credits"
