name: Secrets Verification

on:
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for running'
        required: false
        default: 'manual-secrets-verification'

jobs:
  verify-secrets:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4.3.1

      - name: Verify all required secrets are set
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_PAT: ${{ secrets.SUPABASE_PAT }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          LANGFUSE_PUBLIC_KEY: ${{ secrets.LANGFUSE_PUBLIC_KEY }}
          LANGFUSE_SECRET_KEY: ${{ secrets.LANGFUSE_SECRET_KEY }}
          LANGWATCH_API_KEY: ${{ secrets.LANGWATCH_API_KEY }}
          SMITHERY_API_KEY: ${{ secrets.SMITHERY_API_KEY }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          NEO4J_URI: ${{ secrets.NEO4J_URI }}
          NEO4J_PASSWORD: ${{ secrets.NEO4J_PASSWORD }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }}
          ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}
        run: |
          echo "=========================================="
          echo "  AhmedETAP ‚Äî Secrets Verification Report"
          echo "=========================================="
          echo ""
          PASS=0
          FAIL=0
          WARN=0
          check_secret() {
            local name="$1"
            local val="${!name}"
            if [ -z "$val" ]; then
              echo "  ‚ùå FAIL  $name  (empty)"
              FAIL=$((FAIL+1))
            else
              len=${#val}
              masked="${val:0:4}...${val: -4}"
              echo "  ‚úÖ PASS  $name  (length=$len, value=$masked)"
              PASS=$((PASS+1))
            fi
          }
          for s in HF_TOKEN SUPABASE_URL SUPABASE_ANON_KEY SUPABASE_SERVICE_ROLE_KEY SUPABASE_PAT DATABASE_URL LANGFUSE_PUBLIC_KEY LANGFUSE_SECRET_KEY LANGWATCH_API_KEY SMITHERY_API_KEY VERCEL_TOKEN VERCEL_PROJECT_ID NEO4J_URI NEO4J_PASSWORD GITHUB_TOKEN JWT_SECRET_KEY ENCRYPTION_KEY; do
            check_secret "$s"
          done
          echo ""
          echo "=========================================="
          echo "  Summary: PASS=$PASS  FAIL=$FAIL  WARN=$WARN"
          echo "=========================================="
          if [ "$FAIL" -gt 0 ]; then
            echo "::error::$FAIL secrets are empty"
            exit 1
          fi

      - name: Test Supabase REST connectivity
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          echo ""
          echo "‚îÄ‚îÄ Test 1: Supabase REST ‚îÄ‚îÄ"
          STATUS=$(curl -s -o /tmp/sb.json -w "%{http_code}" \
            -H "apikey: $SUPABASE_SERVICE_ROLE_KEY" \
            -H "Authorization: Bearer $SUPABASE_SERVICE_ROLE_KEY" \
            "$SUPABASE_URL/rest/v1/users?select=*&limit=5")
          echo "Supabase /rest/v1/users: HTTP $STATUS"
          if [ "$STATUS" = "200" ]; then
            echo "  Body: $(cat /tmp/sb.json | head -c 200)"
            echo "  ‚úÖ Supabase reachable from CI"
          else
            echo "  ‚ùå Supabase failed"
          fi

      - name: Test Langfuse connectivity
        env:
          LANGFUSE_PUBLIC_KEY: ${{ secrets.LANGFUSE_PUBLIC_KEY }}
          LANGFUSE_SECRET_KEY: ${{ secrets.LANGFUSE_SECRET_KEY }}
        run: |
          echo ""
          echo "‚îÄ‚îÄ Test 2: Langfuse ‚îÄ‚îÄ"
          BASIC=$(echo -n "$LANGFUSE_PUBLIC_KEY:$LANGFUSE_SECRET_KEY" | base64 -w 0)
          STATUS=$(curl -s -o /tmp/lf.json -w "%{http_code}" \
            -H "Authorization: Basic $BASIC" \
            "https://cloud.langfuse.com/api/public/health")
          echo "Langfuse /api/public/health: HTTP $STATUS"
          if [ "$STATUS" = "200" ]; then
            echo "  ‚úÖ Langfuse reachable from CI"
          else
            echo "  ‚ùå Langfuse failed"
          fi

      - name: Test Smithery connectivity
        env:
          SMITHERY_API_KEY: ${{ secrets.SMITHERY_API_KEY }}
        run: |
          echo ""
          echo "‚îÄ‚îÄ Test 3: Smithery ‚îÄ‚îÄ"
          STATUS=$(curl -s -o /tmp/sm.json -w "%{http_code}" \
            -H "Authorization: Bearer $SMITHERY_API_KEY" \
            "https://api.smithery.ai/servers")
          echo "Smithery /servers: HTTP $STATUS"
          if [ "$STATUS" = "200" ]; then
            COUNT=$(cat /tmp/sm.json | python3 -c "import json,sys; print(len(json.load(sys.stdin).get('servers',[])))")
            echo "  ‚úÖ Smithery reachable ‚Äî $COUNT servers"
          else
            echo "  ‚ùå Smithery failed"
          fi

      - name: Test Hugging Face token
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          echo ""
          echo "‚îÄ‚îÄ Test 4: Hugging Face ‚îÄ‚îÄ"
          STATUS=$(curl -s -o /tmp/hf.json -w "%{http_code}" \
            -H "Authorization: Bearer $HF_TOKEN" \
            "https://huggingface.co/api/whoami-v2")
          echo "HF /api/whoami-v2: HTTP $STATUS"
          if [ "$STATUS" = "200" ]; then
            NAME=$(cat /tmp/hf.json | python3 -c "import json,sys; print(json.load(sys.stdin).get('name','?'))")
            echo "  ‚úÖ HF token valid ‚Äî user: $NAME"
          else
            echo "  ‚ùå HF token invalid"
          fi

      - name: Final summary
        run: |
          echo ""
          echo "=========================================="
          echo "  All secrets verification complete ‚úÖ"
          echo "=========================================="
