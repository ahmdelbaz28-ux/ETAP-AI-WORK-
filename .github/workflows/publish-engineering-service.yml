# =============================================================================
# Publish Engineering Service to GHCR (multi-arch)
# =============================================================================
# Builds a multi-arch (linux/amd64, linux/arm64) Docker image and pushes it
# to GitHub Container Registry. Triggers:
#   - On push to main (tagged as :latest + :sha-<short>)
#   - On version tags (v*.*.*) — tagged as :v1.2.3 + :latest
#   - On pull requests — builds only (no push), to validate the Dockerfile
#
# The image lives at:
#   ghcr.io/<owner>/<repo>/etap-engineering-service:<tag>
#
# Required secrets:
#   None — uses the built-in GITHUB_TOKEN (write:packages is included).
#
# How to use after the first successful run:
#   docker pull ghcr.io/<owner>/<repo>/etap-engineering-service:latest
#   ./scripts/deploy-engineering-service.sh fly <app-name> --region iad
# =============================================================================

name: Publish Engineering Service

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
    paths:
      - "Dockerfile.engineering-service"
      - "engineering_service.py"
      - "engine/**"
      - "core_model/**"
      - "etap_integration/**"
      - "fault_analysis/**"
      - "load_flow/**"
      - "network_solver/**"
      - "coordination/**"
      - "relays/**"
      - "curves/**"
      - "visualization/**"
      - "security/**"
      - "knowledge/**"
      - "requirements.txt"
      - ".github/workflows/publish-engineering-service.yml"
  pull_request:
    branches: [main]
    paths:
      - "Dockerfile.engineering-service"
      - "engineering_service.py"
      - "engine/**"
      - "core_model/**"
      - "etap_integration/**"
      - "fault_analysis/**"
      - "load_flow/**"
      - "network_solver/**"
      - "coordination/**"
      - "relays/**"
      - "curves/**"
      - "visualization/**"
      - "security/**"
      - "knowledge/**"
      - "requirements.txt"

# Cancel in-progress runs for the same branch/tag
concurrency:
  group: publish-eng-svc-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ahmdelbaz28-ux/etap-engineering-service

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    name: Build & Push Multi-Arch Image
    runs-on: ubuntu-latest
    steps:
      # ------------------------------------------------------------------
      # 1. Checkout
      # ------------------------------------------------------------------
      - name: Checkout code
        uses: actions/checkout@v7.0.0

      # ------------------------------------------------------------------
      # 2. Docker Buildx (multi-arch builder)
      # ------------------------------------------------------------------
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: |
            image=moby/buildkit:latest
            network=host

      # ------------------------------------------------------------------
      # 3. QEMU (needed for arm64 emulation)
      # ------------------------------------------------------------------
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/amd64,linux/arm64

      # ------------------------------------------------------------------
      # 4. Login to GHCR
      # ------------------------------------------------------------------
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ------------------------------------------------------------------
      # 5. Extract metadata (tags + labels)
      # ------------------------------------------------------------------
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # On push to main → :latest
            type=raw,value=latest,enable={{is_default_branch}}
            # On version tag → :v1.2.3
            type=ref,event=tag
            # Always → :sha-<short>
            type=sha,prefix=sha-,format=short
            # On PR → :pr-<number>
            type=ref,event=pr
          labels: |
            org.opencontainers.image.title=etap-engineering-service
            org.opencontainers.image.description=AhmedETAP Engineering Service (FastAPI) — load flow, short circuit, arc flash, harmonic analysis, OPF, protection coordination
            org.opencontainers.image.vendor=AhmedETAP

      # ------------------------------------------------------------------
      # 6. Build & push (multi-arch)
      # ------------------------------------------------------------------
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.engineering-service
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true

      # ------------------------------------------------------------------
      # 7. Summary
      # ------------------------------------------------------------------
      - name: Image digest
        if: github.event_name != 'pull_request'
        run: |
          echo "## 🐳 Engineering Service Published" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Registry:** \`${{ env.REGISTRY }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Image:** \`${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Platforms:** \`linux/amd64\`, \`linux/arm64\`" >> $GITHUB_STEP_SUMMARY
          echo "**Tags:**" >> $GITHUB_STEP_SUMMARY
          echo '${{ steps.meta.outputs.tags }}' | while read -r tag; do
            echo "- \`$tag\`" >> $GITHUB_STEP_SUMMARY
          done
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Deploy" >> $GITHUB_STEP_SUMMARY
          echo '```bash' >> $GITHUB_STEP_SUMMARY
          echo '# Pull the image' >> $GITHUB_STEP_SUMMARY
          echo 'docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest' >> $GITHUB_STEP_SUMMARY
          echo '' >> $GITHUB_STEP_SUMMARY
          echo '# Deploy to Fly.io' >> $GITHUB_STEP_SUMMARY
          echo './scripts/deploy-engineering-service.sh fly etap-eng-prod --region iad' >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Annotate deployment
        if: github.event_name != 'pull_request' && startsWith(github.ref, 'refs/tags/')
        run: |
          echo "::notice title=Engineering Service Published::Multi-arch image pushed to GHCR. Deploy with: ./scripts/deploy-engineering-service.sh fly etap-eng-prod"
