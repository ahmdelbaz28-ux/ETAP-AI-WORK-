name: Quality Gates

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pre-commit:
    name: Lint, Syntax, Validation
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Python dependencies
        run: python3 -m pip install -r requirements.txt ruff

      - name: Ruff lint check
        run: ruff check .

      - name: Python syntax validation
        run: python3 validate_syntax.py

      - name: Engineering validation suite
        run: python3 validation_suite.py
        continue-on-error: true

      - name: Pytest
        run: pytest -q
        continue-on-error: true

  pre-build:
    name: Build Verification
    runs-on: ubuntu-latest
    needs: pre-commit
    timeout-minutes: 25
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Validate docker compose config
        run: docker compose config --quiet
        continue-on-error: true

      - name: Build engineering-service image
        run: docker build -f Dockerfile.engineering-service -t etap-engineering-service:ci .
        continue-on-error: true

  post-build:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: pre-build
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Python dependencies
        run: python3 -m pip install -r requirements.txt

      - name: Run E2E smoke tests
        run: pytest -q tests/e2e_smoke_test.py
        continue-on-error: true

      - name: Run Trivy filesystem scan (via Docker image)
        # NOTE: We use the official Trivy Docker image directly instead of
        # aquasecurity/trivy-action. The action's setup-trivy dependency chain
        # has been repeatedly broken (v0.28.0 was deleted; v0.32.0 install.sh
        # fails on Ubuntu 24.04). The Docker image is published and tested by
        # the Trivy team and is far more stable.
        run: |
          docker run --rm \
            -v "${PWD}:/repo" \
            -v /tmp/trivy-cache:/root/.cache/trivy \
            -w /repo \
            aquasec/trivy:latest \
            fs --exit-code 0 --severity CRITICAL,HIGH \
               --ignore-unfixed \
               --skip-dirs .git,node_modules,ui/node_modules,.venv,venv,__pycache__ \
               --format sarif \
               --output /repo/trivy-results.sarif \
               .

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif
        if: always()

  scheduled-regression:
    name: Nightly Regression
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    timeout-minutes: 60
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Python dependencies
        run: python3 -m pip install -r requirements.txt ruff

      - name: Ruff lint check
        run: ruff check .

      - name: Python syntax validation
        run: python3 validate_syntax.py

      - name: Engineering validation suite
        run: python3 validation_suite.py
        continue-on-error: true

      - name: Pytest with coverage
        run: pytest -q --cov --cov-report=term-missing
        continue-on-error: true

      - name: Generate regression report
        run: |
          python3 -c 'import json, datetime; results = {"timestamp": datetime.datetime.utcnow().isoformat() + "Z", "status": "completed"}; open("regression-report.json", "w").write(json.dumps(results, indent=2))'

      - name: Upload regression report
        uses: actions/upload-artifact@v4
        with:
          name: scheduled-regression-report
          path: regression-report.json
          retention-days: 90
          compression-level: 1
