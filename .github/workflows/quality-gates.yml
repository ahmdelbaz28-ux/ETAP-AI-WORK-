name: Quality Gates

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pre-commit:
    name: Lint, Syntax, Validation
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Python dependencies
        run: python3 -m pip install -r requirements.txt ruff

      - name: Ruff lint check
        run: ruff check .

      - name: Python syntax validation
        run: python3 validate_syntax.py

      - name: Engineering validation suite
        run: python3 validation_suite.py
        continue-on-error: true

      - name: Pytest
        run: pytest -q
        continue-on-error: true

  pre-build:
    name: Build Verification
    runs-on: ubuntu-latest
    needs: pre-commit
    timeout-minutes: 25
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Validate docker compose config
        run: docker compose config --quiet
        continue-on-error: true

      - name: Build engineering-service image
        run: docker build -f Dockerfile.engineering-service -t etap-engineering-service:ci .
        continue-on-error: true

  post-build:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: pre-build
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Python dependencies
        run: python3 -m pip install -r requirements.txt

      - name: Run E2E smoke tests
        run: pytest -q tests/e2e_smoke_test.py
        continue-on-error: true

      - name: Set up Trivy
        uses: aquasecurity/trivy-action@0.28.0
        with:
          version: '0.56.0'
          cache-dir: /tmp/trivy-cache

      - name: Trivy filesystem scan
        run: trivy filesystem --exit-code 0 --severity CRITICAL,HIGH --format sarif --output trivy-results.sarif .

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif
        if: always()

  scheduled-regression:
    name: Nightly Regression
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    timeout-minutes: 60
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Python dependencies
        run: python3 -m pip install -r requirements.txt ruff

      - name: Ruff lint check
        run: ruff check .

      - name: Python syntax validation
        run: python3 validate_syntax.py

      - name: Engineering validation suite
        run: python3 validation_suite.py
        continue-on-error: true

      - name: Pytest with coverage
        run: pytest -q --cov --cov-report=term-missing
        continue-on-error: true

      - name: Generate regression report
        run: |
          python3 -c 'import json, datetime; results = {"timestamp": datetime.datetime.utcnow().isoformat() + "Z", "status": "completed"}; open("regression-report.json", "w").write(json.dumps(results, indent=2))'

      - name: Upload regression report
        uses: actions/upload-artifact@v4
        with:
          name: scheduled-regression-report
          path: regression-report.json
          retention-days: 90
          compression-level: 1
