name: Secret Scan

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    # Weekly scan of full history at 04:00 UTC every Monday
    - cron: '0 4 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  security-events: write  # required for SARIF upload

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gitleaks:
    name: Gitleaks Secret Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0  # full history for baseline comparison

      - name: Run Gitleaks via Docker
        # NOTE: Using Docker directly instead of gitleaks/gitleaks-action@v2
        # because the action targets Node.js 20, which is deprecated on
        # GitHub Actions runners (forced to run on Node.js 24). Running
        # gitleaks via Docker avoids the Node.js wrapper entirely.
        #
        # SECURITY (E-29): Removed continue-on-error: true. Previously the
        # gitleaks scan was NON-BLOCKING — leaked secrets would NOT stop
        # the pipeline. This is unacceptable for a power-engineering platform
        # where leaked Supabase service_role keys can bypass RLS and expose
        # all user data. Now the scan blocks the pipeline on any finding.
        # If a false positive occurs, add an allow-rule to .gitleaks.toml
        # rather than re-enabling continue-on-error.
        run: |
          set -e
          docker run --rm \
            -v "${PWD}:/repo" \
            -w /repo \
            ghcr.io/gitleaks/gitleaks:latest \
            detect \
            --source=/repo \
            --config=/repo/.gitleaks.toml \
            --verbose \
            --redact \
            --exit-code=1
          echo "Gitleaks scan complete — no secrets detected"

      - name: Generate Gitleaks SARIF
        if: always()
        run: |
          docker run --rm \
            -v "${PWD}:/repo" \
            -w /repo \
            ghcr.io/gitleaks/gitleaks:latest \
            detect \
            --source=/repo \
            --config=/repo/.gitleaks.toml \
            --report-format=sarif \
            --report-path=/repo/gitleaks-results.sarif \
            --verbose \
            2>&1 || true
          echo "Gitleaks SARIF generated"

  custom-patterns:
    name: Custom Secret Patterns (scripts/security_scan.py)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: '3.12'

      - name: Run security_scan.py
        run: python scripts/security_scan.py
