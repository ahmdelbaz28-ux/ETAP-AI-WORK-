name: Secret Scan

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    # Weekly scan of full history at 04:00 UTC every Monday
    - cron: '0 4 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  security-events: write  # required for SARIF upload

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gitleaks:
    name: Gitleaks Secret Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.3
        with:
          fetch-depth: 0  # full history for baseline comparison

      - name: Run Gitleaks via Docker
        # NOTE: Using Docker directly instead of gitleaks/gitleaks-action@v2
        # because the action targets Node.js 20, which is deprecated on
        # GitHub Actions runners (forced to run on Node.js 24). Running
        # gitleaks via Docker avoids the Node.js wrapper entirely.
        run: |
          docker run --rm \
            -v "${PWD}:/repo" \
            -w /repo \
            ghcr.io/gitleaks/gitleaks:latest \
            detect \
            --source=/repo \
            --config=/repo/.gitleaks.toml \
            --verbose \
            --redact \
            2>&1 | tee /tmp/gitleaks-output.txt
          # Report findings but don't block the pipeline — findings are
          # reviewed manually. Use --exit-code=1 to make blocking.
          echo "Gitleaks scan complete — see SARIF or console output above"
        continue-on-error: true

      - name: Generate Gitleaks SARIF
        if: always()
        run: |
          docker run --rm \
            -v "${PWD}:/repo" \
            -w /repo \
            ghcr.io/gitleaks/gitleaks:latest \
            detect \
            --source=/repo \
            --config=/repo/.gitleaks.toml \
            --report-format=sarif \
            --report-path=/repo/gitleaks-results.sarif \
            --verbose \
            2>&1 || true
          echo "Gitleaks SARIF generated"

  custom-patterns:
    name: Custom Secret Patterns (scripts/security_scan.py)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.3

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Run security_scan.py
        run: python scripts/security_scan.py
