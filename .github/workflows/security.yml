name: Security Scan

on:
  schedule:
    - cron: '0 6 * * 1'  # Weekly on Monday at 06:00 UTC
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# SonarCloud S8233: write permission moved from workflow level to job level
# so each job only gets the permissions it actually needs (least privilege).
# `contents: read` stays at workflow level because every job needs to checkout.

permissions:
  contents: read

jobs:
  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript, python
      - name: Build Python
        run: pip install -r requirements.txt
        continue-on-error: true
      - name: Build TypeScript
        run: npm install -g pnpm && pnpm install --no-frozen-lockfile
        continue-on-error: true
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:javascript-typescript,python"

  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    # Dependency Review requires the repo-level "Dependency graph" feature to
    # be enabled (Settings → Code security and analysis → Dependency graph).
    # If that feature is disabled, the action fails with "Dependency review
    # is not supported on this repository". We treat that as a non-blocking
    # warning rather than a hard failure, so Dependabot PRs are not blocked
    # by a missing repo setting. To get hard failures on bad deps, enable
    # Dependency graph in the repo settings.
    # continue-on-error removed — security scan must block the pipeline
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high

  trivy:
    name: Trivy Security Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Run Trivy vulnerability scanner (filesystem, via Docker)
        # NOTE: We use the official Trivy Docker image directly instead of
        # aquasecurity/trivy-action, because the action's setup-trivy
        # dependency chain has been repeatedly broken (v0.28.0 depends on
        # setup-trivy@v0.2.1 which was deleted; v0.32.0 install.sh fails
        # with exit code 1 on Ubuntu 24.04). The Docker image is published
        # and tested by the Trivy team and is far more stable.
        run: |
          docker run --rm \
            -v "${PWD}:/repo" \
            -v /tmp/trivy-cache:/root/.cache/trivy \
            -w /repo \
            aquasec/trivy:latest \
            fs --severity CRITICAL,HIGH \
               --ignore-unfixed \
               --exit-code 1 \
               --skip-dirs .git,node_modules,ui/node_modules,.venv,venv,__pycache__ \
               --format sarif \
               --output /repo/trivy-results.sarif \
               .
      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

  npm-audit:
    name: npm Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Install pnpm
        uses: pnpm/action-setup@v2  # NOSONAR — S7637: GitHub Action pinning; SHA pinning in CI sprint
        with:
          version: 9
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile
      - name: Run pnpm audit
        run: |
          echo "### pnpm audit summary ###"
          pnpm audit --audit-level=high 2>&1  # blocking — audit must fail the pipeline on high/critical vulns
      - name: Audit UI dependencies
        working-directory: ui
        run: |
          echo "### npm audit (ui/) summary ###"
          npm audit --audit-level=high 2>&1  # blocking — audit must fail the pipeline on high/critical vulns

  pip-audit:
    name: pip Audit (Python)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install pip-audit
        run: python -m pip install pip-audit
      - name: Install project dependencies (for context)
        run: |
          python -m pip install -r requirements.txt
        continue-on-error: true
      - name: Run pip-audit
        run: |
          echo "### pip-audit summary ###"
          python -m pip_audit --requirement requirements.txt 2>&1  # blocking — audit must fail the pipeline on vulnerabilities

  secret-scan:
    name: Secret Detection (TruffleHog)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      # NOTE: Do NOT pass `--no-update` in extra_args — the action already
      # injects it internally, and repeating the flag causes TruffleHog to
      # exit with "flag 'no-update' cannot be repeated".
      - name: Trufflehog — verified secrets (fail on match)
        uses: trufflesecurity/trufflehog@main  # NOSONAR — S7637: GitHub Action pinning; SHA pinning in CI sprint
        with:
          extra_args: --only-verified
        continue-on-error: false
      - name: Trufflehog — unverified secrets (blocking)
        uses: trufflesecurity/trufflehog@main  # NOSONAR — S7637: GitHub Action pinning; SHA pinning in CI sprint
        # continue-on-error removed — security scan must block the pipeline
        with:
          extra_args: --no-verification
