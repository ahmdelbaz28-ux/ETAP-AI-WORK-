# AhmedETAP — Security Scans
# Runs comprehensive security analysis including:
#   - CodeQL (static analysis for multiple languages)
#   - Dependency Review (checks for vulnerable deps)
#   - Trivy (container/image scanning)
name: Security Scans

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly security scans (Sundays at 03:00 UTC)
    - cron: '0 3 * * 0'
  workflow_dispatch:

# Cancel previous runs on the same PR/branch for faster feedback
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write  # SonarCloud S8233: scoped to this job only
    steps:
      - name: Checkout code
        uses: actions/checkout@v7.0.0
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: javascript-typescript, python
      - name: Build Python
        run: pip install -r requirements.txt
        continue-on-error: true
      - name: Build TypeScript
        run: npm install -g pnpm && pnpm install --no-frozen-lockfile
        continue-on-error: true
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:javascript-typescript,python"

  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    # Dependency Review requires the repo-level "Dependency graph" feature to
    # be enabled (Settings → Code security and analysis → Dependency graph).
    # If that feature is disabled, the action fails with "Dependency review
    # is not supported on this repository". We treat that as a non-blocking
    # warning rather than a hard failure, so Dependabot PRs are not blocked
    # by a missing repo setting. To get hard failures on bad deps, enable
    # Dependency graph in the repo settings.
    # continue-on-error removed — security scan must block the pipeline
    steps:
      - name: Checkout code
        uses: actions/checkout@v7.0.0
      - name: Dependency Review
        uses: actions/dependency-review-action@v5
        with:
          fail-on-severity: high

  trivy:
    name: Trivy Security Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write  # SonarCloud S8233: scoped to this job only (uploads SARIF)
    steps:
      - name: Checkout code
        uses: actions/checkout@v7.0.0
      - name: Run Trivy vulnerability scanner (filesystem, via Docker)
        # NOTE: We use the official Trivy Docker image directly instead of
        # aquasecurity/trivy-action, because the action's setup-trivy
        # dependency chain has been repeatedly broken (v0.28.0 depends on
        # setup-trivy@v0.2.1 which was deleted; v0.32.0 install.sh fails
        # with exit code 1 on Ubuntu 24.04). The Docker image is published
        # and tested by the Trivy team and is far more stable.
        run: |
          docker run --rm \
            -v "${PWD}:/repo" \
            -v /tmp/trivy-cache:/root/.cache/trivy \
            -w /repo \
            aquasec/trivy:latest \
            fs --severity CRITICAL,HIGH \
               --ignore-unfixed \
               --exit-code 1 \
               --skip-dirs .git,node_modules,ui/node_modules,.venv,venv,__pycache__ \
               --format sarif \
               --output /repo/trivy-results.sarif \
               .
      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

  # ── CUSTOM SECURITY CHECKS ────────────────────────────────────────────────────
  custom-scans:
    name: Custom Security Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7.0.0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install security tools
        run: 'pip install --only-binary :all: bandit safety'

      - name: Run Bandit security scan
        run: |
          bandit -r . -x ./tests,./node_modules,./ui/node_modules,./.venv,./venv,./.git -ll -ii

      - name: Check for hardcoded secrets with grep
        run: |
          echo "Checking for potential hardcoded secrets..."
          # This is a basic check - consider using dedicated tools like gitleaks in production
          if grep -r -n -i "password\|apikey\|secret\|key\|token" . --exclude-dir=node_modules --exclude-dir=.git --exclude="*.lock" --exclude="*.log" --exclude-dir=.venv --exclude-dir=venv | grep -v "security.yml\|SECRET\|Secret\|secret"; then
            echo "⚠️ Potential hardcoded secrets found - review these files carefully"
          else
            echo "✅ No obvious hardcoded secrets found"
          fi

  # ── RUNTIME SECURITY ──────────────────────────────────────────────────────────
  runtime-security:
    name: Runtime Security Check
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: etap_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    env:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/etap_test
      REDIS_URL: redis://localhost:6379/0
      ENVIRONMENT: testing
      JWT_SECRET_KEY: test-jwt-secret-for-ci-not-prod-use-32-bytes-min
      ENCRYPTION_KEY: test-encryption-key-for-ci-not-prod-use-32-bytes-min

    steps:
      - name: Checkout code
        uses: actions/checkout@v7.0.0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --only-binary :all: --upgrade pip
          pip install --only-binary :all: -r requirements.txt || pip install -r requirements.txt
          pip install --only-binary :all: pytest pytest-asyncio httpx || pip install pytest pytest-asyncio httpx

      - name: Start service for runtime checks
        run: |
          python engineering_service.py &
          sleep 10  # Wait for service to start

      - name: Basic security posture check
        run: |
          # Check that security headers are present
          RESPONSE=$(curl -I http://localhost:8000/healthz 2>/dev/null || echo "Service not responding")
          if [[ $RESPONSE == *"X-Frame-Options"* ]]; then
            echo "✅ X-Frame-Options header present"
          else
            echo "⚠️ X-Frame-Options header missing"
          fi

          if [[ $RESPONSE == *"X-Content-Type-Options"* ]]; then
            echo "✅ X-Content-Type-Options header present"
          else
            echo "⚠️ X-Content-Type-Options header missing"
          fi
