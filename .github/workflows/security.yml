name: Security Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'  # Weekly on Monday at 06:00 UTC

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write

jobs:
  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript, python
      - name: Build Python
        run: pip install -r requirements.txt
        continue-on-error: true
      - name: Build TypeScript
        run: npm install -g pnpm && pnpm install --no-frozen-lockfile
        continue-on-error: true
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:javascript-typescript,python"

  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high

  trivy:
    name: Trivy Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Run Trivy vulnerability scanner (filesystem)
        uses: aquasecurity/trivy-action@v0.32.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          # Ignore dev-only / known false-positives to avoid noise.
          ignore-unfixed: true
          skip-dirs: '.git,node_modules,ui/node_modules,.venv,venv,__pycache__'
      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

  npm-audit:
    name: npm Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile
      - name: Run pnpm audit
        run: |
          echo "### pnpm audit summary ###"
          pnpm audit --audit-level=high 2>&1 || echo "::warning::pnpm audit found high/critical vulnerabilities"
      - name: Audit UI dependencies
        working-directory: ui
        run: |
          echo "### npm audit (ui/) summary ###"
          npm audit --audit-level=high 2>&1 || echo "::warning::npm audit (ui/) found high/critical vulnerabilities"

  pip-audit:
    name: pip Audit (Python)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install pip-audit
        run: python -m pip install pip-audit
      - name: Install project dependencies (for context)
        run: |
          python -m pip install -r requirements.txt
        continue-on-error: true
      - name: Run pip-audit
        run: |
          echo "### pip-audit summary ###"
          python -m pip_audit --requirement requirements.txt 2>&1 || echo "::warning::pip-audit found vulnerabilities"

  secret-scan:
    name: Secret Detection (TruffleHog)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      # NOTE: Do NOT pass `--no-update` in extra_args — the action already
      # injects it internally, and repeating the flag causes TruffleHog to
      # exit with "flag 'no-update' cannot be repeated".
      - name: Trufflehog — verified secrets (fail on match)
        uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --only-verified
        continue-on-error: false
      - name: Trufflehog — unverified secrets (warn only)
        uses: trufflesecurity/trufflehog@main
        continue-on-error: true
        with:
          extra_args: --no-verification
