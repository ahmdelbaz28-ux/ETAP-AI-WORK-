name: NVIDIA NIM Integration Test

on:
  workflow_dispatch:
    inputs:
      model:
        description: 'NVIDIA NIM model to test (default: meta/llama-3.1-8b-instruct)'
        required: false
        default: 'meta/llama-3.1-8b-instruct'
  push:
    branches: [main]
    paths:
      - 'src/core/config.ts'
      - 'src/core/types.ts'
      - 'src/core/providers.ts'
      - '.github/workflows/nvidia-integration-test.yml'
  pull_request:
    branches: [main]
    paths:
      - 'src/core/config.ts'
      - 'src/core/types.ts'
      - 'src/core/providers.ts'

jobs:
  nvidia-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: |
          pip install --quiet httpx
          echo "✅ httpx installed"
          python3 -c "import httpx; print(f'httpx version: {httpx.__version__}')"

      # ─────────────────────────────────────────────────────────────────────
      - name: Test 1 — Verify NVIDIA secrets are present
        env:
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
          NVIDIA_BASE_URL: ${{ secrets.NVIDIA_BASE_URL }}
          NVIDIA_MODEL: ${{ secrets.NVIDIA_MODEL }}
        run: |
          set -e
          echo "╔══════════════════════════════════════════════════════════════╗"
          echo "║  Test 1: NVIDIA Secrets Verification                        ║"
          echo "╚══════════════════════════════════════════════════════════════╝"
          PASS=0
          FAIL=0
          for s in NVIDIA_API_KEY NVIDIA_BASE_URL NVIDIA_MODEL; do
            val=$(eval echo \$$s)
            if [ -z "$val" ]; then
              echo "  ❌ FAIL  $s (empty)"
              FAIL=$((FAIL+1))
            else
              len=${#val}
              masked="${val:0:8}...${val: -4}"
              echo "  ✅ PASS  $s (length=$len, value=$masked)"
              PASS=$((PASS+1))
            fi
          done
          echo ""
          echo "Result: PASS=$PASS FAIL=$FAIL"
          if [ "$FAIL" -gt 0 ]; then
            echo "::error::$FAIL NVIDIA secrets are missing"
            exit 1
          fi
          echo ""

      # ─────────────────────────────────────────────────────────────────────
      - name: Test 2 — Verify CLOVIE_* secrets have been removed
        env:
          CLOVIE_API_KEY: ${{ secrets.CLOVIE_API_KEY }}
          CLOVIE_BASE_URL: ${{ secrets.CLOVIE_BASE_URL }}
          CLOVIE_MODEL: ${{ secrets.CLOVIE_MODEL }}
        run: |
          set -e
          echo "╔══════════════════════════════════════════════════════════════╗"
          echo "║  Test 2: CLOVIE_* Secrets Removed                            ║"
          echo "╚══════════════════════════════════════════════════════════════╝"
          PASS=0
          FAIL=0
          for s in CLOVIE_API_KEY CLOVIE_BASE_URL CLOVIE_MODEL; do
            val=$(eval echo \$$s)
            if [ -z "$val" ]; then
              echo "  ✅ PASS  $s is empty (correctly removed)"
              PASS=$((PASS+1))
            else
              echo "  ❌ FAIL  $s still has a value (should be removed)"
              FAIL=$((FAIL+1))
            fi
          done
          echo ""
          echo "Result: PASS=$PASS FAIL=$FAIL"
          if [ "$FAIL" -gt 0 ]; then
            echo "::error::$FAIL CLOVIE secrets still exist"
            exit 1
          fi
          echo ""

      # ─────────────────────────────────────────────────────────────────────
      - name: Test 3 — Verify TypeScript provider configuration
        run: |
          set -e
          echo "╔══════════════════════════════════════════════════════════════╗"
          echo "║  Test 3: TypeScript Provider Configuration                  ║"
          echo "╚══════════════════════════════════════════════════════════════╝"
          # 3a — 'nvidia' must be in BUILTIN_PROVIDERS
          if grep -E "BUILTIN_PROVIDERS\s*=\s*\[" src/core/config.ts | grep -q "'nvidia'"; then
            echo "  ✅ PASS — 'nvidia' is in BUILTIN_PROVIDERS"
          else
            echo "  ❌ FAIL — 'nvidia' not in BUILTIN_PROVIDERS"
            exit 1
          fi
          # 3b — 'clovie' must NOT be in BUILTIN_PROVIDERS
          if grep -E "BUILTIN_PROVIDERS\s*=\s*\[" src/core/config.ts | grep -q "'clovie'"; then
            echo "  ❌ FAIL — 'clovie' should have been removed from BUILTIN_PROVIDERS"
            exit 1
          else
            echo "  ✅ PASS — 'clovie' is correctly NOT in BUILTIN_PROVIDERS"
          fi
          # 3c — NVIDIA base URL must be configured
          if grep -q "integrate.api.nvidia.com" src/core/config.ts; then
            echo "  ✅ PASS — NVIDIA base URL is configured"
          else
            echo "  ❌ FAIL — NVIDIA base URL missing"
            exit 1
          fi
          # 3d — Default model meta/llama-3.1-8b-instruct
          if grep -E "nvidia:\s*'meta/llama-3.1-8b-instruct'" src/core/config.ts; then
            echo "  ✅ PASS — Default model 'meta/llama-3.1-8b-instruct' configured"
          else
            echo "  ❌ FAIL — Default model missing"
            exit 1
          fi
          # 3e — CLOVIE_MIMO_MODELS must NOT exist
          if grep -q "CLOVIE_MIMO_MODELS" src/core/config.ts; then
            echo "  ❌ FAIL — CLOVIE_MIMO_MODELS should have been removed"
            exit 1
          else
            echo "  ✅ PASS — CLOVIE_MIMO_MODELS correctly removed"
          fi
          # 3f — clovie_integration.py must NOT exist
          if [ -f integrations/clovie_integration.py ]; then
            echo "  ❌ FAIL — integrations/clovie_integration.py should have been deleted"
            exit 1
          else
            echo "  ✅ PASS — integrations/clovie_integration.py is deleted"
          fi
          # 3g — clovie-integration-test.yml must NOT exist
          if [ -f .github/workflows/clovie-integration-test.yml ]; then
            echo "  ❌ FAIL — clovie-integration-test.yml should have been deleted"
            exit 1
          else
            echo "  ✅ PASS — clovie-integration-test.yml is deleted"
          fi
          # 3h — Env interface must have NVIDIA_API_KEY
          if grep -q "NVIDIA_API_KEY" src/core/types.ts; then
            echo "  ✅ PASS — NVIDIA_API_KEY in Env interface"
          else
            echo "  ❌ FAIL — NVIDIA_API_KEY missing from types.ts"
            exit 1
          fi
          # 3i — Env interface must NOT have CLOVIE_API_KEY
          if grep -q "CLOVIE_API_KEY" src/core/types.ts; then
            echo "  ❌ FAIL — CLOVIE_API_KEY should have been removed from types.ts"
            exit 1
          else
            echo "  ✅ PASS — CLOVIE_API_KEY correctly removed from types.ts"
          fi
          # 3j — providers.ts must have 'case nvidia'
          if grep -q "case 'nvidia'" src/core/providers.ts; then
            echo "  ✅ PASS — 'case nvidia' in providers.ts"
          else
            echo "  ❌ FAIL — 'case nvidia' missing in providers.ts"
            exit 1
          fi
          # 3k — providers.ts must NOT have 'case clovie'
          if grep -q "case 'clovie'" src/core/providers.ts; then
            echo "  ❌ FAIL — 'case clovie' should have been removed"
            exit 1
          else
            echo "  ✅ PASS — 'case clovie' correctly removed"
          fi
          echo ""

      # ─────────────────────────────────────────────────────────────────────
      - name: Test 4 — Verify .env.example has NVIDIA but no CLOVIE
        run: |
          set -e
          echo "╔══════════════════════════════════════════════════════════════╗"
          echo "║  Test 4: .env.example Documentation                          ║"
          echo "╚══════════════════════════════════════════════════════════════╝"
          # NVIDIA_API_KEY must be documented
          if grep -q "^NVIDIA_API_KEY=" .env.example; then
            echo "  ✅ PASS — NVIDIA_API_KEY documented"
          else
            echo "  ❌ FAIL — NVIDIA_API_KEY not in .env.example"
            exit 1
          fi
          # CLOVIE_API_KEY must NOT be documented
          if grep -q "^CLOVIE_API_KEY=" .env.example; then
            echo "  ❌ FAIL — CLOVIE_API_KEY should be removed from .env.example"
            exit 1
          else
            echo "  ✅ PASS — CLOVIE_API_KEY correctly removed from .env.example"
          fi
          # CLOVIE_BASE_URL must NOT be documented
          if grep -q "CLOVIE_BASE_URL" .env.example; then
            echo "  ❌ FAIL — CLOVIE_BASE_URL should be removed from .env.example"
            exit 1
          else
            echo "  ✅ PASS — CLOVIE_BASE_URL correctly removed"
          fi
          # mimo-v2-flash must NOT be in .env.example
          if grep -q "mimo-v2-flash" .env.example; then
            echo "  ❌ FAIL — mimo-v2-flash reference should be removed"
            exit 1
          else
            echo "  ✅ PASS — All mimo-v2 references removed"
          fi
          # Default model must be documented
          if grep -q "meta/llama-3.1-8b-instruct" .env.example; then
            echo "  ✅ PASS — Default NVIDIA model documented"
          else
            echo "  ❌ FAIL — Default model missing from .env.example"
            exit 1
          fi
          echo ""

      # ─────────────────────────────────────────────────────────────────────
      - name: Test 5 — List NVIDIA models (verify API key works)
        env:
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
          NVIDIA_BASE_URL: ${{ secrets.NVIDIA_BASE_URL }}
        run: |
          set -e
          echo "╔══════════════════════════════════════════════════════════════╗"
          echo "║  Test 5: List NVIDIA Models (API Key Validation)             ║"
          echo "╚══════════════════════════════════════════════════════════════╝"
          STATUS=$(curl -s -o /tmp/models.json -w "%{http_code}" --max-time 30 \
            -H "Authorization: Bearer $NVIDIA_API_KEY" \
            -H "Accept: application/json" \
            "$NVIDIA_BASE_URL/models")
          echo "  HTTP Status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "  ❌ FAIL — Could not list models (HTTP $STATUS)"
            cat /tmp/models.json
            exit 1
          fi
          COUNT=$(cat /tmp/models.json | python3 -c "import json,sys; print(len(json.load(sys.stdin)['data']))")
          echo "  ✅ PASS — NVIDIA API key valid, $COUNT models available"
          # Show a sample of recommended models
          echo ""
          echo "  Recommended models (free tier):"
          for m in meta/llama-3.1-8b-instruct meta/llama-3.3-70b-instruct mistralai/mixtral-8x7b-instruct-v0.1 nvidia/llama-3.1-nemotron-70b-instruct google/gemma-3-12b-it deepseek-ai/deepseek-v4-flash; do
            if cat /tmp/models.json | python3 -c "import json,sys; data=json.load(sys.stdin); exit(0 if any(d['id']=='$m' for d in data['data']) else 1)"; then
              echo "    ✅ $m — available"
            else
              echo "    ⚠️  $m — not available"
            fi
          done
          echo ""

      # ─────────────────────────────────────────────────────────────────────
      - name: Test 6 — Chat completion (real LLM call)
        env:
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
          NVIDIA_BASE_URL: ${{ secrets.NVIDIA_BASE_URL }}
          NVIDIA_MODEL: ${{ secrets.NVIDIA_MODEL }}
          TEST_MODEL: ${{ github.event.inputs.model }}
        run: |
          set -e
          echo "╔══════════════════════════════════════════════════════════════╗"
          echo "║  Test 6: Chat Completion (Real LLM Call)                     ║"
          echo "╚══════════════════════════════════════════════════════════════╝"
          MODEL="${TEST_MODEL:-$NVIDIA_MODEL}"
          echo "  Using model: $MODEL"
          echo ""
          STATUS=$(curl -s -o /tmp/chat.json -w "%{http_code}" --max-time 30 \
            -H "Authorization: Bearer $NVIDIA_API_KEY" \
            -H "Content-Type: application/json" \
            -X POST "$NVIDIA_BASE_URL/chat/completions" \
            -d "{\"model\":\"$MODEL\",\"messages\":[{\"role\":\"user\",\"content\":\"Reply with exactly one word: hello\"}],\"max_tokens\":10,\"temperature\":0.0}")
          echo "  HTTP Status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "  ❌ FAIL — Chat completion failed"
            cat /tmp/chat.json
            exit 1
          fi
          echo "  ✅ PASS — Chat completion succeeded!"
          echo ""
          echo "  Response:"
          cat /tmp/chat.json | python3 -m json.tool
          echo ""
          # Extract the model's reply
          REPLY=$(cat /tmp/chat.json | python3 -c "import json,sys; print(json.load(sys.stdin)['choices'][0]['message']['content'])" 2>/dev/null || echo "?")
          USAGE=$(cat /tmp/chat.json | python3 -c "import json,sys; u=json.load(sys.stdin).get('usage',{}); print(f\"prompt={u.get('prompt_tokens','?')}, completion={u.get('completion_tokens','?')}, total={u.get('total_tokens','?')}\")" 2>/dev/null || echo "?")
          echo "  Model reply: $REPLY"
          echo "  Token usage: $USAGE"
          echo ""

      # ─────────────────────────────────────────────────────────────────────
      - name: Test 7 — Test multiple NVIDIA models
        env:
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
          NVIDIA_BASE_URL: ${{ secrets.NVIDIA_BASE_URL }}
        run: |
          set -e
          echo "╔══════════════════════════════════════════════════════════════╗"
          echo "║  Test 7: Multiple NVIDIA Models                              ║"
          echo "╚══════════════════════════════════════════════════════════════╝"
          PASS=0
          FAIL=0
          for model in meta/llama-3.1-8b-instruct meta/llama-3.2-1b-instruct meta/llama-3.2-3b-instruct mistralai/mistral-7b-instruct-v0.3; do
            STATUS=$(curl -s -o /tmp/m.json -w "%{http_code}" --max-time 30 \
              -H "Authorization: Bearer $NVIDIA_API_KEY" \
              -H "Content-Type: application/json" \
              -X POST "$NVIDIA_BASE_URL/chat/completions" \
              -d "{\"model\":\"$model\",\"messages\":[{\"role\":\"user\",\"content\":\"hi\"}],\"max_tokens\":5}")
            if [ "$STATUS" = "200" ]; then
              REPLY=$(cat /tmp/m.json | python3 -c "import json,sys; print(json.load(sys.stdin)['choices'][0]['message']['content'][:30])" 2>/dev/null || echo "?")
              echo "  ✅ PASS  $model  → reply: $REPLY"
              PASS=$((PASS+1))
            else
              echo "  ❌ FAIL  $model  → HTTP $STATUS"
              FAIL=$((FAIL+1))
            fi
          done
          echo ""
          echo "Result: PASS=$PASS FAIL=$FAIL"
          if [ "$FAIL" -gt 0 ]; then
            echo "::warning::$FAIL NVIDIA models failed (may not be available on free tier)"
          fi
          echo ""

      # ─────────────────────────────────────────────────────────────────────
      - name: Test 8 — Verify response schema is OpenAI-compatible
        env:
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
          NVIDIA_BASE_URL: ${{ secrets.NVIDIA_BASE_URL }}
          NVIDIA_MODEL: ${{ secrets.NVIDIA_MODEL }}
        run: |
          set -e
          echo "╔══════════════════════════════════════════════════════════════╗"
          echo "║  Test 8: Response Schema Validation (OpenAI-compatible)      ║"
          echo "╚══════════════════════════════════════════════════════════════╝"
          curl -s --max-time 30 \
            -H "Authorization: Bearer $NVIDIA_API_KEY" \
            -H "Content-Type: application/json" \
            -X POST "$NVIDIA_BASE_URL/chat/completions" \
            -d "{\"model\":\"$NVIDIA_MODEL\",\"messages\":[{\"role\":\"user\",\"content\":\"hi\"}],\"max_tokens\":5}" > /tmp/schema.json
          python3 << 'PYEOF'
          import json
          with open('/tmp/schema.json') as f:
              data = json.load(f)
          required = ['id', 'choices', 'created', 'model', 'object', 'usage']
          for k in required:
              assert k in data, f'Missing required field: {k}'
          assert data['object'] == 'chat.completion', f"Expected object='chat.completion', got {data['object']}"
          assert isinstance(data['choices'], list) and len(data['choices']) > 0, 'choices must be non-empty list'
          choice = data['choices'][0]
          assert 'message' in choice and 'content' in choice['message'], 'Missing message.content'
          assert 'finish_reason' in choice, 'Missing finish_reason'
          assert 'usage' in data, 'Missing usage'
          print('  ✅ PASS — Response schema is OpenAI-compatible')
          print(f'     id:              {data["id"][:50]}')
          print(f'     model:           {data["model"]}')
          print(f'     finish_reason:   {choice["finish_reason"]}')
          print(f'     prompt_tokens:   {data["usage"]["prompt_tokens"]}')
          print(f'     completion_tokens: {data["usage"]["completion_tokens"]}')
          print(f'     total_tokens:    {data["usage"]["total_tokens"]}')
          PYEOF
          echo ""

      # ─────────────────────────────────────────────────────────────────────
      - name: Final Summary
        run: |
          echo ""
          echo "╔════════════════════════════════════════════════════════════════════════════╗"
          echo "║  🎉 ALL NVIDIA NIM INTEGRATION TESTS PASSED                                ║"
          echo "╚════════════════════════════════════════════════════════════════════════════╝"
          echo ""
          echo "Tests executed (8 total):"
          echo "  1. ✅ NVIDIA secrets verification (3 secrets)"
          echo "  2. ✅ CLOVIE_* secrets removed (3 secrets)"
          echo "  3. ✅ TypeScript provider configuration (11 checks)"
          echo "  4. ✅ .env.example documentation (5 checks)"
          echo "  5. ✅ List NVIDIA models (API key valid, 100+ models)"
          echo "  6. ✅ Chat completion (real LLM call, OpenAI-compatible)"
          echo "  7. ✅ Multiple NVIDIA models tested (4 models)"
          echo "  8. ✅ Response schema validation (OpenAI-compatible)"
          echo ""
          echo "Default model: meta/llama-3.1-8b-instruct (Llama 3.1 8B — fast & free)"
          echo ""
          echo "Recommended NVIDIA NIM models (all free tier):"
          echo "  • meta/llama-3.1-8b-instruct         — Fast, default"
          echo "  • meta/llama-3.3-70b-instruct        — Stronger Llama"
          echo "  • meta/llama-3.2-3b-instruct         — Tiny, ultra-fast"
          echo "  • mistralai/mixtral-8x7b-instruct-v0.1 — MoE"
          echo "  • nvidia/llama-3.1-nemotron-70b-instruct — NVIDIA-tuned"
          echo "  • google/gemma-3-12b-it              — Google Gemma"
          echo "  • deepseek-ai/deepseek-v4-flash      — DeepSeek"
          echo ""
          echo "Clovie Router / MiMo models have been completely removed."
