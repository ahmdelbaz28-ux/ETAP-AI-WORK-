name: GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - 'docs/**'
      - 'README.md'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check if Pages is enabled
        id: pages-check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh api repos/${{ github.repository }}/pages --jq '.html_url' 2>/dev/null; then
            echo "pages_enabled=true" >> $GITHUB_OUTPUT
          else
            echo "pages_enabled=false" >> $GITHUB_OUTPUT
            echo "::warning::GitHub Pages is not enabled for this repository. Skipping deployment."
          fi
      - name: Setup Pages
        if: steps.pages-check.outputs.pages_enabled == 'true'
        uses: actions/configure-pages@v4
      - name: Prepare docs
        if: steps.pages-check.outputs.pages_enabled == 'true'
        run: |
          mkdir -p _site
          if [ -d docs ]; then
            cp -r docs/* _site/
          fi
          cp README.md _site/
      - name: Upload artifact
        if: steps.pages-check.outputs.pages_enabled == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    if: needs.build.result == 'success'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
