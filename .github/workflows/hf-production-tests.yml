name: HF Space Production Smoke Tests

on:
  workflow_run:
    workflows: ["Sync to HuggingFace Space"]
    types:
      - completed
  workflow_dispatch:
  schedule:
    # Run daily at 06:00 UTC to catch HF Space drift
    - cron: '0 6 * * *'

jobs:
  production-smoke:
    name: Production Smoke Tests
    runs-on: ubuntu-latest
    # Only run if the sync workflow succeeded (or manual/schedule trigger)
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install pytest + pydantic + fastapi
        run: pip install pytest pydantic fastapi

      - name: Wait for HF Space to finish rebuilding
        run: |
          # SECURITY: download to a temp file first, then parse.
          # Avoids curl|bash pattern that could execute malicious JSON
          # if the endpoint is compromised or DNS-hijacked.
          HF_STATUS_URL="https://huggingface.co/api/spaces/ahmdelbaz28/AHMEDETAP"
          for i in $(seq 1 30); do
            # Download to temp file with -f (fail on HTTP errors) and -m (max-time 15s)
            if curl -sf -m 15 -o /tmp/hf-status.json "$HF_STATUS_URL"; then
              # Validate JSON is parseable before extracting stage
              STAGE=$(python3 -c "
          import sys, json
          try:
              data = json.load(open('/tmp/hf-status.json'))
              print(data.get('runtime', {}).get('stage', 'UNKNOWN'))
          except (json.JSONDecodeError, IOError) as e:
              print('PARSE_ERROR')
              sys.exit(1)
          " || echo "PARSE_ERROR")
            else
              STAGE="CURL_FAILED"
            fi
            echo "Attempt $i: HF Space stage = $STAGE"
            if [ "$STAGE" = "RUNNING" ]; then
              echo "✅ HF Space is RUNNING — proceeding with smoke tests"
              rm -f /tmp/hf-status.json
              exit 0
            fi
            sleep 10
          done
          echo "❌ HF Space did not reach RUNNING state in 5 minutes"
          rm -f /tmp/hf-status.json
          exit 1

      - name: Run production smoke tests
        env:
          HF_SPACE_PRODUCTION_TESTS: 'true'
        run: |
          # Use --noconftest to bypass tests/conftest.py which requires heavy deps.
          # The production tests only need urllib + json (stdlib) + pytest.
          python -m pytest tests/test_hf_space_production.py -v --tb=short --noconftest
