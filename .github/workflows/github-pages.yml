# Deploy documentation with MkDocs to GitHub Pages
name: Docs (MkDocs) Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      force:
        description: "Force redeploy"
        required: false
        default: "false"
        type: boolean

# Required: allow github-actions[bot] to push the gh-pages branch back to the repo
permissions:
  contents: write
  pages: write
  id-token: write

# Avoid concurrent deploys racing on the gh-pages branch
concurrency:
  group: mkdocs-pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install MkDocs and theme
        run: |
          pip install --upgrade pip
          pip install mkdocs mkdocs-material

      - name: Deploy to GitHub Pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdocs gh-deploy --force
