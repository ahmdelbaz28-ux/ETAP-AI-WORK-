name: Sync to HuggingFace Space

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: hf-sync
  cancel-in-progress: false

jobs:
  validate-and-sync:
    name: Guard + Sync to HuggingFace
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install guard dependencies
        run: pip install pyyaml

      - name: Run HF Build Guard (pre-push validation)
        run: python scripts/hf_build_guard.py

      - name: Configure git
        run: |
          git config --global user.email "ahmdelbaz28@gmail.com"
          git config --global user.name "GitHub Actions Sync"

      - name: Clone HuggingFace Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git clone "https://ahmdelbaz28:${HF_TOKEN}@huggingface.co/spaces/ahmdelbaz28/ETAP-AI-Platform.git" /tmp/hf-space

      - name: Sync hf-space/ to HuggingFace
        run: |
          cd /tmp/hf-space

          # Remove all tracked files (keep .git)
          git ls-files | while read -r file; do
            rm -f "$file"
          done
          find /tmp/hf-space -type d -empty -not -path "*/.git/*" -not -path "*/.git" -delete

          # Copy only the hf-space/ directory contents
          cp -r "${GITHUB_WORKSPACE}/hf-space/"* /tmp/hf-space/
          cp "${GITHUB_WORKSPACE}/hf-space/".* /tmp/hf-space/ 2>/dev/null || true

          echo "Synced files:"
          ls -la /tmp/hf-space/

      - name: Commit and push
        run: |
          cd /tmp/hf-space
          git add -A
          if git diff --cached --quiet; then
            echo "No changes - already up to date"
            exit 0
          fi
          git commit -m "Auto-sync from GitHub (${{ github.sha }})"
          git push origin main

      - name: Wait for build and verify
        run: |
          echo "Waiting 120s for HF build..."
          sleep 120

          for i in 1 2 3 4 5; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              "https://ahmdelbaz28-ETAP-AI-Platform.hf.space/healthz" 2>/dev/null || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "Space is LIVE and healthy!"
              exit 0
            fi
            echo "Attempt $i: HTTP $STATUS - waiting 60s..."
            sleep 60
          done

          echo "WARNING: Space not healthy after 5 attempts"
          echo "Check: https://huggingface.co/spaces/ahmdelbaz28/ETAP-AI-Platform"

      - name: Summary
        if: always()
        run: |
          echo "========================================="
          echo "  SYNC COMPLETE"
          echo "========================================="
          echo "  GitHub: ${{ github.sha }}"
          echo "  HF Space: https://huggingface.co/spaces/ahmdelbaz28/ETAP-AI-Platform"
          echo "  Live: https://ahmdelbaz28-ETAP-AI-Platform.hf.space"
          echo "========================================="
