name: Keep HF Space Alive

on:
  schedule:
    - cron: "0 */6 * * *"  # Every 6 hours
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping HF Space
        run: |
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            https://ahmdelbaz28-etap-ai-platform.hf.space/healthz)
          echo "Health check HTTP code: $HTTP_CODE"
          if [ "$HTTP_CODE" != "200" ]; then
            echo "Warning: Space returned HTTP $HTTP_CODE"
          fi

      - name: Deep Health Check
        run: |
          RESPONSE=$(curl -s https://ahmdelbaz28-etap-ai-platform.hf.space/readyz)
          echo "Ready check response: $RESPONSE"
          if echo "$RESPONSE" | grep -q '"ready": true'; then
            echo "Space is healthy and ready"
          else
            echo "Warning: Space may not be ready"
          fi
