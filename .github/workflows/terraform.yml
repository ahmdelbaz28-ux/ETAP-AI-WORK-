# =============================================================================
# AhmedETAP — Terraform CI/CD Pipeline
# =============================================================================
#
# Validates, plans, and applies Terraform IaC for Azure infrastructure.
#
# Workflow:
#   Pull Request  → terraform fmt + init + validate + plan
#   Merge to main → terraform apply
#   Manual        → workflow_dispatch with environment selection
#
# Prerequisites:
#   1. Azure Service Principal with Contributor + User Access Administrator
#      roles on the target subscription
#   2. GitHub Secrets:
#      - AZURE_CLIENT_ID       (Service Principal App ID)
#      - AZURE_TENANT_ID       (Azure AD tenant ID)
#      - AZURE_SUBSCRIPTION_ID (Subscription ID)
#   3. Storage accounts created for remote state (see terraform/README.md)
#
# =============================================================================

name: Terraform

on:
  pull_request:
    paths:
      - "terraform/**"
      - ".github/workflows/terraform.yml"
    branches:
      - main
  push:
    branches:
      - main
    paths:
      - "terraform/**"
      - ".github/workflows/terraform.yml"
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "dev"
        type: choice
        options:
          - dev
          - staging
          - prod
      command:
        description: "Terraform command"
        required: true
        default: "plan"
        type: choice
        options:
          - plan
          - apply
          - destroy

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}-${{ inputs.environment || 'dev' }}
  cancel-in-progress: true

# ============================================================================
# Defaults
# ============================================================================
defaults:
  run:
    working-directory: terraform
    shell: bash

# ============================================================================
# Environment resolution
#
# Branch-to-environment mapping:
#   main    → staging
#   develop → dev
#   other   → dev (fallback)
#   manual  → uses workflow_dispatch input
# ============================================================================
env:
  ENVIRONMENT: >-
    ${{ github.event_name == 'workflow_dispatch' && inputs.environment ||
       (github.ref_name == 'main' && 'staging') ||
       (github.ref_name == 'develop' && 'dev') ||
       'dev' }}
  TF_VAR_environment: >-
    ${{ github.event_name == 'workflow_dispatch' && inputs.environment ||
       (github.ref_name == 'main' && 'staging') ||
       (github.ref_name == 'develop' && 'dev') ||
       'dev' }}

jobs:
  # ==========================================================================
  # Validate & Format Check
  # ==========================================================================
  validate:
    name: Validate (${{ env.ENVIRONMENT }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.0
          terraform_wrapper: false

      - name: Terraform fmt check
        run: terraform fmt -check -recursive -diff

      - name: Terraform init (no backend)
        run: terraform init -backend=false -reconfigure

      - name: Terraform validate
        run: terraform validate

      - name: Checkov security scan
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: terraform/
          framework: terraform
          quiet: true
          soft_fail: true
          output_format: cli

  # ==========================================================================
  # Terraform Plan (PRs and manual dispatch)
  # ==========================================================================
  plan:
    name: Plan (${{ env.ENVIRONMENT }})
    runs-on: ubuntu-latest
    needs: [validate]
    timeout-minutes: 30
    if: |
      always() &&
      needs.validate.result == 'success' &&
      (github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch')

    environment: ${{ env.ENVIRONMENT }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.0
          terraform_wrapper: false

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Terraform init
        run: |
          terraform init \
            -backend-config="environments/${{ env.ENVIRONMENT }}/backend.hcl" \
            -reconfigure

      - name: Terraform plan
        id: plan
        run: |
          terraform plan \
            -var-file="environments/${{ env.ENVIRONMENT }}/terraform.tfvars" \
            -out=tfplan.binary \
            -no-color \
            -input=false \
            2>&1 | tee tfplan.txt

      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-${{ env.ENVIRONMENT }}-${{ github.run_id }}
          path: terraform/tfplan.binary
          retention-days: 7
          compression-level: 1

      - name: Post plan summary
        id: comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const planOutput = fs.readFileSync('terraform/tfplan.txt', 'utf8');

            // Extract summary lines (resources added/changed/destroyed)
            const summaryLines = planOutput.split('\n').filter(line =>
              line.includes('Plan:') || line.includes('No changes') || line.includes('Error')
            );

            let summary = '## Terraform Plan (`${{ env.ENVIRONMENT }}`)\n\n';
            if (summaryLines.length > 0) {
              summary += '```\n' + summaryLines.join('\n') + '\n```\n\n';
            } else {
              summary += 'Plan generated. See workflow run for full output.\n\n';
            }

            summary += `| Resource | Count |\n|----------|-------|\n`;
            const planLine = summaryLines.find(l => l.includes('Plan:'));
            if (planLine) {
              const add = (planLine.match(/(\d+) to add/) || [])[1] || '0';
              const change = (planLine.match(/(\d+) to change/) || [])[1] || '0';
              const destroy = (planLine.match(/(\d+) to destroy/) || [])[1] || '0';
              summary += `| **Add** | ${add} |\n`;
              summary += `| **Change** | ${change} |\n`;
              summary += `| **Destroy** | ${destroy} |\n`;
            }

            summary += `\n[🔍 View full plan](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})`;

            // Find existing comment or create new
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('Terraform Plan')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: summary,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: summary,
              });
            }

      - name: Fail on plan error
        if: failure()
        run: |
          echo "## Terraform Plan Failed" >> $GITHUB_STEP_SUMMARY
          exit 1

  # ==========================================================================
  # Terraform Apply (merge to main or manual dispatch)
  # ==========================================================================
  apply:
    name: Apply (${{ env.ENVIRONMENT }})
    runs-on: ubuntu-latest
    needs: [validate]
    timeout-minutes: 45
    if: |
      always() &&
      needs.validate.result == 'success' &&
      (github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.command == 'apply'))

    environment: ${{ env.ENVIRONMENT }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.0
          terraform_wrapper: false

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Terraform init
        run: |
          terraform init \
            -backend-config="environments/${{ env.ENVIRONMENT }}/backend.hcl" \
            -reconfigure

      - name: Download plan artifact (from workflow_dispatch plan)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/download-artifact@v4
        with:
          name: tfplan-${{ env.ENVIRONMENT }}-${{ github.run_id }}
          path: terraform/

      - name: Terraform apply
        id: apply
        run: |
          if [ -f tfplan.binary ]; then
            terraform apply -input=false -auto-approve tfplan.binary
          else
            terraform apply \
              -var-file="environments/${{ env.ENVIRONMENT }}/terraform.tfvars" \
              -auto-approve \
              -input=false \
              -no-color \
              2>&1 | tee tfapply.txt
          fi

      - name: Post apply summary
        if: always()
        run: |
          echo "## Terraform Apply Complete (\`${{ env.ENVIRONMENT }}\`)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f tfapply.txt ]; then
            grep -E 'Apply complete|Apply failed|Resources:' tfapply.txt >> $GITHUB_STEP_SUMMARY || true
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Detail | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Environment | ${{ env.ENVIRONMENT }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Trigger | ${{ github.event_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | ${{ github.sha }} |" >> $GITHUB_STEP_SUMMARY
