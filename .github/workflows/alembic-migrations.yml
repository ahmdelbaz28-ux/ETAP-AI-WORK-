name: Alembic Database Migrations

on:
  push:
    branches: [ main, master ]
    paths:
      - 'migrations/**'
      - 'alembic.ini'
      - 'alembic/**'
  pull_request:
    branches: [ main, master ]
    paths:
      - 'migrations/**'
      - 'alembic.ini'
      - 'alembic/**'
  workflow_dispatch:  # Allow manual trigger

jobs:
  test-migrations:
    name: Test Migrations
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:17.6-alpine
        env:
          POSTGRES_DB: etap_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install alembic psycopg2-binary
      
      - name: Run Alembic migrations
        env:
          DATABASE_URL: postgresql+psycopg2://postgres:postgres@localhost:5432/etap_test
        run: |
          alembic upgrade head
      
      - name: Verify migration version
        env:
          DATABASE_URL: postgresql+psycopg2://postgres:postgres@localhost:5432/etap_test
        run: |
          alembic current
      
      - name: Run rollback test
        env:
          DATABASE_URL: postgresql+psycopg2://postgres:postgres@localhost:5432/etap_test
        run: |
          alembic downgrade -1
          alembic upgrade head

  deploy-migrations:
    name: Deploy Migrations to Production
    needs: test-migrations
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install alembic psycopg2-binary
      
      - name: Deploy migrations to Supabase
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          if [ -n "$SUPABASE_DB_URL" ]; then
            echo "Deploying migrations to Supabase..."
            alembic upgrade head
          else
            echo "SUPABASE_DB_URL not set, skipping production deployment"
            exit 1
          fi
      
      - name: Notify on success
        if: success()
        run: |
          echo "✅ Migrations deployed successfully to production"
      
      - name: Notify on failure
        if: failure()
        run: |
          echo "❌ Migration deployment failed"
          exit 1