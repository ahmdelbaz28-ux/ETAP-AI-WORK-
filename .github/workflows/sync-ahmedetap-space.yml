name: Sync to HuggingFace AHMEDETAP Space

on:
  push:
    branches: [main]
    paths:
      - 'Dockerfile.hf'
      - 'requirements.hf.txt'
      - 'engineering_service.py'
      - 'api/**'
      - 'core/**'
      - 'services/**'
      - 'engine/**'
      - 'agents/**'
      - 'load_flow/**'
      - 'fault_analysis/**'
      - 'coordination/**'
      - 'network_solver/**'
      - 'visualization/**'
      - 'security/**'
      - 'knowledge/**'
      - 'worker/**'
      - 'ml/**'
      - 'digital_twin/**'
      - 'scada_model/**'
      - 'adms_control/**'
      - 'utils/**'
      - 'schemas/**'
      - 'guards/**'
      - 'copilot/**'
      - 'gis_integration/**'
      - 'gis_model/**'
      - 'gis_validation/**'
      - 'skills/**'
      - 'reporting/**'
      - 'prompts/**'
      - 'config/**'
      - 'migrations/**'
      - 'pyproject.toml'
  workflow_dispatch:

concurrency:
  group: hf-ahmedetap-sync
  cancel-in-progress: false

jobs:
  validate-and-sync:
    name: Validate & Sync to HF Space
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Validate HF Dockerfile
        run: |
          echo "Validating Dockerfile.hf builds successfully..."
          docker build -f Dockerfile.hf -t etap-hf:test . || exit 1
          echo "Dockerfile.hf validation passed!"

      - name: Setup Git LFS
        run: git lfs install

      - name: Configure git
        run: |
          git config --global user.email "ahmdelbaz28@gmail.com"
          git config --global user.name "GitHub Actions Sync"

      - name: Clone HuggingFace Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git clone "https://ahmdelbaz28:${HF_TOKEN}@huggingface.co/spaces/ahmdelbaz28/AHMEDETAP.git" /tmp/hf-space

      - name: Prepare and Sync Files
        run: |
          cd /tmp/hf-space
          
          # Clean existing files (except .git)
          find . -maxdepth 1 ! -name '.git' ! -name '.' -exec rm -rf {} +
          
          # Copy only required files
          cp "${GITHUB_WORKSPACE}/Dockerfile.hf" ./Dockerfile
          cp "${GITHUB_WORKSPACE}/requirements.hf.txt" ./
          cp "${GITHUB_WORKSPACE}/engineering_service.py" ./
          cp "${GITHUB_WORKSPACE}/pyproject.toml" ./
          
          # Copy required directories
          for dir in api core services engine agents load_flow fault_analysis coordination \
                     network_solver visualization security knowledge worker ml digital_twin \
                     scada_model adms_control utils schemas guards copilot gis_integration \
                     gis_model gis_validation skills reporting prompts config migrations; do
            if [ -d "${GITHUB_WORKSPACE}/$dir" ]; then
              cp -r "${GITHUB_WORKSPACE}/$dir" ./
            fi
          done
          
          # Track binary files
          git lfs track "*.png" "*.wal" "*.db"
          
          echo "Synced files ready for push."
          ls -la

      - name: Commit and Push to HF Space
        run: |
          cd /tmp/hf-space
          git add -A
          if git diff --cached --quiet; then
            echo "No changes - already up to date"
            exit 0
          fi
          git commit -m "Sync from GitHub (${{ github.sha }})"
          git push origin main
